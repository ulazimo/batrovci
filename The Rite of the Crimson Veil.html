<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1X91H99N2G"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-1X91H99N2G');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Rite of the Crimson Veil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { touch-action: none; user-select: none; -webkit-user-select: none; background: #020617; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // Lucide icon wrapper for React
        const Icon = ({ name, size = 24, className = '' }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.innerHTML = '';
                    const iconFn = lucide[name.charAt(0).toUpperCase() + name.slice(1).replace(/-([a-z])/g, g => g[1].toUpperCase())];
                    if (iconFn) {
                        const svg = lucide.createElement(iconFn);
                        svg.setAttribute('width', size);
                        svg.setAttribute('height', size);
                        if (className) svg.setAttribute('class', className);
                        ref.current.appendChild(svg);
                    }
                }
            }, [name, size, className]);
            return <span ref={ref} style={{display:'inline-flex',alignItems:'center',justifyContent:'center'}} />;
        };

        const PLAYER_CONFIGS = [
            { id: 1, color: 'text-red-500', border: 'border-red-500', bg: 'bg-red-500/10', name: 'I' },
            { id: 2, color: 'text-blue-500', border: 'border-blue-500', bg: 'bg-blue-500/10', name: 'II' },
            { id: 3, color: 'text-green-500', border: 'border-green-500', bg: 'bg-green-500/10', name: 'III' },
            { id: 4, color: 'text-yellow-500', border: 'border-yellow-500', bg: 'bg-yellow-500/10', name: 'IV' },
            { id: 5, color: 'text-purple-500', border: 'border-purple-500', bg: 'bg-purple-500/10', name: 'V' },
            { id: 6, color: 'text-pink-500', border: 'border-pink-500', bg: 'bg-pink-500/10', name: 'VI' },
            { id: 7, color: 'text-orange-500', border: 'border-orange-500', bg: 'bg-orange-500/10', name: 'VII' },
            { id: 8, color: 'text-teal-500', border: 'border-teal-500', bg: 'bg-teal-500/10', name: 'VIII' },
        ];

        const COLORS = [
            { name: 'Blood', class: 'text-red-500' },
            { name: 'Abyss', class: 'text-blue-500' },
            { name: 'Venom', class: 'text-green-500' },
            { name: 'Gold', class: 'text-yellow-500' },
        ];

        const SYMBOLS = ['skull', 'flame', 'moon', 'sun'];
        const SYMBOL_NAMES = ['Skull', 'Flame', 'Moon', 'Sun'];

        const EXTRA_COLORS = [
            { name: 'Void', class: 'text-purple-500' },
            { name: 'Embers', class: 'text-orange-500' },
        ];
        const EXTRA_SYMBOLS = ['ghost', 'eye'];
        const EXTRA_SYMBOL_NAMES = ['Ghost', 'Eye'];

        const App = () => {
            const [gameState, setGameState] = useState('LOBBY');
            const [round, setRound] = useState(1);
            const [players, setPlayers] = useState([]);
            const [targetRule, setTargetRule] = useState(null);
            const [timeLeft, setTimeLeft] = useState(10);
            const [winner, setWinner] = useState(null);
            const timerRef = useRef(null);

            const getCombinations = useCallback((currentRound) => {
                let availColors = [...COLORS];
                let availSymbols = SYMBOLS.map((s, i) => ({ icon: s, name: SYMBOL_NAMES[i] }));
                if (currentRound >= 10) {
                    availColors = [...availColors, ...EXTRA_COLORS];
                    availSymbols = [...availSymbols, ...EXTRA_SYMBOLS.map((s, i) => ({ icon: s, name: EXTRA_SYMBOL_NAMES[i] }))];
                }
                const combos = [];
                availColors.forEach(c => availSymbols.forEach(s => combos.push({ color: c, symbol: s })));
                return combos;
            }, []);

            const initGame = (count) => {
                const combos = getCombinations(1);
                const initialPlayers = PLAYER_CONFIGS.slice(0, count).map(p => ({
                    ...p,
                    isAlive: true,
                    currentComboIdx: Math.floor(Math.random() * combos.length),
                    combinations: combos,
                }));
                setPlayers(initialPlayers);
                setRound(1);
                setWinner(null);
                startPreRound(1, initialPlayers);
            };

            const startPreRound = (roundNum, currentPlayers) => {
                const combos = getCombinations(roundNum);
                const rule = combos[Math.floor(Math.random() * combos.length)];
                let ruleDisplay = { ...rule };
                if (roundNum >= 15) {
                    const randomColor = COLORS[Math.floor(Math.random() * COLORS.length)];
                    ruleDisplay.deceptionText = randomColor.name;
                }
                setTargetRule(ruleDisplay);
                setPlayers(prev => prev.map(p => ({ ...p, combinations: combos })));
                setGameState('PRE_ROUND');
                setTimeout(() => startRitual(roundNum), 2000);
            };

            const startRitual = (roundNum) => {
                setGameState('RITUAL');
                let baseTime = 10;
                if (roundNum >= 5) baseTime = 7;
                if (roundNum >= 12) baseTime = 5;
                if (roundNum >= 20) baseTime = 3.5;
                setTimeLeft(baseTime);
            };

            useEffect(() => {
                if (gameState === 'RITUAL' && timeLeft > 0) {
                    timerRef.current = setInterval(() => {
                        setTimeLeft(t => Math.max(0, parseFloat((t - 0.1).toFixed(1))));
                    }, 100);
                } else if (timeLeft <= 0 && gameState === 'RITUAL') {
                    endRound();
                }
                return () => clearInterval(timerRef.current);
            }, [gameState, timeLeft]);

            const endRound = () => {
                clearInterval(timerRef.current);
                setPlayers(prev => {
                    const updated = prev.map(p => {
                        if (!p.isAlive) return p;
                        const current = p.combinations[p.currentComboIdx];
                        const success = current.color.name === targetRule.color.name &&
                                        current.symbol.name === targetRule.symbol.name;
                        return { ...p, isAlive: success };
                    });
                    const survivors = updated.filter(p => p.isAlive);
                    if (survivors.length === 0) {
                        setGameState('GAME_OVER');
                        setWinner(null);
                    } else if (survivors.length === 1 && prev.filter(p => p.isAlive).length > 1) {
                        setWinner(survivors[0]);
                        setGameState('GAME_OVER');
                    } else {
                        setGameState('ROUND_RESULT');
                        setTimeout(() => {
                            setRound(r => r + 1);
                            startPreRound(round + 1, updated);
                        }, 1500);
                    }
                    return updated;
                });
            };

            const handlePlayerTap = (playerId) => {
                if (gameState !== 'RITUAL') return;
                setPlayers(prev => prev.map(p => {
                    if (p.id === playerId && p.isAlive) {
                        return { ...p, currentComboIdx: (p.currentComboIdx + 1) % p.combinations.length };
                    }
                    return p;
                }));
            };

            const timerMax = round >= 5 ? (round >= 12 ? (round >= 20 ? 3.5 : 5) : 7) : 10;

            return (
                <div className="h-[100dvh] w-full bg-slate-950 text-slate-100 font-sans flex flex-col items-center overflow-hidden relative select-none touch-none">

                    {/* Ambient Background */}
                    <div className="absolute inset-0 pointer-events-none opacity-30">
                        <div className={`absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full aspect-square max-w-lg rounded-full blur-[100px] transition-colors duration-1000 ${gameState === 'RITUAL' ? 'bg-red-900/40' : 'bg-blue-900/20'}`} />
                    </div>

                    {gameState === 'LOBBY' && (
                        <div className="z-10 w-full h-full flex flex-col items-center justify-center p-6 text-center">
                            <h1 className="text-5xl font-black text-red-600 tracking-tighter italic mb-2">THE RITE</h1>
                            <p className="text-slate-500 text-sm uppercase tracking-[0.3em] mb-12">of the Crimson Veil</p>

                            <div className="grid grid-cols-2 gap-3 w-full mb-8">
                                {[2, 3, 4, 5, 6, 8].map(n => (
                                    <button
                                        key={n}
                                        onClick={() => initGame(n)}
                                        className="py-6 px-4 rounded-2xl bg-slate-900/80 border border-slate-800 active:bg-red-900/20 active:border-red-500 transition-all flex flex-col items-center gap-2"
                                    >
                                        <Icon name="users" size={24} className="text-red-500" />
                                        <span className="font-bold text-lg">{n} PLAYERS</span>
                                    </button>
                                ))}
                            </div>

                            <div className="bg-slate-900/40 border border-slate-800 p-4 rounded-xl text-left text-xs text-slate-400">
                                <div className="flex items-center gap-2 text-red-400 font-bold mb-2 uppercase">
                                    <Icon name="info" size={14} className="text-red-400" /> Holy Commandments
                                </div>
                                <p className="mb-1">• Tap your colored zone to cycle Aspects.</p>
                                <p className="mb-1">• Match the Oracle's symbol and color.</p>
                                <p>• Round 15: Ignore text, follow the visual color.</p>
                            </div>
                        </div>
                    )}

                    {(gameState === 'PRE_ROUND' || gameState === 'RITUAL' || gameState === 'ROUND_RESULT') && (
                        <div className="z-10 flex flex-col w-full h-full">

                            <div className="flex justify-between items-center p-4">
                                <div className="text-left">
                                    <span className="block text-[10px] text-slate-500 uppercase tracking-widest font-bold">Initiation Phase</span>
                                    <span className="text-xl font-black text-white italic">ROUND {round}</span>
                                </div>
                                <div className="text-right flex flex-col items-end">
                                    <span className="block text-[10px] text-slate-500 uppercase tracking-widest font-bold">Ritual Pulse</span>
                                    <span className={`text-xl font-mono font-bold ${timeLeft < 3 ? 'text-red-500 animate-pulse' : 'text-slate-300'}`}>
                                        {timeLeft}s
                                    </span>
                                </div>
                            </div>

                            <div className="flex-none flex flex-col items-center justify-center py-4 relative">
                                <div className="absolute top-0 left-0 w-full h-1 bg-slate-900 overflow-hidden">
                                    <div
                                        className="h-full bg-red-600 transition-all duration-100 ease-linear shadow-[0_0_10px_#dc2626]"
                                        style={{ width: `${(timeLeft / timerMax) * 100}%` }}
                                    />
                                </div>

                                <div className={`p-6 rounded-3xl border-2 transition-all duration-500 ${gameState === 'RITUAL' ? 'border-red-600 scale-110 shadow-[0_0_30px_rgba(220,38,38,0.2)]' : 'border-slate-800 opacity-50'}`}>
                                    {targetRule && (
                                        <div className="flex flex-col items-center">
                                            <Icon name={targetRule.symbol.icon} size={64} className={`${targetRule.color.class} drop-shadow-[0_0_8px_currentColor]`} />
                                            <div className="mt-2 text-center">
                                                <span className={`text-lg font-black uppercase tracking-widest ${round >= 15 ? 'block' : 'hidden'}`}>
                                                    {targetRule.deceptionText || targetRule.color.name}
                                                </span>
                                                <span className={`text-[10px] font-bold uppercase tracking-tighter opacity-40 ${round >= 15 ? 'hidden' : 'block'}`}>
                                                    {targetRule.color.name} {targetRule.symbol.name}
                                                </span>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className={`flex-grow grid gap-1 p-1 ${players.length > 4 ? 'grid-cols-2 grid-rows-4' : 'grid-cols-1 grid-rows-4'}`}>
                                {players.map((p) => {
                                    const current = p.combinations[p.currentComboIdx];
                                    return (
                                        <div
                                            key={p.id}
                                            onClick={() => handlePlayerTap(p.id)}
                                            className={`relative flex items-center justify-center rounded-xl transition-all active:scale-[0.98] active:brightness-125 overflow-hidden border-2 ${
                                                p.isAlive
                                                    ? `${p.border} ${p.bg}`
                                                    : 'border-slate-900 bg-black opacity-20'
                                            }`}
                                        >
                                            <div className={`absolute top-2 left-2 px-2 py-0.5 rounded bg-black/60 border ${p.border} text-[10px] font-bold z-10`}>
                                                INITIATE {p.name}
                                            </div>

                                            {p.isAlive ? (
                                                <div className="flex flex-col items-center gap-1">
                                                    <Icon name={current.symbol.icon} size={48} className={`${current.color.class} drop-shadow-md`} />
                                                    <Icon name="fingerprint" size={16} className="text-slate-500 opacity-20" />
                                                </div>
                                            ) : (
                                                <Icon name="skull" size={40} className="text-slate-800" />
                                            )}

                                            {gameState === 'ROUND_RESULT' && !p.isAlive && (
                                                <div className="absolute inset-0 flex items-center justify-center bg-red-950/40 backdrop-blur-[2px]">
                                                    <span className="text-red-600 font-black text-2xl rotate-[-15deg] uppercase tracking-tighter">Fallen</span>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {gameState === 'GAME_OVER' && (
                        <div className="z-20 w-full h-full flex flex-col items-center justify-center p-8 bg-black/90">
                            <Icon name="trophy" size={80} className="text-yellow-500 mb-4 drop-shadow-[0_0_15px_rgba(234,179,8,0.5)]" />
                            <h2 className="text-4xl font-black italic mb-2 text-center leading-tight">THE ASCENSION</h2>
                            <p className="text-slate-500 text-sm mb-12 uppercase tracking-widest">The veil has parted</p>

                            {winner ? (
                                <div className={`w-full max-w-xs p-8 rounded-3xl border-4 ${winner.border} bg-slate-900/50 text-center mb-12`}>
                                    <span className="text-slate-400 text-xs font-bold uppercase tracking-widest">Worthy Soul</span>
                                    <h3 className={`text-4xl font-black ${winner.color} mt-2`}>PLAYER {winner.name}</h3>
                                </div>
                            ) : (
                                <div className="text-center mb-12">
                                    <h3 className="text-3xl font-bold text-red-600 uppercase tracking-tighter">ALL CONSUMED</h3>
                                    <p className="text-slate-500 text-xs mt-2 uppercase">None were worthy this cycle</p>
                                </div>
                            )}

                            <button
                                onClick={() => setGameState('LOBBY')}
                                className="w-full max-w-xs py-5 bg-red-600 text-white font-black rounded-2xl uppercase tracking-[0.2em] shadow-lg shadow-red-900/40 active:scale-95 transition-transform"
                            >
                                Restart Ritual
                            </button>
                        </div>
                    )}

                    {gameState === 'RITUAL' && timeLeft < 2 && (
                        <div className="absolute inset-0 border-4 border-red-600/30 animate-pulse pointer-events-none" />
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <!-- FIREBASE TRACKING -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, setPersistence, inMemoryPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "[REDACTED]",
            authDomain: "prototypes-7691b.firebaseapp.com",
            projectId: "prototypes-7691b",
            storageBucket: "prototypes-7691b.firebasestorage.app",
            messagingSenderId: "263652926534",
            appId: "1:263652926534:web:9af3c4ce63aab78f0f9647",
            measurementId: "G-1X91H99N2G"
        };
        const GAME_ID = 'crimson-veil';

        let db, auth, currentUser = null;
        const startTime = Date.now();

        async function initFirebase() {
            try {
                if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
                    const app = initializeApp(firebaseConfig);
                    db = getFirestore(app);
                    auth = getAuth(app);
                    try {
                        await setPersistence(auth, inMemoryPersistence);
                    } catch (e) {
                        console.warn("Persistence set warning", e);
                    }
                    const userCredential = await signInAnonymously(auth);
                    currentUser = userCredential.user;
                    const statsRef = doc(db, "game_stats", GAME_ID);
                    updateDoc(statsRef, { plays: increment(1) }).catch(e => console.log("Stats error:", e));
                    setInterval(saveTime, 30000);
                }
            } catch (e) { console.error("Tracking Error - check console", e); }
        }

        function saveTime() {
            if (db && currentUser) {
                const timeSpentSeconds = Math.floor((Date.now() - startTime) / 1000);
                if (timeSpentSeconds > 0) {
                    const statsRef = doc(db, "game_stats", GAME_ID);
                    updateDoc(statsRef, { timePlayed: increment(timeSpentSeconds) }).catch(e => console.log("Stats error:", e));
                }
            }
        }

        window.addEventListener('beforeunload', saveTime);
        initFirebase();
    </script>
</body>
</html>
