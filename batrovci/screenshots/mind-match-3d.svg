<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg)"/>

  <!-- 3D platform shadow -->
  <ellipse cx="300" cy="310" rx="220" ry="30" fill="rgba(0,0,0,0.4)"/>

  <!-- Tray (bottom) — isometric box -->
  <polygon points="80,280 300,320 520,280 300,240" fill="#1e3a8a" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="80,280 80,300 300,340 300,320" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <polygon points="520,280 520,300 300,340 300,320" fill="#172554" stroke="#3b82f6" stroke-width="1"/>

  <!-- Floating 3D boxes -->
  <!-- Box 1: emoji 🐬 -->
  <g transform="translate(130, 130)">
    <polygon points="0,30 40,10 80,30 40,50" fill="#1d4ed8"/>
    <polygon points="0,30 0,65 40,85 40,50" fill="#1e3a8a"/>
    <polygon points="80,30 80,65 40,85 40,50" fill="#1e40af"/>
    <text x="40" y="38" font-size="22" text-anchor="middle">🐬</text>
  </g>
  <!-- Box 2: emoji 🦈 -->
  <g transform="translate(260, 90)">
    <polygon points="0,30 40,10 80,30 40,50" fill="#7c3aed"/>
    <polygon points="0,30 0,65 40,85 40,50" fill="#4c1d95"/>
    <polygon points="80,30 80,65 40,85 40,50" fill="#6d28d9"/>
    <text x="40" y="38" font-size="22" text-anchor="middle">🦈</text>
  </g>
  <!-- Box 3: emoji 🐬 (matched) — glowing -->
  <g transform="translate(390, 130)">
    <polygon points="0,30 40,10 80,30 40,50" fill="#1d4ed8" opacity="0.9"/>
    <polygon points="0,30 0,65 40,85 40,50" fill="#1e3a8a" opacity="0.9"/>
    <polygon points="80,30 80,65 40,85 40,50" fill="#1e40af" opacity="0.9"/>
    <text x="40" y="38" font-size="22" text-anchor="middle">🐬</text>
    <rect x="-4" y="6" width="88" height="84" rx="4" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.8"/>
  </g>
  <!-- Box 4: emoji 🐙 in tray -->
  <g transform="translate(220, 235)">
    <polygon points="0,20 35,5 70,20 35,35" fill="#059669"/>
    <polygon points="0,20 0,45 35,60 35,35" fill="#064e3b"/>
    <polygon points="70,20 70,45 35,60 35,35" fill="#065f46"/>
    <text x="35" y="27" font-size="18" text-anchor="middle">🐙</text>
  </g>

  <!-- Match line between box1 and box3 -->
  <line x1="210" y1="165" x2="430" y2="165" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>

  <!-- HUD -->
  <rect x="0" y="0" width="600" height="40" fill="rgba(0,0,0,0.6)"/>
  <text x="16" y="14" font-family="monospace" font-size="9" fill="#6366f1" letter-spacing="2">MATCHES</text>
  <text x="16" y="32" font-family="monospace" font-size="18" font-weight="bold" fill="white">4 / 8</text>
  <text x="300" y="14" font-family="monospace" font-size="9" fill="#6366f1" letter-spacing="2" text-anchor="middle">TIME</text>
  <text x="300" y="32" font-family="monospace" font-size="18" font-weight="bold" fill="#a5b4fc" text-anchor="middle">42s</text>
  <text x="584" y="14" font-family="monospace" font-size="9" fill="#6366f1" letter-spacing="2" text-anchor="end">LEVEL</text>
  <text x="584" y="32" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="end">3</text>
</svg>
