<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <rect width="600" height="360" fill="#020617"/>

  <!-- Node connections (wires) -->
  <line x1="80"  y1="180" x2="180" y2="130" stroke="#1e40af" stroke-width="3" opacity="0.7"/>
  <line x1="80"  y1="180" x2="180" y2="230" stroke="#1e40af" stroke-width="3" opacity="0.7"/>
  <line x1="240" y1="130" x2="340" y2="180" stroke="#1e40af" stroke-width="3" opacity="0.7"/>
  <line x1="240" y1="230" x2="340" y2="180" stroke="#1e40af" stroke-width="3" opacity="0.7"/>
  <line x1="400" y1="180" x2="500" y2="180" stroke="#1e40af" stroke-width="3" opacity="0.7"/>

  <!-- Active wire glow -->
  <line x1="80"  y1="180" x2="180" y2="130" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <line x1="240" y1="130" x2="340" y2="180" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="180" x2="500" y2="180" stroke="#4ade80" stroke-width="2.5" opacity="0.8"/>

  <!-- Input node -->
  <rect x="30" y="155" width="50" height="50" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="55" y="174" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">INPUT</text>
  <text x="55" y="192" font-family="monospace" font-size="18" font-weight="bold" fill="#60a5fa" text-anchor="middle">5</text>

  <!-- Math node 1: ×3 -->
  <rect x="180" y="105" width="60" height="50" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="210" y="124" font-family="monospace" font-size="9" fill="#93c5fd" text-anchor="middle">MATH</text>
  <text x="210" y="146" font-family="monospace" font-size="16" font-weight="bold" fill="white" text-anchor="middle">× 3</text>

  <!-- Condition node: if > 10 -->
  <rect x="180" y="205" width="60" height="50" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
  <text x="210" y="224" font-family="monospace" font-size="8" fill="#a5b4fc" text-anchor="middle">COND</text>
  <text x="210" y="244" font-family="monospace" font-size="11" font-weight="bold" fill="white" text-anchor="middle">&gt; 10?</text>

  <!-- Math node 2: +7 -->
  <rect x="340" y="155" width="60" height="50" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="370" y="174" font-family="monospace" font-size="9" fill="#93c5fd" text-anchor="middle">MATH</text>
  <text x="370" y="196" font-family="monospace" font-size="16" font-weight="bold" fill="white" text-anchor="middle">+ 7</text>

  <!-- Output node -->
  <rect x="500" y="155" width="60" height="50" rx="10" fill="#14532d" stroke="#4ade80" stroke-width="2.5"/>
  <text x="530" y="174" font-family="monospace" font-size="9" fill="#86efac" text-anchor="middle">OUTPUT</text>
  <text x="530" y="196" font-family="monospace" font-size="18" font-weight="bold" fill="#4ade80" text-anchor="middle">22</text>

  <!-- Target badge -->
  <rect x="490" y="100" width="80" height="36" rx="8" fill="#713f12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="530" y="114" font-family="monospace" font-size="9" fill="#fde68a" text-anchor="middle" letter-spacing="1">TARGET</text>
  <text x="530" y="130" font-family="monospace" font-size="16" font-weight="bold" fill="#fbbf24" text-anchor="middle">22 ✓</text>

  <!-- Floating value bubbles on wires -->
  <circle cx="130" cy="152" r="14" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="130" y="157" font-family="monospace" font-size="11" font-weight="bold" fill="white" text-anchor="middle">5</text>

  <circle cx="290" cy="162" r="14" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="290" y="167" font-family="monospace" font-size="11" font-weight="bold" fill="white" text-anchor="middle">15</text>

  <circle cx="450" cy="180" r="14" fill="#14532d" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="185" font-family="monospace" font-size="11" font-weight="bold" fill="#4ade80" text-anchor="middle">22</text>

  <!-- Level indicator -->
  <g transform="translate(20, 20)">
    <rect x="0" y="0" width="100" height="28" rx="6" fill="rgba(0,0,0,0.5)" stroke="#1e40af" stroke-width="1"/>
    <text x="50" y="12" font-family="monospace" font-size="8" fill="#94a3b8" text-anchor="middle" letter-spacing="2">PUZZLE</text>
    <text x="50" y="24" font-family="monospace" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Level 3 / 5</text>
  </g>

  <!-- HUD bottom -->
  <rect x="0" y="318" width="600" height="42" fill="rgba(0,0,0,0.75)"/>
  <text x="16" y="334" font-family="monospace" font-size="9" fill="#94a3b8" letter-spacing="2">NODES</text>
  <text x="16" y="352" font-family="monospace" font-size="18" font-weight="bold" fill="white">4 placed</text>
  <text x="300" y="334" font-family="monospace" font-size="9" fill="#4ade80" letter-spacing="2" text-anchor="middle">STATUS</text>
  <text x="300" y="352" font-family="monospace" font-size="14" font-weight="bold" fill="#4ade80" text-anchor="middle">✓ SOLVED</text>
  <text x="584" y="334" font-family="monospace" font-size="9" fill="#94a3b8" letter-spacing="2" text-anchor="end">SCORE</text>
  <text x="584" y="352" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="end">840</text>
</svg>
