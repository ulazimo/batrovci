<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="40%" stop-color="#075985"/>
      <stop offset="100%" stop-color="#0c1a2e"/>
    </linearGradient>
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ocean background -->
  <rect width="600" height="360" fill="url(#ocean)"/>
  <rect width="600" height="360" fill="url(#spotlight)"/>

  <!-- Caustic light rays -->
  <g opacity="0.07" stroke="#7dd3fc" stroke-width="40">
    <line x1="100" y1="0" x2="80" y2="360"/>
    <line x1="250" y1="0" x2="220" y2="360"/>
    <line x1="420" y1="0" x2="400" y2="360"/>
    <line x1="560" y1="0" x2="550" y2="360"/>
  </g>

  <!-- Bubbles -->
  <g fill="none" stroke="#7dd3fc" stroke-width="1" opacity="0.4">
    <circle cx="80" cy="280" r="4"/>
    <circle cx="95" cy="240" r="2.5"/>
    <circle cx="72" cy="200" r="3"/>
    <circle cx="510" cy="300" r="3.5"/>
    <circle cx="525" cy="260" r="2"/>
    <circle cx="500" cy="220" r="4"/>
  </g>

  <!-- Coral / seabed hints -->
  <g transform="translate(0,330)">
    <ellipse cx="60" cy="20" rx="40" ry="15" fill="#0f766e" opacity="0.6"/>
    <ellipse cx="150" cy="25" rx="30" ry="10" fill="#115e59" opacity="0.5"/>
    <ellipse cx="500" cy="22" rx="50" ry="12" fill="#0f766e" opacity="0.6"/>
    <!-- coral -->
    <line x1="60" y1="20" x2="55" y2="-10" stroke="#f97316" stroke-width="3" stroke-linecap="round"/>
    <line x1="55" y1="-10" x2="48" y2="-20" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="-10" x2="62" y2="-22" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="48" cy="-20" r="4" fill="#fb923c"/>
    <circle cx="62" cy="-22" r="4" fill="#fb923c"/>
    <circle cx="55" cy="-10" r="3" fill="#fb923c"/>
  </g>

  <!-- SHARK — large, center-left -->
  <g transform="translate(90, 140)">
    <!-- Body -->
    <ellipse cx="80" cy="30" rx="85" ry="28" fill="#94a3b8"/>
    <!-- Belly -->
    <ellipse cx="75" cy="38" rx="60" ry="14" fill="#e2e8f0"/>
    <!-- Tail -->
    <polygon points="0,10 -30,-10 -25,30" fill="#94a3b8"/>
    <!-- Dorsal fin -->
    <polygon points="70,2 90,-30 110,2" fill="#94a3b8"/>
    <!-- Pectoral fin -->
    <polygon points="60,30 45,60 90,35" fill="#7f8ea3"/>
    <!-- Eye -->
    <circle cx="148" cy="22" r="5" fill="#0f172a"/>
    <circle cx="150" cy="20" r="1.5" fill="white"/>
    <!-- Mouth -->
    <path d="M155,30 Q165,38 155,42" fill="none" stroke="#0f172a" stroke-width="1.5"/>
    <!-- Gill lines -->
    <path d="M125,15 Q128,30 125,42" fill="none" stroke="#7f8ea3" stroke-width="1.2"/>
    <path d="M132,13 Q135,30 132,44" fill="none" stroke="#7f8ea3" stroke-width="1.2"/>
    <!-- Hit zone indicator (heart) -->
    <circle cx="95" cy="25" r="12" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
    <text x="91" y="29" font-size="10" fill="#ef4444" opacity="0.8">♥</text>
  </g>

  <!-- OCTOPUS — right side -->
  <g transform="translate(400, 160)">
    <!-- Head -->
    <ellipse cx="60" cy="40" rx="45" ry="38" fill="#7c3aed"/>
    <!-- Eyes -->
    <circle cx="45" cy="32" r="8" fill="#1e1b4b"/>
    <circle cx="75" cy="32" r="8" fill="#1e1b4b"/>
    <circle cx="46" cy="30" r="3" fill="white"/>
    <circle cx="76" cy="30" r="3" fill="white"/>
    <!-- Tentacles -->
    <path d="M25,70 Q10,100 20,130" fill="none" stroke="#6d28d9" stroke-width="7" stroke-linecap="round"/>
    <path d="M40,75 Q30,110 35,140" fill="none" stroke="#6d28d9" stroke-width="7" stroke-linecap="round"/>
    <path d="M60,78 Q58,115 55,145" fill="none" stroke="#6d28d9" stroke-width="7" stroke-linecap="round"/>
    <path d="M80,75 Q85,110 80,140" fill="none" stroke="#6d28d9" stroke-width="7" stroke-linecap="round"/>
    <path d="M95,70 Q108,100 100,128" fill="none" stroke="#6d28d9" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Crosshair -->
  <g transform="translate(200, 175)" opacity="0.9">
    <circle cx="0" cy="0" r="28" fill="none" stroke="#00f0ff" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="none" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="-38" y1="0" x2="-10" y2="0" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="10" y1="0" x2="38" y2="0" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="0" y1="-38" x2="0" y2="-10" stroke="#00f0ff" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="0" y2="38" stroke="#00f0ff" stroke-width="1.5"/>
  </g>

  <!-- Spear in flight -->
  <g transform="translate(155, 173) rotate(5)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
    <polygon points="50,0 42,-4 42,4" fill="#e2e8f0"/>
    <!-- trail -->
    <line x1="-5" y1="0" x2="-30" y2="0" stroke="#38bdf8" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,4"/>
  </g>

  <!-- HUD overlay -->
  <rect x="0" y="0" width="600" height="50" fill="rgba(4,12,28,0.75)"/>
  <text x="16" y="16" font-family="monospace" font-size="9" fill="#0e7490" letter-spacing="2">SCORE</text>
  <text x="16" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="#67e8f9">1,840</text>
  <text x="300" y="16" font-family="monospace" font-size="9" fill="#0e7490" letter-spacing="2" text-anchor="middle">TIME</text>
  <text x="300" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="#67e8f9" text-anchor="middle">24</text>
  <text x="584" y="16" font-family="monospace" font-size="9" fill="#9f1239" letter-spacing="2" text-anchor="end">🤖 BOT</text>
  <text x="584" y="38" font-family="monospace" font-size="22" font-weight="bold" fill="#f87171" text-anchor="end">1,620</text>

  <!-- Bottom ammo HUD -->
  <rect x="0" y="315" width="600" height="45" fill="rgba(4,12,28,0.75)"/>
  <text x="300" y="333" font-family="monospace" font-size="9" fill="#0e7490" letter-spacing="2" text-anchor="middle">SPEARS</text>
  <text x="300" y="354" font-family="monospace" font-size="20" font-weight="bold" fill="#67e8f9" text-anchor="middle">🔱 🔱 🔱 🔱 🔱</text>
</svg>
