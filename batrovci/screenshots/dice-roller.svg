<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg)"/>

  <!-- Table felt -->
  <ellipse cx="300" cy="200" rx="240" ry="150" fill="#166534" stroke="#15803d" stroke-width="3"/>
  <ellipse cx="300" cy="200" rx="220" ry="132" fill="none" stroke="#16a34a" stroke-width="1" opacity="0.5"/>

  <!-- Dice 1 (big, center) -->
  <g transform="translate(210, 130)">
    <rect x="0" y="0" width="80" height="80" rx="14" fill="white" stroke="#e5e7eb" stroke-width="2"/>
    <!-- 5 dots -->
    <circle cx="22" cy="22" r="7" fill="#1f2937"/>
    <circle cx="58" cy="22" r="7" fill="#1f2937"/>
    <circle cx="40" cy="40" r="7" fill="#1f2937"/>
    <circle cx="22" cy="58" r="7" fill="#1f2937"/>
    <circle cx="58" cy="58" r="7" fill="#1f2937"/>
  </g>

  <!-- Dice 2 -->
  <g transform="translate(310, 140)">
    <rect x="0" y="0" width="80" height="80" rx="14" fill="white" stroke="#e5e7eb" stroke-width="2"/>
    <!-- 3 dots -->
    <circle cx="22" cy="22" r="7" fill="#1f2937"/>
    <circle cx="40" cy="40" r="7" fill="#1f2937"/>
    <circle cx="58" cy="58" r="7" fill="#1f2937"/>
  </g>

  <!-- Roll result badge -->
  <rect x="232" y="225" width="136" height="36" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="300" y="238" font-family="monospace" font-size="9" fill="#93c5fd" text-anchor="middle" letter-spacing="2">TOTAL</text>
  <text x="300" y="256" font-family="monospace" font-size="20" font-weight="bold" fill="white" text-anchor="middle">8</text>

  <!-- Stats sidebar left -->
  <g transform="translate(30, 80)">
    <rect x="0" y="0" width="120" height="180" rx="10" fill="rgba(0,0,0,0.45)" stroke="#334155" stroke-width="1.5"/>
    <text x="60" y="20" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle" letter-spacing="2">STATS</text>
    <line x1="10" y1="28" x2="110" y2="28" stroke="#334155" stroke-width="1"/>
    <text x="10" y="46" font-family="monospace" font-size="9" fill="#64748b">Rolls</text>
    <text x="110" y="46" font-family="monospace" font-size="12" font-weight="bold" fill="white" text-anchor="end">24</text>
    <text x="10" y="68" font-family="monospace" font-size="9" fill="#64748b">Average</text>
    <text x="110" y="68" font-family="monospace" font-size="12" font-weight="bold" fill="#60a5fa" text-anchor="end">6.8</text>
    <text x="10" y="90" font-family="monospace" font-size="9" fill="#64748b">Min</text>
    <text x="110" y="90" font-family="monospace" font-size="12" font-weight="bold" fill="#f87171" text-anchor="end">2</text>
    <text x="10" y="112" font-family="monospace" font-size="9" fill="#64748b">Max</text>
    <text x="110" y="112" font-family="monospace" font-size="12" font-weight="bold" fill="#4ade80" text-anchor="end">12</text>
    <!-- Mini bar chart -->
    <text x="60" y="136" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">DISTRIBUTION</text>
    <rect x="10" y="148" width="8" height="10" rx="1" fill="#3b82f6" opacity="0.6"/>
    <rect x="22" y="144" width="8" height="14" rx="1" fill="#3b82f6" opacity="0.7"/>
    <rect x="34" y="138" width="8" height="20" rx="1" fill="#3b82f6" opacity="0.8"/>
    <rect x="46" y="133" width="8" height="25" rx="1" fill="#3b82f6"/>
    <rect x="58" y="130" width="8" height="28" rx="1" fill="#60a5fa"/>
    <rect x="70" y="135" width="8" height="23" rx="1" fill="#3b82f6" opacity="0.9"/>
    <rect x="82" y="140" width="8" height="18" rx="1" fill="#3b82f6" opacity="0.8"/>
    <rect x="94" y="146" width="8" height="12" rx="1" fill="#3b82f6" opacity="0.6"/>
    <rect x="106" y="150" width="8" height="8"  rx="1" fill="#3b82f6" opacity="0.5"/>
  </g>

  <!-- Roll button -->
  <g transform="translate(440, 270)">
    <rect x="0" y="0" width="120" height="48" rx="12" fill="#1d4ed8" stroke="#3b82f6" stroke-width="2"/>
    <text x="60" y="20" font-family="monospace" font-size="9" fill="#bfdbfe" text-anchor="middle" letter-spacing="2">CLICK TO</text>
    <text x="60" y="38" font-family="monospace" font-size="16" font-weight="bold" fill="white" text-anchor="middle">ROLL 🎲</text>
  </g>

  <!-- HUD top -->
  <rect x="0" y="0" width="600" height="22" fill="rgba(0,0,0,0.6)"/>
  <text x="300" y="15" font-family="monospace" font-size="11" font-weight="bold" fill="white" text-anchor="middle">🎲 DICE ROLLER</text>
</svg>
