<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Sky background -->
  <rect width="400" height="300" fill="#87CEEB"/>
  <!-- Ground -->
  <rect x="10" y="10" width="380" height="280" rx="4" fill="#b8c5a3"/>
  <!-- Roads -->
  <rect x="10" y="130" width="380" height="40" fill="#555"/>
  <rect x="180" y="10" width="40" height="280" fill="#555"/>
  <!-- Road markings -->
  <line x1="10" y1="150" x2="390" y2="150" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="8,8"/>
  <line x1="200" y1="10" x2="200" y2="290" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="8,8"/>
  <!-- Sidewalks -->
  <rect x="10" y="126" width="380" height="4" fill="#999"/>
  <rect x="10" y="170" width="380" height="4" fill="#999"/>
  <rect x="176" y="10" width="4" height="280" fill="#999"/>
  <rect x="220" y="10" width="4" height="280" fill="#999"/>
  <!-- City blocks -->
  <rect x="16" y="16" width="156" height="106" fill="#d9d9d9"/>
  <rect x="228" y="16" width="156" height="106" fill="#d9d9d9"/>
  <rect x="16" y="178" width="156" height="106" fill="#d9d9d9"/>
  <rect x="228" y="178" width="156" height="106" fill="#d9d9d9"/>
  <!-- Trees -->
  <rect x="48" y="45" width="4" height="10" fill="#5c3a1e"/>
  <circle cx="50" cy="40" r="10" fill="#2d6a4f"/>
  <rect x="118" y="50" width="4" height="10" fill="#5c3a1e"/>
  <circle cx="120" cy="45" r="8" fill="#52b788"/>
  <rect x="318" y="35" width="4" height="10" fill="#5c3a1e"/>
  <circle cx="320" cy="30" r="9" fill="#2d6a4f"/>
  <!-- Cars -->
  <rect x="130" y="137" width="30" height="16" rx="4" fill="#e63946"/>
  <rect x="250" y="147" width="28" height="14" rx="3" fill="#457b9d"/>
  <rect x="185" y="60" width="14" height="26" rx="3" fill="#f1c453"/>
  <!-- Houses -->
  <rect x="60" y="195" width="40" height="30" fill="#d4a373"/>
  <polygon points="55,195 80,175 105,195" fill="#8B4513"/>
  <rect x="75" y="208" width="8" height="14" fill="#5c3a1e"/>
  <rect x="280" y="45" width="35" height="28" fill="#ccd5ae"/>
  <polygon points="276,45 297,28 318,45" fill="#8B4513"/>
  <!-- Buildings -->
  <rect x="260" y="195" width="30" height="60" fill="#6c757d"/>
  <rect x="265" y="200" width="5" height="5" fill="rgba(255,255,200,0.7)"/>
  <rect x="274" y="200" width="5" height="5" fill="rgba(255,255,200,0.7)"/>
  <rect x="283" y="200" width="5" height="5" fill="rgba(255,255,200,0.7)"/>
  <rect x="265" y="212" width="5" height="5" fill="rgba(255,255,200,0.7)"/>
  <rect x="274" y="212" width="5" height="5" fill="rgba(255,255,200,0.7)"/>
  <rect x="283" y="212" width="5" height="5" fill="rgba(255,255,200,0.7)"/>
  <rect x="265" y="224" width="5" height="5" fill="rgba(255,255,200,0.7)"/>
  <rect x="274" y="224" width="5" height="5" fill="rgba(255,255,200,0.7)"/>
  <rect x="283" y="224" width="5" height="5" fill="rgba(255,255,200,0.7)"/>
  <!-- People / cones -->
  <circle cx="155" cy="110" r="3" fill="#ff6b35"/>
  <circle cx="100" cy="140" r="3" fill="#ef476f"/>
  <polygon points="340,140 336,152 344,152" fill="#ff6b35"/>
  <!-- The Black Hole -->
  <defs>
    <radialGradient id="holeGrad" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="70%" stop-color="#0a0015"/>
      <stop offset="100%" stop-color="#1a0033"/>
    </radialGradient>
    <radialGradient id="holeGlow" cx="50%" cy="50%">
      <stop offset="40%" stop-color="rgba(30,0,50,0)" stop-opacity="0"/>
      <stop offset="100%" stop-color="rgba(30,0,50,0.3)" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <circle cx="160" cy="180" r="50" fill="url(#holeGlow)"/>
  <circle cx="160" cy="180" r="38" fill="url(#holeGrad)"/>
  <circle cx="160" cy="180" r="37" fill="none" stroke="rgba(120,50,200,0.4)" stroke-width="1.5"/>
  <!-- Swirl lines inside hole -->
  <path d="M160,180 Q148,168 155,160 Q165,152 172,158" fill="none" stroke="rgba(100,50,180,0.3)" stroke-width="1"/>
  <path d="M160,180 Q172,192 165,200 Q155,208 148,202" fill="none" stroke="rgba(100,50,180,0.3)" stroke-width="1"/>
  <!-- Object being pulled in -->
  <circle cx="145" cy="168" r="3" fill="#06d6a0" opacity="0.7"/>
</svg>
