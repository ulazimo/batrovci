//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════
function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    if (level) setupCamera();
}
window.addEventListener('resize', resize);
resize();

function setupCamera() {
    if (!level) return;
    const pad = 60;
    const zx = (W - pad * 2) / level.width;
    const zy = (H - pad * 2) / level.height;
    camera.zoom = Math.min(zx, zy, 1.4);
    camera.x = (W / 2) - (level.width / 2) * camera.zoom;
    camera.y = (H / 2) - (level.height / 2) * camera.zoom;
}

function toScreen(wx, wy) {
    return {
        x: wx * camera.zoom + camera.x,
        y: wy * camera.zoom + camera.y
    };
}

//  LEVEL MANAGEMENT
// ═══════════════════════════════════════════════════════════
function loadLevel(idx) {
    const src = LEVELS[idx];
    currentLevelIdx = idx;
    strokes = 0;
    time = 0;
    particles = [];
    if (holeCompleteTimer) { clearTimeout(holeCompleteTimer); holeCompleteTimer = null; }

    level = JSON.parse(JSON.stringify(src));

    // Generate boundary walls
    const bw = [
        { x1: 0, y1: 0, x2: level.width, y2: 0 },
        { x1: level.width, y1: 0, x2: level.width, y2: level.height },
        { x1: level.width, y1: level.height, x2: 0, y2: level.height },
        { x1: 0, y1: level.height, x2: 0, y2: 0 },
    ];
    level.allWalls = [...bw, ...level.walls];

    // Pre-generate sand dot positions
    for (const obs of level.obstacles) {
        if (obs.type === 'sand') {
            obs._dots = [];
            for (let i = 0; i < 20; i++) {
                obs._dots.push({ x: obs.x + Math.random() * obs.w, y: obs.y + Math.random() * obs.h });
            }
        }
    }

    ball.x = level.ball.x;
    ball.y = level.ball.y;
    ball.vx = 0; ball.vy = 0;
    ball.lastSafeX = ball.x;
    ball.lastSafeY = ball.y;
    spin.x = 0; spin.y = 0;
    aim.isDragging = false;
    aim.power = 0;

    setupCamera();
    cacheFelt();
    updateHUD();
    state = 'PLAYING';

    show('hud'); show('spin-selector');
    hide('title-screen'); hide('level-select');
    hide('level-complete'); hide('pause-menu');
    hide('power-bar');
    drawSpinSelector();
}

function cacheFelt() {
    feltCanvas = document.createElement('canvas');
    feltCanvas.width = level.width;
    feltCanvas.height = level.height;
    const fc = feltCanvas.getContext('2d');

    fc.fillStyle = C.felt;
    fc.fillRect(0, 0, level.width, level.height);
    fc.fillStyle = C.feltPattern;
    for (let x = 0; x < level.width; x += 20) {
        for (let y = 0; y < level.height; y += 20) {
            if ((x + y) % 40 === 0) fc.fillRect(x, y, 20, 20);
        }
    }
}

//  UI HELPERS
// ═══════════════════════════════════════════════════════════
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

function showTitle() {
    state = 'TITLE';
    hide('hud'); hide('spin-selector'); hide('power-bar');
    hide('level-select'); hide('level-complete'); hide('pause-menu');
    show('title-screen');
}

function startGame() {
    hide('title-screen');
    showLevelSelect();
}

function showLevelSelect() {
    state = 'LEVEL_SELECT';
    hide('hud'); hide('spin-selector'); hide('power-bar');
    hide('pause-menu'); hide('level-complete');
    show('level-select');
    renderLevelGrid();
}

function renderLevelGrid() {
    const grid = document.getElementById('levels-grid');
    grid.innerHTML = '';
    LEVELS.forEach((lv, i) => {
        const p = progress.levels[lv.id] || { unlocked: false, stars: 0 };
        const div = document.createElement('div');
        div.className = 'level-btn' + (p.unlocked ? '' : ' locked');
        if (p.unlocked) {
            const starStr = p.stars > 0
                ? '★'.repeat(p.stars) + '☆'.repeat(3 - p.stars)
                : '';
            div.innerHTML = `
                <div class="level-num">${lv.id}</div>
                <div class="level-name">${lv.name}</div>
                <div class="stars" style="color:#e6c619">${starStr}</div>
            `;
            div.onclick = () => loadLevel(i);
        } else {
            div.innerHTML = `<div class="lock-icon">🔒</div><div class="level-name">${lv.name}</div>`;
        }
        grid.appendChild(div);
    });
}

function updateHUD() {
    if (!level) return;
    document.getElementById('hud-level-name').textContent = `Level ${level.id}: ${level.name}`;
    document.getElementById('hud-strokes').textContent = `Strokes: ${strokes}`;
    document.getElementById('hud-par').textContent = `Par: ${level.par}`;
    document.getElementById('hud-coins').textContent = `🪙 ${progress.coins}`;
}

function togglePause() {
    if (state === 'BALL_MOVING') return;
    if (paused) {
        paused = false;
        hide('pause-menu');
        state = 'PLAYING';
    } else {
        paused = true;
        show('pause-menu');
        state = 'PAUSED';
    }
}

function restartLevel() {
    hide('pause-menu'); hide('level-complete');
    paused = false;
    loadLevel(currentLevelIdx);
}

function exitToLevelSelect() {
    paused = false;
    hide('pause-menu'); hide('level-complete');
    showLevelSelect();
}

// ── Shop ──
function openShop() {
    hide('level-select');
    show('shop');
    renderShop();
}

function closeShop() {
    hide('shop');
    show('level-select');
    renderLevelGrid();
}

function renderShop() {
    document.getElementById('shop-coins').textContent = `🪙 ${progress.coins}`;
    const grid = document.getElementById('shop-grid');
    grid.innerHTML = '';
    for (const cue of CUES) {
        const owned = progress.ownedCues.includes(cue.id);
        const equipped = progress.equippedCue === cue.id;
        const canAfford = progress.coins >= cue.price;

        const card = document.createElement('div');
        card.className = 'cue-card' + (equipped ? ' equipped' : '');

        // Preview bar with cue gradient
        const previewStyle = `background:linear-gradient(90deg, ${cue.colors.tip}, ${cue.colors.wood} 15%, ${cue.colors.wood} 85%, ${cue.colors.butt})`;

        let btnHtml;
        if (equipped) {
            btnHtml = `<button class="btn btn-small btn-equipped">EQUIPPED</button>`;
        } else if (owned) {
            btnHtml = `<button class="btn btn-small" onclick="equipCue('${cue.id}')">EQUIP</button>`;
        } else if (canAfford) {
            btnHtml = `<button class="btn btn-small" onclick="buyCue('${cue.id}')">BUY</button>`;
        } else {
            btnHtml = `<button class="btn btn-small btn-outline" style="opacity:0.4;cursor:default">🪙 ${cue.price}</button>`;
        }

        card.innerHTML = `
            <div class="cue-name">${cue.name}</div>
            <div class="cue-preview" style="${previewStyle}"></div>
            <div class="cue-stats">Power: ${cue.maxPower}<br>Guide: ${cue.guidelineCap}</div>
            ${owned ? '' : `<div class="cue-price">🪙 ${cue.price}</div>`}
            ${btnHtml}
        `;
        grid.appendChild(card);
    }
}

function buyCue(id) {
    const cue = CUES.find(c => c.id === id);
    if (!cue || progress.coins < cue.price) return;
    progress.coins -= cue.price;
    progress.ownedCues.push(cue.id);
    progress.equippedCue = cue.id;
    saveProgress();
    renderShop();
}

function equipCue(id) {
    if (!progress.ownedCues.includes(id)) return;
    progress.equippedCue = id;
    saveProgress();
    renderShop();
}

function nextLevel() {
    if (currentLevelIdx + 1 < LEVELS.length) {
        loadLevel(currentLevelIdx + 1);
    } else {
        showLevelSelect();
    }
}

function completeLevel() {
    state = 'LEVEL_COMPLETE';
    hide('spin-selector'); hide('power-bar');

    const diff = strokes - level.par;
    let stars = 0;
    if (diff <= 0) stars = 3;
    else if (diff === 1) stars = 2;
    else if (diff === 2) stars = 1;

    // Coin reward
    const coinReward = stars === 3 ? 30 : stars === 2 ? 20 : stars === 1 ? 10 : 5;
    progress.coins += coinReward;

    // Update progress
    const p = progress.levels[level.id] || { unlocked: true, stars: 0, best: null };
    p.unlocked = true;
    if (stars > p.stars) p.stars = stars;
    if (p.best === null || strokes < p.best) p.best = strokes;
    progress.levels[level.id] = p;

    // Unlock next
    const nextId = level.id + 1;
    if (nextId <= LEVELS.length) {
        if (!progress.levels[nextId]) progress.levels[nextId] = { unlocked: true, stars: 0, best: null };
        else progress.levels[nextId].unlocked = true;
    }
    saveProgress();

    // Show overlay
    const starStr = '★'.repeat(stars) + '☆'.repeat(3 - stars);
    document.getElementById('lc-stars').textContent = starStr;
    document.getElementById('lc-stars').style.color = '#e6c619';
    document.getElementById('lc-stats').innerHTML =
        `Strokes: ${strokes}<br>Par: ${level.par}` +
        (diff <= 0 ? '<br><span style="color:#1a7a3a">Perfect!</span>' : '') +
        `<br><span style="color:#e6c619">+${coinReward} 🪙</span>`;
    document.getElementById('lc-next-btn').style.display =
        (currentLevelIdx + 1 < LEVELS.length) ? 'inline-block' : 'none';
    show('level-complete');
}

// ═══════════════════════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════════════════════

function getMovingWalls() {
    if (!level) return [];
    const mwalls = [];
    for (const obs of level.obstacles) {
        if (obs.type !== 'movingWall') continue;
        const offset = Math.sin(time * obs.speed + (obs.phase || 0)) * obs.range;
        if (obs.axis === 'y') {
            mwalls.push({
                x1: obs.x1, y1: obs.y1 + offset,
                x2: obs.x2, y2: obs.y2 + offset,
                moving: true
            });
        } else {
            mwalls.push({
                x1: obs.x1 + offset, y1: obs.y1,
                x2: obs.x2 + offset, y2: obs.y2,
                moving: true
            });
        }
    }
    return mwalls;
}

function updateCachedWalls() {
    cachedWalls = [...level.allWalls, ...getMovingWalls()];
}

// Closest point on segment to a point
function closestPointOnSeg(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return { x: x1, y: y1 };
    let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    return { x: x1 + t * dx, y: y1 + t * dy };
}

// Wall collision & response
function collideWalls() {
    for (const w of cachedWalls) {
        const cp = closestPointOnSeg(ball.x, ball.y, w.x1, w.y1, w.x2, w.y2);
        const dx = ball.x - cp.x;
        const dy = ball.y - cp.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < BALL_RADIUS && dist > 0) {
            // Normal
            const nx = dx / dist;
            const ny = dy / dist;

            // Push out
            ball.x = cp.x + nx * BALL_RADIUS;
            ball.y = cp.y + ny * BALL_RADIUS;

            // Reflect velocity
            const dot = ball.vx * nx + ball.vy * ny;
            ball.vx = (ball.vx - 2 * dot * nx) * WALL_RESTITUTION;
            ball.vy = (ball.vy - 2 * dot * ny) * WALL_RESTITUTION;

            // Side spin effect on bounce
            const tx = -ny, ty = nx; // tangent
            const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            ball.vx += tx * spin.x * speed * 0.25;
            ball.vy += ty * spin.x * speed * 0.25;

            // Particle
            spawnParticles(cp.x, cp.y, 3, '#fff', 1.5);
        }
    }
}

// Bumper collision
function collideBumpers() {
    for (const obs of level.obstacles) {
        if (obs.type !== 'bumper') continue;
        const dx = ball.x - obs.cx;
        const dy = ball.y - obs.cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = BALL_RADIUS + obs.radius;
        if (dist < minDist && dist > 0) {
            const nx = dx / dist;
            const ny = dy / dist;
            ball.x = obs.cx + nx * minDist;
            ball.y = obs.cy + ny * minDist;

            const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            ball.vx = nx * speed * BUMPER_RESTITUTION;
            ball.vy = ny * speed * BUMPER_RESTITUTION;

            spawnParticles(obs.cx + nx * obs.radius, obs.cy + ny * obs.radius, 6, C.bumperGlow, 2);
        }
    }
}

// Check if ball is in a zone
function inZone(zone) {
    return ball.x >= zone.x && ball.x <= zone.x + zone.w &&
           ball.y >= zone.y && ball.y <= zone.y + zone.h;
}

// Check water hazards
function checkWater() {
    for (const obs of level.obstacles) {
        if (obs.type !== 'water') continue;
        if (inZone(obs)) {
            // Splash
            spawnParticles(ball.x, ball.y, 12, C.waterLight, 3);
            // Reset
            ball.x = ball.lastSafeX;
            ball.y = ball.lastSafeY;
            ball.vx = 0; ball.vy = 0;
            strokes++;
            updateHUD();
            state = 'PLAYING';
            show('spin-selector');
            return true;
        }
    }
    return false;
}

// Get friction at ball position
function getSurfaceFriction() {
    for (const obs of level.obstacles) {
        if (obs.type === 'sand' && inZone(obs)) return SAND_FRICTION;
    }
    return FRICTION;
}

// Check hole
function ballSpeed() {
    return Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
}

function checkHole() {
    const dx = ball.x - level.hole.x;
    const dy = ball.y - level.hole.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const speed = ballSpeed();
    if (dist < HOLE_RADIUS - BALL_RADIUS * 0.3 && speed < HOLE_CAPTURE_SPEED) {
        ball.vx = 0; ball.vy = 0;
        ball.x = level.hole.x; ball.y = level.hole.y;
        spawnParticles(level.hole.x, level.hole.y, 15, '#e6c619', 3);
        holeCompleteTimer = setTimeout(completeLevel, 400);
        return true;
    }
    if (dist < HOLE_RADIUS && speed < HOLE_CAPTURE_SPEED * 1.5) {
        const pull = 0.15;
        ball.vx -= (dx / dist) * pull;
        ball.vy -= (dy / dist) * pull;
    }
    return false;
}

function isOverWater() {
    for (const obs of level.obstacles) {
        if (obs.type === 'water' && inZone(obs)) return true;
    }
    return false;
}

// dt-scaled friction: convert per-frame multiplier to dt-independent
function applyFriction(fric, dt) {
    const scale = dt * 60; // normalize to 60fps
    const f = Math.pow(fric, scale);
    ball.vx *= f;
    ball.vy *= f;
}

function updateBall(dt) {
    if (state !== 'BALL_MOVING') return;

    const scale = dt * 60;

    // Apply spin curve
    const speed = ballSpeed();
    if (speed > MIN_SPEED && spin.x !== 0) {
        const curve = spin.x * 0.015 * scale;
        ball.vx += -ball.vy / speed * curve;
        ball.vy += ball.vx / speed * curve;
    }

    // Move (dt-scaled)
    ball.x += ball.vx * scale;
    ball.y += ball.vy * scale;

    // Out of bounds check - reset ball if it escapes
    if (ball.x < -BALL_RADIUS * 2 || ball.x > level.width + BALL_RADIUS * 2 ||
        ball.y < -BALL_RADIUS * 2 || ball.y > level.height + BALL_RADIUS * 2) {
        ball.x = ball.lastSafeX;
        ball.y = ball.lastSafeY;
        ball.vx = 0; ball.vy = 0;
        state = 'PLAYING';
        show('spin-selector');
        return;
    }

    // Friction (with spin influence)
    let fric = getSurfaceFriction();
    fric -= spin.y * 0.005;
    fric = Math.max(0.92, Math.min(0.995, fric));
    applyFriction(fric, dt);

    // Back spin reversal
    if (spin.y < -0.3 && speed < 1.5 && speed > MIN_SPEED) {
        const rev = spin.y * 0.08 * scale;
        ball.vx += ball.vx / (speed || 1) * rev;
        ball.vy += ball.vy / (speed || 1) * rev;
    }

    // Decay spin
    const spinDecay = Math.pow(0.995, scale);
    spin.x *= spinDecay;
    spin.y *= spinDecay;

    // Collisions
    collideWalls();
    collideBumpers();

    // Hazards + safe position update (merged check)
    if (checkWater()) return;
    if (!isOverWater()) {
        ball.lastSafeX = ball.x;
        ball.lastSafeY = ball.y;
    }

    if (checkHole()) return;

    if (ballSpeed() < MIN_SPEED) {
        ball.vx = 0; ball.vy = 0;
        state = 'PLAYING';
        show('spin-selector');
    }
}

// ═══════════════════════════════════════════════════════════
//  RAY CASTING (for guideline)
// ═══════════════════════════════════════════════════════════
function raySegIntersect(ox, oy, dx, dy, x1, y1, x2, y2) {
    const sx = x2 - x1, sy = y2 - y1;
    const denom = dx * sy - dy * sx;
    if (Math.abs(denom) < 1e-8) return null;
    const t = ((x1 - ox) * sy - (y1 - oy) * sx) / denom;
    const u = ((x1 - ox) * dy - (y1 - oy) * dx) / denom;
    if (t > 0.01 && u >= 0 && u <= 1) {
        return { t, x: ox + dx * t, y: oy + dy * t, nx: sy / Math.sqrt(sx*sx+sy*sy), ny: -sx / Math.sqrt(sx*sx+sy*sy) };
    }
    return null;
}

function castRay(ox, oy, dirX, dirY, maxDist) {
    let closest = null;
    let minT = maxDist;
    for (const w of cachedWalls) {
        const hit = raySegIntersect(ox, oy, dirX, dirY, w.x1, w.y1, w.x2, w.y2);
        if (hit && hit.t < minT) {
            minT = hit.t;
            closest = hit;
        }
    }
    // Also check bumpers (approximate as not reflecting, just endpoint)
    return closest;
}

// ═══════════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════════
function spawnParticles(x, y, count, color, speed) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = (0.5 + Math.random()) * speed;
        particles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd,
            life: 1,
            decay: 0.02 + Math.random() * 0.03,
            color,
            radius: 2 + Math.random() * 3
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.95;
        p.vy *= 0.95;
        p.life -= p.decay;
        if (p.life <= 0) {
            particles[i] = particles[particles.length - 1];
            particles.pop();
        }
    }
}

// ═══════════════════════════════════════════════════════════
//  SPIN SELECTOR
// ═══════════════════════════════════════════════════════════
function drawSpinSelector() {
    const c = spinCtx;
    const w = 160, h = 160;
    c.clearRect(0, 0, w, h);

    // Outer ring
    c.beginPath();
    c.arc(80, 80, 60, 0, Math.PI * 2);
    c.fillStyle = 'rgba(10, 30, 18, 0.8)';
    c.fill();
    c.strokeStyle = '#2a5a3a';
    c.lineWidth = 2;
    c.stroke();

    // Ball circle
    c.beginPath();
    c.arc(80, 80, 30, 0, Math.PI * 2);
    const grad = c.createRadialGradient(78, 78, 2, 80, 80, 30);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(1, '#ccc');
    c.fillStyle = grad;
    c.fill();

    // Labels
    c.fillStyle = '#5a9a72';
    c.font = '10px Rajdhani';
    c.textAlign = 'center';
    c.fillText('TOP', 80, 22);
    c.fillText('BACK', 80, 150);
    c.fillText('L', 18, 84);
    c.fillText('R', 142, 84);

    // Spin indicator dot
    const dotX = 80 + spin.x * 25;
    const dotY = 80 + spin.y * 25;
    c.beginPath();
    c.arc(dotX, dotY, 6, 0, Math.PI * 2);
    c.fillStyle = '#e63946';
    c.fill();
    c.strokeStyle = '#fff';
    c.lineWidth = 1.5;
    c.stroke();
}

// Spin selector input
const spinEl = document.getElementById('spin-selector');
function handleSpinStart(e) {
    e.preventDefault();
    e.stopPropagation();
    spinDragging = true;
    updateSpinFromEvent(e);
}
function handleSpinMove(e) {
    if (!spinDragging) return;
    e.preventDefault();
    e.stopPropagation();
    updateSpinFromEvent(e);
}
function handleSpinEnd(e) {
    spinDragging = false;
}
function updateSpinFromEvent(e) {
    const rect = spinEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const radius = rect.width / 2;
    spin.x = Math.max(-1, Math.min(1, (clientX - cx) / radius));
    spin.y = Math.max(-1, Math.min(1, (clientY - cy) / radius));
    drawSpinSelector();
}

spinEl.addEventListener('mousedown', handleSpinStart);
spinEl.addEventListener('touchstart', handleSpinStart, { passive: false });
window.addEventListener('mousemove', handleSpinMove);
window.addEventListener('touchmove', handleSpinMove, { passive: false });
window.addEventListener('mouseup', handleSpinEnd);
window.addEventListener('touchend', handleSpinEnd);

// ═══════════════════════════════════════════════════════════
//  AIMING INPUT
// ═══════════════════════════════════════════════════════════
function isInSpinSelector(clientX, clientY) {
    const rect = spinEl.getBoundingClientRect();
    return clientX >= rect.left - 10 && clientX <= rect.right + 10 &&
           clientY >= rect.top - 10 && clientY <= rect.bottom + 10;
}

function handleStart(e) {
    if (state !== 'PLAYING' || paused) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    if (isInSpinSelector(clientX, clientY)) return;
    e.preventDefault();

    aim.isDragging = true;
    aim.curX = clientX;
    aim.curY = clientY;
    aim.power = 0;
    state = 'AIMING';
    show('power-bar');
}

function handleMove(e) {
    if (!aim.isDragging || state !== 'AIMING') return;
    if (spinDragging) return;
    e.preventDefault();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    aim.curX = clientX;
    aim.curY = clientY;

    // Calculate angle from ball screen pos to current touch
    const bs = toScreen(ball.x, ball.y);
    const dx = aim.curX - bs.x;
    const dy = aim.curY - bs.y;
    aim.angle = Math.atan2(dy, dx);

    // Power from distance
    const dist = Math.sqrt(dx * dx + dy * dy);
    aim.power = Math.min(dist / MAX_PULL_DIST, 1);
    powerFillEl.style.height = (aim.power * 100) + '%';
}

function handleEnd(e) {
    if (!aim.isDragging) return;
    aim.isDragging = false;

    if (state !== 'AIMING') return;

    if (aim.power < 0.05) {
        // Too weak, cancel
        state = 'PLAYING';
        hide('power-bar');
        return;
    }

    // Shoot!
    const power = aim.power * getEquippedCue().maxPower;
    // Direction is opposite to where the user is pulling
    ball.vx = -Math.cos(aim.angle) * power;
    ball.vy = -Math.sin(aim.angle) * power;
    ball.lastSafeX = ball.x;
    ball.lastSafeY = ball.y;
    strokes++;
    updateHUD();
    state = 'BALL_MOVING';
    hide('power-bar'); hide('spin-selector');
}

canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('touchstart', handleStart, { passive: false });
window.addEventListener('mousemove', handleMove);
window.addEventListener('touchmove', handleMove, { passive: false });
window.addEventListener('mouseup', handleEnd);
window.addEventListener('touchend', handleEnd);

// ═══════════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════════
function draw() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#0a1a0f';
    ctx.fillRect(0, 0, W, H);

    if (!level || state === 'TITLE' || state === 'LEVEL_SELECT') return;

    ctx.save();
    ctx.translate(camera.x, camera.y);
    ctx.scale(camera.zoom, camera.zoom);

    drawFelt();
    drawObstacles();
    drawWalls();
    drawHole();
    drawParticles();
    drawBall();

    if (state === 'AIMING') {
        drawGuideline();
        drawCueStick();
    }

    ctx.restore();
}

function drawFelt() {
    ctx.drawImage(feltCanvas, 0, 0);

    // Border/rail
    ctx.strokeStyle = C.rail;
    ctx.lineWidth = 6;
    ctx.strokeRect(-3, -3, level.width + 6, level.height + 6);
    ctx.strokeStyle = C.railLight;
    ctx.lineWidth = 2;
    ctx.strokeRect(-5, -5, level.width + 10, level.height + 10);
}

function drawObstacles() {
    for (const obs of level.obstacles) {
        if (obs.type === 'sand') {
            ctx.fillStyle = C.sand;
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.fillStyle = C.sandDark;
            if (obs._dots) {
                for (const d of obs._dots) ctx.fillRect(d.x, d.y, 1.5, 1.5);
            }
        } else if (obs.type === 'water') {
            // Animated water
            ctx.fillStyle = C.water;
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.fillStyle = C.waterLight;
            const t = time * 0.5;
            for (let i = 0; i < 5; i++) {
                const wx = obs.x + ((i * 37 + t * 20) % obs.w);
                const wy = obs.y + ((i * 23 + Math.sin(t + i) * 8) % obs.h);
                ctx.beginPath();
                ctx.arc(wx, wy, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        } else if (obs.type === 'bumper') {
            const glow = 0.5 + Math.sin(time * 3) * 0.3;
            ctx.beginPath();
            ctx.arc(obs.cx, obs.cy, obs.radius, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(obs.cx, obs.cy, 0, obs.cx, obs.cy, obs.radius);
            grad.addColorStop(0, C.bumperGlow);
            grad.addColorStop(1, C.bumper);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = `rgba(255, 107, 122, ${glow})`;
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }

    // Moving walls
    const mwalls = getMovingWalls();
    for (const mw of mwalls) {
        ctx.beginPath();
        ctx.moveTo(mw.x1, mw.y1);
        ctx.lineTo(mw.x2, mw.y2);
        ctx.strokeStyle = '#ff9944';
        ctx.lineWidth = 5;
        ctx.stroke();
        ctx.strokeStyle = '#ffbb66';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
}

function drawWalls() {
    ctx.lineCap = 'round';
    for (const w of level.walls) {
        ctx.beginPath();
        ctx.moveTo(w.x1, w.y1);
        ctx.lineTo(w.x2, w.y2);
        ctx.strokeStyle = C.rail;
        ctx.lineWidth = 5;
        ctx.stroke();
        ctx.strokeStyle = C.railLight;
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }
    ctx.lineCap = 'butt';
}

function drawHole() {
    // Shadow
    ctx.beginPath();
    ctx.arc(level.hole.x + 1, level.hole.y + 1, HOLE_RADIUS + 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fill();

    // Hole
    ctx.beginPath();
    ctx.arc(level.hole.x, level.hole.y, HOLE_RADIUS, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(level.hole.x, level.hole.y, 0, level.hole.x, level.hole.y, HOLE_RADIUS);
    grad.addColorStop(0, C.hole);
    grad.addColorStop(0.7, '#111');
    grad.addColorStop(1, '#222');
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.strokeStyle = C.holeRim;
    ctx.lineWidth = 1.5;
    ctx.stroke();
}

function drawBall() {
    // Shadow
    ctx.beginPath();
    ctx.ellipse(ball.x + 2, ball.y + 3, BALL_RADIUS, BALL_RADIUS * 0.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fill();

    // Ball
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, BALL_RADIUS);
    grad.addColorStop(0, '#FFFFFF');
    grad.addColorStop(0.8, C.ball);
    grad.addColorStop(1, C.ballShade);
    ctx.fillStyle = grad;
    ctx.fill();

    // Highlight
    ctx.beginPath();
    ctx.arc(ball.x - 2.5, ball.y - 2.5, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fill();
}

function drawGuideline() {
    if (aim.power < 0.05) return;
    const cue = getEquippedCue();
    const guidelineCap = cue.guidelineCap;

    const dirX = -Math.cos(aim.angle);
    const dirY = -Math.sin(aim.angle);

    // Guideline length scales with power, capped by equipped cue
    const fullLen = aim.power * GUIDELINE_MAX;
    const visibleLen = Math.min(fullLen, guidelineCap);
    const capped = fullLen > guidelineCap;

    const hit = castRay(ball.x, ball.y, dirX, dirY, visibleLen);
    const rayDist = hit ? hit.t : visibleLen;
    const endX = hit ? hit.x : ball.x + dirX * visibleLen;
    const endY = hit ? hit.y : ball.y + dirY * visibleLen;

    // Primary guideline (solid dashes)
    ctx.beginPath();
    ctx.moveTo(ball.x, ball.y);
    ctx.lineTo(endX, endY);
    ctx.strokeStyle = C.guidelineWhite;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Cap indicator: dotted line beyond the visible guideline
    if (capped && !hit) {
        const extraLen = 40;
        const capStartX = endX;
        const capStartY = endY;
        const capEndX = capStartX + dirX * extraLen;
        const capEndY = capStartY + dirY * extraLen;

        ctx.beginPath();
        ctx.moveTo(capStartX, capStartY);
        ctx.lineTo(capEndX, capEndY);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([2, 6]);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // Reflection guideline
    if (hit) {
        const dot = dirX * hit.nx + dirY * hit.ny;
        const refX = dirX - 2 * dot * hit.nx;
        const refY = dirY - 2 * dot * hit.ny;

        // Reflection also limited by remaining visible budget
        const refBudget = Math.min(visibleLen - rayDist, guidelineCap * 0.4);
        if (refBudget > 10) {
            ctx.beginPath();
            ctx.moveTo(hit.x, hit.y);
            ctx.lineTo(hit.x + refX * refBudget, hit.y + refY * refBudget);
            ctx.strokeStyle = C.guidelineBounce;
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        ctx.beginPath();
        ctx.arc(hit.x, hit.y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fill();
    }
}

function drawCueStick() {
    const cue = getEquippedCue();
    const gap = 12 + aim.power * 70;

    ctx.save();
    ctx.translate(ball.x, ball.y);
    ctx.rotate(aim.angle);

    const startX = gap;
    const endX = gap + cue.length;

    // Glow effect for gold cue
    if (cue.glow) {
        ctx.shadowColor = cue.colors.highlight;
        ctx.shadowBlur = 12;
    }

    // Cue body (tapered)
    ctx.beginPath();
    ctx.moveTo(startX, -cue.tipWidth / 2);
    ctx.lineTo(endX, -cue.buttWidth / 2);
    ctx.lineTo(endX, cue.buttWidth / 2);
    ctx.lineTo(startX, cue.tipWidth / 2);
    ctx.closePath();

    const grad = ctx.createLinearGradient(startX, 0, endX, 0);
    grad.addColorStop(0, cue.colors.tip);
    grad.addColorStop(0.15, cue.colors.wood);
    grad.addColorStop(0.85, cue.colors.wood);
    grad.addColorStop(1, cue.colors.butt);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Accent stripe
    if (cue.id !== 'starter') {
        const midX = startX + (endX - startX) * 0.4;
        ctx.fillStyle = cue.colors.highlight;
        ctx.fillRect(midX, -cue.tipWidth / 2 - 0.5, 4, cue.tipWidth + 1);
    }

    // Tip highlight
    ctx.fillStyle = '#fff';
    ctx.fillRect(startX, -1.5, 3, 3);

    ctx.restore();
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════
let lastTime = 0;

function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    if (!paused && state !== 'TITLE' && state !== 'LEVEL_SELECT') {
        time += dt;
        if (level) updateCachedWalls();
        updateBall(dt);
        updateParticles();
    }

    draw();
    requestAnimationFrame(gameLoop);
}

lastTime = performance.now();
requestAnimationFrame(gameLoop);

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
showTitle();
</script>

    import { initTracking } from '../firebase-tracker.js';
    initTracking('pool-battle');
</script>
