<body>
    <a href="../" class="back-link">← All Games</a>

    <canvas id="game-canvas"></canvas>

    <!-- Title Screen -->
    <div id="title-screen" class="overlay">
        <div class="title">POOL BATTLE</div>
        <div class="subtitle">Mini-golf meets billiards</div>
        <button class="btn" onclick="startGame()" style="margin-bottom:10px">LEVELS</button>
        <button class="btn" style="background:linear-gradient(180deg,#e63946,#b22222);border-color:#e63946;box-shadow:0 4px 20px rgba(230,57,70,0.4)" onclick="startRush()">⚡ RUSH MODE</button>
    </div>

    <!-- Level Select -->
    <div id="level-select" class="overlay hidden">
        <div class="ls-title">SELECT LEVEL</div>
        <div class="levels-grid" id="levels-grid"></div>
        <div style="display:flex;gap:10px;margin-top:28px">
            <button class="btn btn-small" onclick="openShop()">🪙 SHOP</button>
            <button class="btn btn-small" onclick="openInventory()">🎱 CUES</button>
            <button class="btn btn-small btn-outline" onclick="showTitle()">BACK</button>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud" class="hidden">
        <div class="hud-left">
            <div class="hud-level" id="hud-level-name"></div>

        <div class="hud-right">
            <div class="hud-pause" onclick="togglePause()">⏸</div>
        </div>
    </div>

    <!-- Spin Selector -->
    <div id="spin-selector" class="hidden">
        <canvas id="spin-canvas" width="160" height="160"></canvas>
    </div>

    <!-- Power Bar -->
    <div id="power-bar" class="hidden">
        <div id="power-fill" style="height:0%"></div>
    </div>

    <!-- Pause Menu -->
    <div id="pause-menu" class="overlay hidden">
        <div class="pause-title">PAUSED</div>
        <button class="btn btn-small" onclick="togglePause()">RESUME</button>
        <button class="btn btn-small btn-outline" onclick="restartLevel()">RESTART</button>
        <button class="btn btn-small btn-outline" onclick="exitToLevelSelect()">LEVEL SELECT</button>
    </div>

    <!-- Level Failed -->
    <div id="level-failed" class="overlay hidden">
        <div class="lf-title">LEVEL FAILED</div>
        <div class="lf-msg" id="lf-msg">Out of strokes!</div>
        <button class="btn btn-small" onclick="restartLevel()">RETRY</button>
        <button class="btn btn-small btn-outline" onclick="exitToLevelSelect()">LEVEL SELECT</button>
    </div>

    <!-- Shop -->
    <div id="shop" class="overlay hidden">
        <div class="shop-title">CUE SHOP</div>
        <div class="shop-coins" id="shop-coins">🪙 0</div>
        <div class="shop-grid" id="shop-grid"></div>
        <button class="btn btn-small btn-outline" style="margin-top:20px" onclick="closeShop()">BACK</button>
    </div>

    <!-- Rush HUD -->
    <div id="rush-hud" class="hidden">
        <div class="rush-timer" id="rush-timer">0:00.0</div>
        <div class="rush-progress" id="rush-progress">1 / 3</div>
    </div>

    <!-- Rush Leaderboard -->
    <div id="rush-leaderboard" class="overlay hidden">
        <div class="rl-title">⚡ RUSH RESULTS</div>
        <table class="rl-table" id="rl-table"></table>
        <button class="btn btn-small" onclick="startRush()">PLAY AGAIN</button>
        <button class="btn btn-small btn-outline" style="margin-top:8px" onclick="showTitle()">MENU</button>
    </div>

    <!-- Inventory -->
    <div id="inventory" class="overlay hidden">
        <div class="inv-title">INVENTORY</div>
        <div class="inv-scroll" id="inv-list"></div>
        <button class="btn btn-small btn-outline" style="margin-top:16px" onclick="closeInventory()">BACK</button>
    </div>

    <!-- Level Complete -->
    <div id="level-complete" class="overlay hidden">
        <div class="lc-title">LEVEL COMPLETE!</div>
        <div class="lc-stars" id="lc-stars"></div>
        <div class="lc-stats" id="lc-stats"></div>
        <button class="btn btn-small" id="lc-next-btn" onclick="nextLevel()">NEXT LEVEL</button>
        <button class="btn btn-small btn-outline" onclick="restartLevel()">RETRY</button>
        <button class="btn btn-small btn-outline" onclick="exitToLevelSelect()">LEVEL SELECT</button>
    </div>

    return CUES.find(c => c.id === progress.equippedCue) || CUES[0];

// Returns effective spin values scaled by cue stats
function getEffectiveSpin(cue) {
    return {
        x: spin.x * (spin.x > 0 ? cue.rightSpin : spin.x < 0 ? cue.leftSpin : 1),
        y: spin.y * (spin.y > 0 ? cue.backSpin : spin.y < 0 ? cue.topSpin : 1)
    };
}

        if (d && d.version === 1) {
            if (d.coins == null) d.coins = 0;
            if (!d.ownedCues) d.ownedCues = ['starter'];
            if (!d.equippedCue) d.equippedCue = 'starter';
            return d;
        }
    } catch(e) {}
    return { version: 1, levels: { 1: { unlocked: true, stars: 0, best: null } }, coins: 0, ownedCues: ['starter'], equippedCue: 'starter' };
}

//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════
function resize() {
    dpr = window.devicePixelRatio || 1;
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    if (level) setupCamera();
}
window.addEventListener('resize', resize);
resize();

function isPortrait() { return H > W; }

function setupCamera() {
    if (!level) return;
    const pad = 60;
    const zx = (W - pad * 2) / level.width;
    const zy = (H - pad * 2) / level.height;
    const fitZoom = Math.min(zx, zy, 1.4);

    if (isPortrait()) {
        // In portrait, use a higher zoom so things are visible,
        // then follow the ball. Min zoom = fit, max = 1.4
        const portraitZoom = Math.max(fitZoom, Math.min(zx * 1.2, 1.4));
        camera.zoom = portraitZoom;
        // Center on ball initially
        camera.targetX = W / 2 - ball.x * camera.zoom;
        camera.targetY = H / 2 - ball.y * camera.zoom;
        clampCamera();
        camera.x = camera.targetX;
        camera.y = camera.targetY;
    } else {
        camera.zoom = fitZoom;
        camera.x = (W / 2) - (level.width / 2) * camera.zoom;
        camera.y = (H / 2) - (level.height / 2) * camera.zoom;
        camera.targetX = camera.x;
        camera.targetY = camera.y;
    }
}

function clampCamera() {
    const lw = level.width * camera.zoom;
    const lh = level.height * camera.zoom;
    const pad = 20;
    if (lw <= W) {
        camera.targetX = (W - lw) / 2;
    } else {
        camera.targetX = Math.min(pad, Math.max(W - lw - pad, camera.targetX));
    }
    if (lh <= H) {
        camera.targetY = (H - lh) / 2;
    } else {
        camera.targetY = Math.min(pad, Math.max(H - lh - pad, camera.targetY));
    }
}

function updateCamera() {
    if (!level || !isPortrait()) return;
    // Follow ball
    camera.targetX = W / 2 - ball.x * camera.zoom;
    camera.targetY = H / 2 - ball.y * camera.zoom;
    clampCamera();
    // Smooth lerp
    camera.x += (camera.targetX - camera.x) * 0.1;
    camera.y += (camera.targetY - camera.y) * 0.1;
}

function toScreen(wx, wy) {
    return {
        x: wx * camera.zoom + camera.x,
        y: wy * camera.zoom + camera.y
    };
}

// ═══════════════════════════════════════════════════════════
//  LEVEL MANAGEMENT
// ═══════════════════════════════════════════════════════════
// Rotate a landscape level 90° clockwise to make it portrait
function rotateLevelToPortrait(lv) {
    const ow = lv.width;
    lv.width = lv.height;
    lv.height = ow;
    // Rotate point: (x,y) → (y, ow - x)
    function rp(x, y) { return { x: y, y: ow - x }; }

    const rb = rp(lv.ball.x, lv.ball.y);
    lv.ball.x = rb.x; lv.ball.y = rb.y;
    const rh = rp(lv.hole.x, lv.hole.y);
    lv.hole.x = rh.x; lv.hole.y = rh.y;

    for (const w of lv.walls) {
        const p1 = rp(w.x1, w.y1), p2 = rp(w.x2, w.y2);
        w.x1 = p1.x; w.y1 = p1.y; w.x2 = p2.x; w.y2 = p2.y;
    }
    for (const obs of lv.obstacles) {
        if (obs.type === 'sand' || obs.type === 'water') {
            const corner = rp(obs.x + obs.w, obs.y);
            const nw = obs.h, nh = obs.w;
            obs.x = corner.x; obs.y = corner.y;
            obs.w = nw; obs.h = nh;
        } else if (obs.type === 'bumper') {
            const p = rp(obs.cx, obs.cy);
            obs.cx = p.x; obs.cy = p.y;
        } else if (obs.type === 'movingWall') {
            const p1 = rp(obs.x1, obs.y1), p2 = rp(obs.x2, obs.y2);
            obs.x1 = p1.x; obs.y1 = p1.y; obs.x2 = p2.x; obs.y2 = p2.y;
            obs.axis = obs.axis === 'x' ? 'y' : 'x';
        }
    }
}

function loadLevel(idx) {
    const src = LEVELS[idx];
    currentLevelIdx = idx;
    strokes = 0;
    time = 0;
    particles = [];
    if (holeCompleteTimer) { clearTimeout(holeCompleteTimer); holeCompleteTimer = null; }

    level = JSON.parse(JSON.stringify(src));

    // On portrait screens, rotate landscape levels
    if (isPortrait() && level.width > level.height) {
        rotateLevelToPortrait(level);
    }

    // Generate boundary walls
    const bw = [
        { x1: 0, y1: 0, x2: level.width, y2: 0 },
        { x1: level.width, y1: 0, x2: level.width, y2: level.height },
        { x1: level.width, y1: level.height, x2: 0, y2: level.height },
        { x1: 0, y1: level.height, x2: 0, y2: 0 },
    ];
    level.allWalls = [...bw, ...level.walls];

    // Pre-generate sand dot positions
    for (const obs of level.obstacles) {
        if (obs.type === 'sand') {
            obs._dots = [];
            for (let i = 0; i < 20; i++) {
                obs._dots.push({ x: obs.x + Math.random() * obs.w, y: obs.y + Math.random() * obs.h });
            }
        }
    }

    ball.x = level.ball.x;
    ball.y = level.ball.y;
    ball.vx = 0; ball.vy = 0;
    ball.lastSafeX = ball.x;
    ball.lastSafeY = ball.y;
    spin.x = 0; spin.y = 0;
    aim.isDragging = false;
    aim.power = 0;

    setupCamera();
    cacheFelt();
    updateHUD();
    state = 'PLAYING';

    show('hud'); show('spin-selector');
    hide('title-screen'); hide('level-select');
    hide('level-complete'); hide('pause-menu');
    hide('power-bar');
    drawSpinSelector();
}

function cacheFelt() {
    feltCanvas = document.createElement('canvas');
    feltCanvas.width = level.width;
    feltCanvas.height = level.height;
    const fc = feltCanvas.getContext('2d');

    fc.fillStyle = C.felt;
    fc.fillRect(0, 0, level.width, level.height);
    fc.fillStyle = C.feltPattern;
    for (let x = 0; x < level.width; x += 20) {
        for (let y = 0; y < level.height; y += 20) {
            if ((x + y) % 40 === 0) fc.fillRect(x, y, 20, 20);
        }
    }
}

function hide(id) { document.getElementById(id).classList.add('hidden'); }

function showTitle() {
    state = 'TITLE';
    rushMode = false;
    hide('hud'); hide('spin-selector'); hide('power-bar');
    hide('level-select'); hide('level-complete'); hide('pause-menu');
    hide('rush-hud'); hide('rush-leaderboard');

    showLevelSelect();
}

    state = 'LEVEL_SELECT';
    hide('hud'); hide('spin-selector'); hide('power-bar');
    hide('pause-menu'); hide('level-complete');
    show('level-select');
    renderLevelGrid();
}

function renderLevelGrid() {
    const grid = document.getElementById('levels-grid');
    grid.innerHTML = '';
    LEVELS.forEach((lv, i) => {
        const p = progress.levels[lv.id] || { unlocked: false, stars: 0 };
        const div = document.createElement('div');
        div.className = 'level-btn' + (p.unlocked ? '' : ' locked');
        if (p.unlocked) {
            const starStr = p.stars > 0
                ? '★'.repeat(p.stars) + '☆'.repeat(3 - p.stars)
                : '';
            div.innerHTML = `
                ${lv.hard ? '<div class="hard-badge">HARD</div>' : ''}

                <div class="level-name">${lv.name}</div>
                <div class="stars" style="color:#e6c619">${starStr}</div>
            `;
            div.onclick = () => loadLevel(i);
        } else {
            div.innerHTML = `<div class="lock-icon">🔒</div><div class="level-name">${lv.name}</div>`;
        }

    });
}

    if (!level) return;
    document.getElementById('hud-level-name').textContent = `Level ${level.id}: ${level.name}`;
    document.getElementById('hud-strokes').textContent = `Strokes: ${strokes}`;
    document.getElementById('hud-par').textContent = `Par: ${level.par}  |  Max: ${level.maxStrokes}`;
    document.getElementById('hud-coins').textContent = `🪙 ${progress.coins}`;
}

function togglePause() {
    if (state === 'BALL_MOVING') return;
    if (paused) {
        paused = false;
        hide('pause-menu');
        state = 'PLAYING';
    } else {
        paused = true;
        show('pause-menu');
        state = 'PAUSED';
    }
}

function restartLevel() {
    hide('pause-menu'); hide('level-complete'); hide('level-failed');
    paused = false;
    loadLevel(currentLevelIdx);
}

function exitToLevelSelect() {
    paused = false;
    hide('pause-menu'); hide('level-complete'); hide('level-failed');
    showLevelSelect();
}

function openShop() {
    hide('level-select');
    show('shop');

}

function closeShop() {

    show('level-select');
    renderLevelGrid();
}

function statBar(label, value, max, color) {
    const pct = Math.min(100, (value / max) * 100);
    return `<div class="stat-row">
        <span class="stat-label">${label}</span>
        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
}

function cueStatBars(cue) {
    return statBar('PWR', cue.maxPower, 26, '#e63946') +
           statBar('AIM', cue.guidelineCap, 520, '#4A9BE4') +
           statBar('TOP', cue.topSpin, 2.5, '#4ade80') +
           statBar('BACK', cue.backSpin, 2.5, '#e6c619') +
           statBar('LEFT', cue.leftSpin, 2.5, '#DA70D6') +
           statBar('RIGHT', cue.rightSpin, 2.5, '#DA70D6');
}

function renderShop() {
    document.getElementById('shop-coins').textContent = `🪙 ${progress.coins}`;
    const grid = document.getElementById('shop-grid');
    grid.innerHTML = '';
    for (const cue of CUES) {
        const owned = progress.ownedCues.includes(cue.id);
        const equipped = progress.equippedCue === cue.id;
        const canAfford = progress.coins >= cue.price;

        const card = document.createElement('div');
        card.className = 'cue-card' + (equipped ? ' equipped' : '');

        const previewStyle = `background:linear-gradient(90deg, ${cue.colors.tip}, ${cue.colors.wood} 15%, ${cue.colors.wood} 85%, ${cue.colors.butt})`;

        let btnHtml;
        if (equipped) {
            btnHtml = `<button class="btn btn-small btn-equipped">EQUIPPED</button>`;
        } else if (owned) {
            btnHtml = `<button class="btn btn-small" onclick="equipCue('${cue.id}')">EQUIP</button>`;
        } else if (canAfford) {
            btnHtml = `<button class="btn btn-small" onclick="buyCue('${cue.id}')">BUY</button>`;
        } else {
            btnHtml = `<button class="btn btn-small btn-outline" style="opacity:0.4;cursor:default">🪙 ${cue.price}</button>`;
        }

        card.innerHTML = `
            <div class="cue-name">${cue.name}</div>
            <div class="cue-preview" style="${previewStyle}"></div>
            <div class="inv-stats">${cueStatBars(cue)}</div>
            ${owned ? '' : `<div class="cue-price">🪙 ${cue.price}</div>`}
            ${btnHtml}
        `;
        grid.appendChild(card);
    }
}

    show('inventory');

}

function closeInventory() {
    hide('inventory');
    show('level-select');

}

function renderInventory() {
    const list = document.getElementById('inv-list');
    list.innerHTML = '';
    const ownedCues = CUES.filter(c => progress.ownedCues.includes(c.id));
    for (const cue of ownedCues) {
        const equipped = progress.equippedCue === cue.id;
        const div = document.createElement('div');
        div.className = 'inv-cue' + (equipped ? ' equipped' : '');

        const previewStyle = `background:linear-gradient(90deg, ${cue.colors.tip}, ${cue.colors.wood} 15%, ${cue.colors.wood} 85%, ${cue.colors.butt})`;

        div.innerHTML = `
            <div class="inv-cue-header">
                <span class="inv-cue-name">${cue.name}</span>
                ${equipped
                    ? '<span style="font-size:11px;color:#1a7a3a;font-weight:700">EQUIPPED</span>'
                    : `<button class="btn btn-small" style="font-size:11px;padding:4px 14px" onclick="equipCueInv('${cue.id}')">EQUIP</button>`
                }
            </div>
            <div class="inv-cue-preview" style="${previewStyle}"></div>
            <div class="inv-stats">${cueStatBars(cue)}</div>
        `;
        list.appendChild(div);
    }
    if (ownedCues.length === 0) {
        list.innerHTML = '<div style="color:#5a9a72;text-align:center;padding:20px">No cues yet. Buy one from the shop!</div>';

function equipCueInv(id) {
    if (!progress.ownedCues.includes(id)) return;
    progress.equippedCue = id;
    saveProgress();
    renderInventory();
}

function buyCue(id) {
    const cue = CUES.find(c => c.id === id);
    if (!cue || progress.coins < cue.price) return;
    progress.coins -= cue.price;
    progress.ownedCues.push(cue.id);
    progress.equippedCue = cue.id;
    saveProgress();
    renderShop();
}

function equipCue(id) {
    if (!progress.ownedCues.includes(id)) return;
    progress.equippedCue = id;
    saveProgress();
    renderShop();
}

function failLevel() {
    if (rushMode) return; // no fail in rush mode — time is the penalty
    state = 'LEVEL_FAILED';
    hide('spin-selector'); hide('power-bar');
    document.getElementById('lf-msg').textContent = `Used ${strokes} of ${level.maxStrokes} strokes`;
    show('level-failed');
}

function nextLevel() {
    if (currentLevelIdx + 1 < LEVELS.length) {
        loadLevel(currentLevelIdx + 1);
    } else {
        showLevelSelect();
    }
}

function completeLevel() {
    if (rushMode) {
        rushPlayerSunk();
        return;
    }
    state = 'LEVEL_COMPLETE';
    hide('spin-selector'); hide('power-bar');

    const diff = strokes - level.par;
    let stars = 0;
    if (diff <= 0) stars = 3;
    else if (diff === 1) stars = 2;
    else if (diff === 2) stars = 1;

    // Update progress
    const p = progress.levels[level.id] || { unlocked: true, stars: 0, best: null };
    p.unlocked = true;

    // Coin reward — only for new star improvements
    const oldStars = p.stars || 0;
    const COIN_BY_STARS = [5, 10, 20, 30]; // 0★, 1★, 2★, 3★
    const coinReward = stars > oldStars
        ? COIN_BY_STARS[stars] - COIN_BY_STARS[oldStars]
        : 0;
    progress.coins += coinReward;

    if (stars > p.stars) p.stars = stars;
    if (p.best === null || strokes < p.best) p.best = strokes;
    progress.levels[level.id] = p;

    // Unlock next
    const nextId = level.id + 1;
    if (nextId <= LEVELS.length) {
        if (!progress.levels[nextId]) progress.levels[nextId] = { unlocked: true, stars: 0, best: null };
        else progress.levels[nextId].unlocked = true;
    }
    saveProgress();

    // Show overlay
    const starStr = '★'.repeat(stars) + '☆'.repeat(3 - stars);
    document.getElementById('lc-stars').textContent = starStr;
    document.getElementById('lc-stars').style.color = '#e6c619';
    document.getElementById('lc-stats').innerHTML =
        `Strokes: ${strokes}<br>Par: ${level.par}` +
        (diff <= 0 ? '<br><span style="color:#1a7a3a">Perfect!</span>' : '') +
        (coinReward > 0 ? `<br><span style="color:#e6c619">+${coinReward} 🪙</span>` : '');
    document.getElementById('lc-next-btn').style.display =
        (currentLevelIdx + 1 < LEVELS.length) ? 'inline-block' : 'none';
    show('level-complete');
}

// ═══════════════════════════════════════════════════════════
//  PHYSICS
// ═══════════════════════════════════════════════════════════

function getMovingWalls() {
    if (!level) return [];
    const mwalls = [];
    for (const obs of level.obstacles) {
        if (obs.type !== 'movingWall') continue;
        const offset = Math.sin(time * obs.speed + (obs.phase || 0)) * obs.range;
        if (obs.axis === 'y') {
            mwalls.push({
                x1: obs.x1, y1: obs.y1 + offset,
                x2: obs.x2, y2: obs.y2 + offset,
                moving: true
            });
        } else {
            mwalls.push({
                x1: obs.x1 + offset, y1: obs.y1,
                x2: obs.x2 + offset, y2: obs.y2,
                moving: true
            });
        }
    }
    return mwalls;
}

function updateCachedWalls() {
    cachedWalls = [...level.allWalls, ...getMovingWalls()];
}

// Closest point on segment to a point
function closestPointOnSeg(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return { x: x1, y: y1 };
    let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    return { x: x1 + t * dx, y: y1 + t * dy };
}

// Wall collision & response
function collideWalls() {
    const hit = bounceOffWalls(ball);
    if (hit) {
        // Side spin effect on bounce (scaled by cue)
        const tx = -hit.ny, ty = hit.nx;
        const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
        const eSpin = getEffectiveSpin(getEquippedCue());
        ball.vx += tx * eSpin.x * speed * 0.45;
        ball.vy += ty * eSpin.x * speed * 0.45;

        // Particle at ball position (pushed out to wall surface)
        spawnParticles(ball.x - hit.nx * BALL_RADIUS, ball.y - hit.ny * BALL_RADIUS, 3, '#fff', 1.5);
    }
}

// Bumper collision
function collideBumpers() {
    for (const obs of level.obstacles) {
        if (obs.type !== 'bumper') continue;
        const dx = ball.x - obs.cx;
        const dy = ball.y - obs.cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = BALL_RADIUS + obs.radius;
        if (dist < minDist && dist > 0) {
            const nx = dx / dist;
            const ny = dy / dist;
            ball.x = obs.cx + nx * minDist;
            ball.y = obs.cy + ny * minDist;

            const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
            ball.vx = nx * speed * BUMPER_RESTITUTION;
            ball.vy = ny * speed * BUMPER_RESTITUTION;

            spawnParticles(obs.cx + nx * obs.radius, obs.cy + ny * obs.radius, 6, C.bumperGlow, 2);
        }
    }
}

// Check if ball is in a zone
function inZone(zone) {
    return pointInZone(zone, ball.x, ball.y);
}

// Check water hazards
function checkWater() {
    for (const obs of level.obstacles) {
        if (obs.type !== 'water') continue;
        if (inZone(obs)) {
            // Splash
            spawnParticles(ball.x, ball.y, 12, C.waterLight, 3);
            // Reset
            ball.x = ball.lastSafeX;
            ball.y = ball.lastSafeY;
            ball.vx = 0; ball.vy = 0;
            strokes++;
            updateHUD();
            state = 'PLAYING';
            show('spin-selector');
            return true;
        }
    }
    return false;
}

// Get friction at ball position
function getSurfaceFriction() {
    for (const obs of level.obstacles) {
        if (obs.type === 'sand' && inZone(obs)) return SAND_FRICTION;
    }
    return FRICTION;
}

// Check hole
function ballSpeed() {
    return Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
}

function checkHole() {
    const dx = ball.x - level.hole.x;
    const dy = ball.y - level.hole.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const speed = ballSpeed();
    if (dist < HOLE_RADIUS - BALL_RADIUS * 0.3 && speed < HOLE_CAPTURE_SPEED) {
        ball.vx = 0; ball.vy = 0;
        ball.x = level.hole.x; ball.y = level.hole.y;
        spawnParticles(level.hole.x, level.hole.y, 15, '#e6c619', 3);
        // Rush mode: short delay to see sink, then advance. Normal: 400ms celebration.
        holeCompleteTimer = setTimeout(completeLevel, rushMode ? 50 : 400);
        state = 'BALL_SINKING'; // prevent further input/physics until completeLevel fires
        return true;
    }
    if (dist < HOLE_RADIUS && speed < HOLE_CAPTURE_SPEED * 1.5) {
        const pull = 0.15;
        ball.vx -= (dx / dist) * pull;
        ball.vy -= (dy / dist) * pull;
    }
    return false;
}

function isOverWater() {
    for (const obs of level.obstacles) {
        if (obs.type === 'water' && inZone(obs)) return true;
    }
    return false;
}

// dt-scaled friction: convert per-frame multiplier to dt-independent
function applyFriction(fric, dt) {
    const scale = dt * 60; // normalize to 60fps
    const f = Math.pow(fric, scale);
    ball.vx *= f;
    ball.vy *= f;
}

function updateBall(dt) {
    if (state !== 'BALL_MOVING') return;

    const scale = dt * 60;

    const cue = getEquippedCue();
    const eSpin = getEffectiveSpin(cue);

    // Apply side spin curve — scales with speed so it fades as ball slows
    const speed = ballSpeed();
    if (speed > MIN_SPEED && eSpin.x !== 0) {
        const curve = eSpin.x * 0.005 * speed * scale;
        ball.vx += -ball.vy / speed * curve;
        ball.vy += ball.vx / speed * curve;
    }

    // Move (dt-scaled)
    ball.x += ball.vx * scale;
    ball.y += ball.vy * scale;

    // Out of bounds check - reset ball if it escapes
    if (ball.x < -BALL_RADIUS * 2 || ball.x > level.width + BALL_RADIUS * 2 ||
        ball.y < -BALL_RADIUS * 2 || ball.y > level.height + BALL_RADIUS * 2) {
        ball.x = ball.lastSafeX;
        ball.y = ball.lastSafeY;
        ball.vx = 0; ball.vy = 0;
        state = 'PLAYING';
        show('spin-selector');
        return;
    }

    // Friction — top spin reduces, back spin increases
    let fric = getSurfaceFriction();
    fric -= eSpin.y * 0.015;
    fric = Math.max(0.92, Math.min(0.998, fric));
    applyFriction(fric, dt);

    // Back spin reversal — kicks in at moderate speed
    if (eSpin.y < -0.2 && speed < 4 && speed > MIN_SPEED) {
        const rev = eSpin.y * 0.15 * scale;
        ball.vx += ball.vx / (speed || 1) * rev;
        ball.vy += ball.vy / (speed || 1) * rev;
    }

    // Decay spin (slower decay so effect lasts longer)
    const spinDecay = Math.pow(0.998, scale);
    spin.x *= spinDecay;
    spin.y *= spinDecay;

    // Collisions
    collideWalls();
    collideBumpers();

    // Hazards + safe position update (merged check)
    if (checkWater()) return;
    if (!isOverWater()) {
        ball.lastSafeX = ball.x;
        ball.lastSafeY = ball.y;
    }

    if (checkHole()) return;

    if (ballSpeed() < MIN_SPEED) {
        ball.vx = 0; ball.vy = 0;
        if (level.maxStrokes && strokes >= level.maxStrokes) {
            failLevel();
        } else {
            state = 'PLAYING';
            show('spin-selector');
        }
    }
}

// ═══════════════════════════════════════════════════════════
//  RAY CASTING (for guideline)
// ═══════════════════════════════════════════════════════════
function raySegIntersect(ox, oy, dx, dy, x1, y1, x2, y2) {
    const sx = x2 - x1, sy = y2 - y1;
    const denom = dx * sy - dy * sx;
    if (Math.abs(denom) < 1e-8) return null;
    const t = ((x1 - ox) * sy - (y1 - oy) * sx) / denom;
    const u = ((x1 - ox) * dy - (y1 - oy) * dx) / denom;
    if (t > 0.01 && u >= 0 && u <= 1) {
        return { t, x: ox + dx * t, y: oy + dy * t, nx: sy / Math.sqrt(sx*sx+sy*sy), ny: -sx / Math.sqrt(sx*sx+sy*sy) };
    }
    return null;
}

function castRay(ox, oy, dirX, dirY, maxDist) {
    let closest = null;
    let minT = maxDist;
    for (const w of cachedWalls) {
        const hit = raySegIntersect(ox, oy, dirX, dirY, w.x1, w.y1, w.x2, w.y2);
        if (hit && hit.t < minT) {
            minT = hit.t;
            closest = hit;
        }
    }
    // Also check bumpers (approximate as not reflecting, just endpoint)
    return closest;
}

// ═══════════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════════
function spawnParticles(x, y, count, color, speed) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = (0.5 + Math.random()) * speed;
        particles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd,
            life: 1,
            decay: 0.02 + Math.random() * 0.03,
            color,
            radius: 2 + Math.random() * 3
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.95;
        p.vy *= 0.95;
        p.life -= p.decay;
        if (p.life <= 0) {
            particles[i] = particles[particles.length - 1];
            particles.pop();
        }
    }
}

// ═══════════════════════════════════════════════════════════
//  SPIN SELECTOR
// ═══════════════════════════════════════════════════════════
function drawSpinSelector() {
    const c = spinCtx;
    const w = 160, h = 160;
    c.clearRect(0, 0, w, h);

    // Outer ring
    c.beginPath();
    c.arc(80, 80, 60, 0, Math.PI * 2);
    c.fillStyle = 'rgba(10, 30, 18, 0.8)';
    c.fill();
    c.strokeStyle = '#2a5a3a';
    c.lineWidth = 2;
    c.stroke();

    // Ball circle
    c.beginPath();
    c.arc(80, 80, 30, 0, Math.PI * 2);
    const grad = c.createRadialGradient(78, 78, 2, 80, 80, 30);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(1, '#ccc');
    c.fillStyle = grad;
    c.fill();

    // Labels
    c.fillStyle = '#5a9a72';
    c.font = '10px Rajdhani';
    c.textAlign = 'center';
    c.fillText('TOP', 80, 22);
    c.fillText('BACK', 80, 150);
    c.fillText('L', 18, 84);
    c.fillText('R', 142, 84);

    // Spin indicator dot
    const dotX = 80 + spin.x * 25;
    const dotY = 80 + spin.y * 25;
    c.beginPath();
    c.arc(dotX, dotY, 6, 0, Math.PI * 2);
    c.fillStyle = '#e63946';
    c.fill();
    c.strokeStyle = '#fff';
    c.lineWidth = 1.5;
    c.stroke();
}

// Spin selector input
const spinEl = document.getElementById('spin-selector');
function handleSpinStart(e) {
    e.preventDefault();
    e.stopPropagation();
    spinDragging = true;
    updateSpinFromEvent(e);
}
function handleSpinMove(e) {
    if (!spinDragging) return;
    e.preventDefault();
    e.stopPropagation();
    updateSpinFromEvent(e);
}
function handleSpinEnd(e) {
    spinDragging = false;
}
function updateSpinFromEvent(e) {
    const rect = spinEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const radius = rect.width / 2;
    spin.x = Math.max(-1, Math.min(1, (clientX - cx) / radius));
    spin.y = Math.max(-1, Math.min(1, (clientY - cy) / radius));
    drawSpinSelector();
}

spinEl.addEventListener('mousedown', handleSpinStart);
spinEl.addEventListener('touchstart', handleSpinStart, { passive: false });
window.addEventListener('mousemove', handleSpinMove);
window.addEventListener('touchmove', handleSpinMove, { passive: false });
window.addEventListener('mouseup', handleSpinEnd);
window.addEventListener('touchend', handleSpinEnd);

// ═══════════════════════════════════════════════════════════
//  AIMING INPUT
// ═══════════════════════════════════════════════════════════
function isInSpinSelector(clientX, clientY) {
    const rect = spinEl.getBoundingClientRect();
    return clientX >= rect.left - 10 && clientX <= rect.right + 10 &&
           clientY >= rect.top - 10 && clientY <= rect.bottom + 10;
}

function handleStart(e) {
    if (state !== 'PLAYING' || paused) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    if (isInSpinSelector(clientX, clientY)) return;
    e.preventDefault();

    aim.isDragging = true;
    aim.curX = clientX;
    aim.curY = clientY;
    aim.power = 0;
    state = 'AIMING';
    show('power-bar');
}

function handleMove(e) {
    if (!aim.isDragging || state !== 'AIMING') return;
    if (spinDragging) return;
    e.preventDefault();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    aim.curX = clientX;
    aim.curY = clientY;

    // Calculate angle from ball screen pos to current touch
    const bs = toScreen(ball.x, ball.y);
    const dx = aim.curX - bs.x;
    const dy = aim.curY - bs.y;
    aim.angle = Math.atan2(dy, dx);

    // Power from distance
    const dist = Math.sqrt(dx * dx + dy * dy);
    aim.power = Math.min(dist / MAX_PULL_DIST, 1);
    powerFillEl.style.height = (aim.power * 100) + '%';
}

function handleEnd(e) {
    if (!aim.isDragging) return;
    aim.isDragging = false;

    if (state !== 'AIMING') return;

    if (aim.power < 0.05) {
        // Too weak, cancel
        state = 'PLAYING';
        hide('power-bar');
        return;
    }

    // Shoot!
    const power = aim.power * getEquippedCue().maxPower;
    // Direction is opposite to where the user is pulling
    ball.vx = -Math.cos(aim.angle) * power;
    ball.vy = -Math.sin(aim.angle) * power;
    ball.lastSafeX = ball.x;
    ball.lastSafeY = ball.y;
    strokes++;
    updateHUD();
    state = 'BALL_MOVING';
    hide('power-bar'); hide('spin-selector');
}

canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('touchstart', handleStart, { passive: false });
window.addEventListener('mousemove', handleMove);
window.addEventListener('touchmove', handleMove, { passive: false });
window.addEventListener('mouseup', handleEnd);
window.addEventListener('touchend', handleEnd);

// ═══════════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════════
function draw() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#0a1a0f';
    ctx.fillRect(0, 0, W, H);

    if (!level || state === 'TITLE' || state === 'LEVEL_SELECT') return;

    ctx.save();
    ctx.translate(camera.x, camera.y);
    ctx.scale(camera.zoom, camera.zoom);

    drawFelt();
    drawObstacles();
    drawWalls();
    drawHole();
    drawBots();
    drawParticles();
    drawBall();

    if (state === 'AIMING') {
        drawGuideline();
        drawCueStick();
    }

    ctx.restore();
}

function drawFelt() {
    ctx.drawImage(feltCanvas, 0, 0);

    // Border/rail
    ctx.strokeStyle = C.rail;
    ctx.lineWidth = 6;
    ctx.strokeRect(-3, -3, level.width + 6, level.height + 6);
    ctx.strokeStyle = C.railLight;
    ctx.lineWidth = 2;
    ctx.strokeRect(-5, -5, level.width + 10, level.height + 10);
}

function drawObstacles() {
    for (const obs of level.obstacles) {
        if (obs.type === 'sand') {
            ctx.fillStyle = C.sand;
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.fillStyle = C.sandDark;
            if (obs._dots) {
                for (const d of obs._dots) ctx.fillRect(d.x, d.y, 1.5, 1.5);
            }
        } else if (obs.type === 'water') {
            // Animated water
            ctx.fillStyle = C.water;
            ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            ctx.fillStyle = C.waterLight;
            const t = time * 0.5;
            for (let i = 0; i < 5; i++) {
                const wx = obs.x + ((i * 37 + t * 20) % obs.w);
                const wy = obs.y + ((i * 23 + Math.sin(t + i) * 8) % obs.h);
                ctx.beginPath();
                ctx.arc(wx, wy, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        } else if (obs.type === 'bumper') {
            const glow = 0.5 + Math.sin(time * 3) * 0.3;
            ctx.beginPath();
            ctx.arc(obs.cx, obs.cy, obs.radius, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(obs.cx, obs.cy, 0, obs.cx, obs.cy, obs.radius);
            grad.addColorStop(0, C.bumperGlow);
            grad.addColorStop(1, C.bumper);
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = `rgba(255, 107, 122, ${glow})`;
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }

    // Moving walls
    const mwalls = getMovingWalls();
    for (const mw of mwalls) {
        ctx.beginPath();
        ctx.moveTo(mw.x1, mw.y1);
        ctx.lineTo(mw.x2, mw.y2);
        ctx.strokeStyle = '#ff9944';
        ctx.lineWidth = 5;
        ctx.stroke();
        ctx.strokeStyle = '#ffbb66';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
}

function drawWalls() {
    ctx.lineCap = 'round';
    for (const w of level.walls) {
        ctx.beginPath();
        ctx.moveTo(w.x1, w.y1);
        ctx.lineTo(w.x2, w.y2);
        ctx.strokeStyle = C.rail;
        ctx.lineWidth = 5;
        ctx.stroke();
        ctx.strokeStyle = C.railLight;
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }
    ctx.lineCap = 'butt';
}

function drawHole() {
    // Shadow
    ctx.beginPath();
    ctx.arc(level.hole.x + 1, level.hole.y + 1, HOLE_RADIUS + 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fill();

    // Hole
    ctx.beginPath();
    ctx.arc(level.hole.x, level.hole.y, HOLE_RADIUS, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(level.hole.x, level.hole.y, 0, level.hole.x, level.hole.y, HOLE_RADIUS);
    grad.addColorStop(0, C.hole);
    grad.addColorStop(0.7, '#111');
    grad.addColorStop(1, '#222');
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.strokeStyle = C.holeRim;
    ctx.lineWidth = 1.5;
    ctx.stroke();
}

function drawBall() {
    // Shadow
    ctx.beginPath();
    ctx.ellipse(ball.x + 2, ball.y + 3, BALL_RADIUS, BALL_RADIUS * 0.6, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fill();

    // Ball
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, BALL_RADIUS);
    grad.addColorStop(0, '#FFFFFF');
    grad.addColorStop(0.8, C.ball);
    grad.addColorStop(1, C.ballShade);
    ctx.fillStyle = grad;
    ctx.fill();

    // Highlight
    ctx.beginPath();
    ctx.arc(ball.x - 2.5, ball.y - 2.5, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fill();
}

function drawGuideline() {
    if (aim.power < 0.05) return;
    const cue = getEquippedCue();
    const guidelineCap = cue.guidelineCap;
    const power = aim.power * cue.maxPower;

    // Simulate ball trajectory with spin
    let sx = ball.x, sy = ball.y;
    let svx = -Math.cos(aim.angle) * power;
    let svy = -Math.sin(aim.angle) * power;
    const eSpinG = getEffectiveSpin(cue);
    let sSpinX = eSpinG.x, sSpinY = eSpinG.y;

    // Simulate path, sampling every 2 iterations for smooth line
    const preBounce = [{ x: sx, y: sy }];
    const postBounce = [];
    let totalDist = 0;
    const maxDist = guidelineCap;
    let bounced = false;
    let bouncePoint = null;
    let stopped = false;

    for (let i = 0; i < 800 && totalDist < maxDist; i++) {
        const spd = Math.sqrt(svx * svx + svy * svy);
        if (spd < MIN_SPEED) { stopped = true; break; }

        if (sSpinX !== 0) {
            const curve = sSpinX * 0.005 * spd;
            svx += -svy / spd * curve;
            svy += svx / spd * curve;
        }

        let fric = 0.985;
        fric -= sSpinY * 0.015;
        fric = Math.max(0.92, Math.min(0.998, fric));
        svx *= fric; svy *= fric;
        sSpinX *= 0.998; sSpinY *= 0.998;

        const nx = sx + svx;
        const ny = sy + svy;

        let hitWall = false;
        for (const w of cachedWalls) {
            const cp = closestPointOnSeg(nx, ny, w.x1, w.y1, w.x2, w.y2);
            const dx = nx - cp.x, dy = ny - cp.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < BALL_RADIUS && dist > 0) {
                if (bounced) { totalDist = maxDist; break; }
                const wnx = dx / dist, wny = dy / dist;
                const dot = svx * wnx + svy * wny;
                svx = (svx - 2 * dot * wnx) * WALL_RESTITUTION;
                svy = (svy - 2 * dot * wny) * WALL_RESTITUTION;
                const tx = -wny, ty = wnx;
                const bspd = Math.sqrt(svx * svx + svy * svy);
                svx += tx * sSpinX * bspd * 0.45;
                svy += ty * sSpinX * bspd * 0.45;
                sx = cp.x + wnx * BALL_RADIUS;
                sy = cp.y + wny * BALL_RADIUS;
                bouncePoint = { x: sx, y: sy };
                preBounce.push({ x: sx, y: sy });
                bounced = true;
                hitWall = true;
                break;
            }
        }
        if (hitWall) continue;

        const segDist = Math.sqrt((nx - sx) * (nx - sx) + (ny - sy) * (ny - sy));
        totalDist += segDist;
        sx = nx; sy = ny;

        if (i % 2 === 0) {
            (bounced ? postBounce : preBounce).push({ x: sx, y: sy });
        }
    }

    // Draw pre-bounce as solid line
    if (preBounce.length > 1) {
        ctx.beginPath();
        ctx.moveTo(preBounce[0].x, preBounce[0].y);
        for (let i = 1; i < preBounce.length; i++) ctx.lineTo(preBounce[i].x, preBounce[i].y);
        ctx.strokeStyle = C.guidelineWhite;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // Draw bounce marker
    if (bouncePoint) {
        ctx.beginPath();
        ctx.arc(bouncePoint.x, bouncePoint.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.fill();
    }

    // Draw post-bounce as thinner dashed line
    if (postBounce.length > 1) {
        ctx.beginPath();
        ctx.moveTo(postBounce[0].x, postBounce[0].y);
        for (let i = 1; i < postBounce.length; i++) ctx.lineTo(postBounce[i].x, postBounce[i].y);
        ctx.strokeStyle = C.guidelineBounce;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // Stop marker — shows where ball will come to rest
    if (stopped) {
        ctx.beginPath();
        ctx.arc(sx, sy, BALL_RADIUS, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(sx, sy, 2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fill();
    }

    // Cap indicator — trailing dots showing "ball goes further"
    if (!stopped && totalDist >= maxDist) {
        const spd = Math.sqrt(svx * svx + svy * svy);
        if (spd > MIN_SPEED) {
            const ndx = svx / spd, ndy = svy / spd;
            for (let i = 1; i <= 5; i++) {
                const alpha = 0.25 - i * 0.04;
                ctx.beginPath();
                ctx.arc(sx + ndx * i * 10, sy + ndy * i * 10, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                ctx.fill();
            }
        }
    }
}

function drawCueStick() {
    const cue = getEquippedCue();
    const gap = 12 + aim.power * 70;

    ctx.save();
    ctx.translate(ball.x, ball.y);
    ctx.rotate(aim.angle);

    const startX = gap;
    const endX = gap + cue.length;

    // Glow effect for gold cue
    if (cue.glow) {
        ctx.shadowColor = cue.colors.highlight;
        ctx.shadowBlur = 12;
    }

    // Cue body (tapered)
    ctx.beginPath();
    ctx.moveTo(startX, -cue.tipWidth / 2);
    ctx.lineTo(endX, -cue.buttWidth / 2);
    ctx.lineTo(endX, cue.buttWidth / 2);
    ctx.lineTo(startX, cue.tipWidth / 2);
    ctx.closePath();

    const grad = ctx.createLinearGradient(startX, 0, endX, 0);
    grad.addColorStop(0, cue.colors.tip);
    grad.addColorStop(0.15, cue.colors.wood);
    grad.addColorStop(0.85, cue.colors.wood);
    grad.addColorStop(1, cue.colors.butt);
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;

    // Accent stripe
    if (cue.id !== 'starter') {
        const midX = startX + (endX - startX) * 0.4;
        ctx.fillStyle = cue.colors.highlight;
        ctx.fillRect(midX, -cue.tipWidth / 2 - 0.5, 4, cue.tipWidth + 1);
    }

    // Tip highlight
    ctx.fillStyle = '#fff';
    ctx.fillRect(startX, -1.5, 3, 3);

    ctx.restore();
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════
//  RUSH MODE
// ═══════════════════════════════════════════════════════════
let rushMode = false;
let rushTimer = 0;
let rushLevelIdx = 0;
let rushLevels = [];
let rushTotalStrokes = 0;
let rushBots = [];
const BOT_COLORS = ['#e63946', '#4A9BE4', '#e6c619'];
const BOT_NAMES = ['Red', 'Blue', 'Yellow'];
const BOT_SKILLS = [0.7, 1.0, 1.4]; // lower = better (time multiplier)
const rushTimerEl = document.getElementById('rush-timer');
const rushProgressEl = document.getElementById('rush-progress');

// Reusable point-in-zone check (works for bot or any {x,y})
function pointInZone(zone, px, py) {
    return px >= zone.x && px <= zone.x + zone.w &&
           py >= zone.y && py <= zone.y + zone.h;
}

// Bounce any {x,y,vx,vy} entity off walls
function bounceOffWalls(e) {
    for (const w of cachedWalls) {
        const cp = closestPointOnSeg(e.x, e.y, w.x1, w.y1, w.x2, w.y2);
        const dx = e.x - cp.x, dy = e.y - cp.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < BALL_RADIUS && dist > 0) {
            const nx = dx / dist, ny = dy / dist;
            e.x = cp.x + nx * BALL_RADIUS;
            e.y = cp.y + ny * BALL_RADIUS;
            const dot = e.vx * nx + e.vy * ny;
            e.vx = (e.vx - 2 * dot * nx) * WALL_RESTITUTION;
            e.vy = (e.vy - 2 * dot * ny) * WALL_RESTITUTION;
            return { nx, ny };
        }
    }
    return null;
}

function startRush() {
    rushMode = true;
    rushTimer = 0;
    rushLevelIdx = 0;
    rushTotalStrokes = 0;

    // Fisher-Yates shuffle for unbiased level selection
    const pool = LEVELS.filter(l => l.id <= 20).map(l => l.id);
    for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    rushLevels = pool.slice(0, 3);

    rushBots = BOT_NAMES.map((name, i) => ({
        name,
        color: BOT_COLORS[i],
        skill: BOT_SKILLS[i],
        x: 0, y: 0, vx: 0, vy: 0,
        currentLevel: 0,
        strokes: 0,
        shotTimer: 0,
        moving: false,
        sunk: false
    }));

    hide('title-screen'); hide('level-select'); hide('rush-leaderboard');
    loadRushLevel(0);
    show('rush-hud');
}

function loadRushLevel(idx) {
    rushLevelIdx = idx;
    const levelId = rushLevels[idx];
    const srcIdx = LEVELS.findIndex(l => l.id === levelId);
    loadLevel(srcIdx);

    hide('hud');
    show('rush-hud');
    show('spin-selector');
    updateRushHUD();

    // Reset bots to level start — only bots that already completed previous levels
    for (const bot of rushBots) {
        if (bot.currentLevel !== idx) continue;
        bot.x = ball.x; bot.y = ball.y;
        bot.vx = 0; bot.vy = 0;
        bot.shotTimer = 1.0 + Math.random() * 1.5;
        bot.moving = false;
        bot.sunk = false;
    }
}

function updateRushHUD() {
    const mins = Math.floor(rushTimer / 60);
    const secs = rushTimer % 60;
    const timeText = `${mins}:${secs < 10 ? '0' : ''}${secs.toFixed(1)}`;
    if (rushTimerEl.textContent !== timeText) rushTimerEl.textContent = timeText;
    const progText = `${rushLevelIdx + 1} / ${rushLevels.length}`;
    if (rushProgressEl.textContent !== progText) rushProgressEl.textContent = progText;
}

function updateBots(dt) {
    if (!rushMode || !level) return;
    const scale = dt * 60;

    for (const bot of rushBots) {
        if (bot.currentLevel !== rushLevelIdx || bot.sunk) continue;

        if (bot.moving) {
            const spd = Math.sqrt(bot.vx * bot.vx + bot.vy * bot.vy);
            if (spd < MIN_SPEED) {
                bot.vx = 0; bot.vy = 0;
                bot.moving = false;
                bot.shotTimer = 0.5 + Math.random() * 1.0;
                continue;
            }

            // dt-scaled movement and friction
            bot.x += bot.vx * scale;
            bot.y += bot.vy * scale;
            const fric = Math.pow(FRICTION, scale);
            bot.vx *= fric;
            bot.vy *= fric;

            bounceOffWalls(bot);

            // Water check
            for (const obs of level.obstacles) {
                if (obs.type === 'water' && pointInZone(obs, bot.x, bot.y)) {
                    bot.x = level.ball.x; bot.y = level.ball.y;
                    bot.vx = 0; bot.vy = 0;
                    bot.moving = false;
                    bot.strokes++;
                    bot.shotTimer = 0.8 + Math.random() * 0.5;
                    break;
                }
            }

            // Hole check
            const hdx = bot.x - level.hole.x, hdy = bot.y - level.hole.y;
            const hdist = Math.sqrt(hdx * hdx + hdy * hdy);
            if (hdist < HOLE_RADIUS - BALL_RADIUS * 0.3 && spd < HOLE_CAPTURE_SPEED) {
                bot.sunk = true;
                bot.moving = false;
                bot.x = level.hole.x; bot.y = level.hole.y;
            }
        } else {
            bot.shotTimer -= dt;
            if (bot.shotTimer <= 0) {
                botShoot(bot);
            }
        }
    }
}

function botShoot(bot) {
    const dx = level.hole.x - bot.x;
    const dy = level.hole.y - bot.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const baseAngle = Math.atan2(dy, dx);

    const spread = (0.15 + bot.skill * 0.12) * (Math.random() - 0.5);
    const angle = baseAngle + spread;
    const power = Math.min(dist * 0.04 * (0.8 + Math.random() * 0.4), 18);

    bot.vx = Math.cos(angle) * power;
    bot.vy = Math.sin(angle) * power;
    bot.moving = true;
    bot.strokes++;
}

function rushPlayerSunk() {
    rushTotalStrokes += strokes;

    if (rushLevelIdx + 1 < rushLevels.length) {
        // Advance bots that sunk this level
        for (const bot of rushBots) {
            if (bot.sunk && bot.currentLevel === rushLevelIdx) {
                bot.currentLevel = rushLevelIdx + 1;
            }
            // Bots that didn't sink stay on their currentLevel — they won't appear on next level
        }
        loadRushLevel(rushLevelIdx + 1);
    } else {
        finishRush();
    }
}

function formatTime(t) {
    const m = Math.floor(t / 60);
    const rawSecs = t % 60;
    const pad = rawSecs < 10 ? '0' : '';
    return `${m}:${pad}${rawSecs.toFixed(1)}`;
}

function finishRush() {
    state = 'RUSH_DONE';
    rushMode = false;
    hide('spin-selector'); hide('power-bar'); hide('rush-hud'); hide('hud');

    const playerTime = rushTimer;
    const results = [{
        name: 'You', time: playerTime, strokes: rushTotalStrokes, isPlayer: true
    }];

    for (const bot of rushBots) {
        let botTime;
        if (bot.currentLevel >= rushLevels.length - 1 && bot.sunk) {
            botTime = playerTime * (0.7 + bot.skill * 0.5) + (Math.random() - 0.5) * 5;
        } else {
            const levelsLeft = rushLevels.length - bot.currentLevel;
            botTime = playerTime + levelsLeft * 8 * bot.skill + Math.random() * 6;
        }
        botTime = Math.max(botTime, playerTime * 0.6);
        results.push({
            name: bot.name, time: botTime,
            strokes: bot.strokes + Math.max(0, rushLevels.length - bot.currentLevel - 1) * 3,
            isPlayer: false, color: bot.color
        });
    }

    results.sort((a, b) => a.time - b.time);

    const table = document.getElementById('rl-table');
    let html = '<tr><th class="rl-rank">#</th><th>Player</th><th>Time</th><th>Strokes</th></tr>';
    results.forEach((r, i) => {
        const cls = r.isPlayer ? ' class="rl-you"' : '';
        const nameStyle = r.isPlayer ? '' : ` style="color:${r.color}"`;
        html += `<tr${cls}>
            <td class="rl-rank">${i + 1}</td>
            <td${nameStyle}>${r.name}</td>
            <td class="rl-time">${formatTime(r.time)}</td>
            <td>${r.strokes}</td>
        </tr>`;
    });
    table.innerHTML = html;

    const rank = results.findIndex(r => r.isPlayer);
    const coinReward = [15, 8, 4, 1][rank] || 0;
    if (coinReward > 0) {
        progress.coins += coinReward;
        saveProgress();
    }

    show('rush-leaderboard');
}

function drawBots() {
    if (!rushMode || !level) return;
    ctx.globalAlpha = 0.35;
    for (const bot of rushBots) {
        if (bot.currentLevel !== rushLevelIdx) continue;
        ctx.beginPath();
        ctx.arc(bot.x, bot.y, BALL_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = bot.color;
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════
let lastTime = 0;

function gameLoop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;

    if (!paused && state !== 'TITLE' && state !== 'LEVEL_SELECT') {
        time += dt;
        if (rushMode) {
            rushTimer += dt;
            updateRushHUD();
            updateBots(dt);
        }
        if (level) updateCachedWalls();
        updateBall(dt);
        updateParticles();
        updateCamera();
    }

    draw();
    requestAnimationFrame(gameLoop);
}

lastTime = performance.now();
requestAnimationFrame(gameLoop);

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
showTitle();
</script>
