<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1X91H99N2G"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-1X91H99N2G');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Black Hole City</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        canvas { display: block; }
        .back-link {
            position: fixed; top: 12px; left: 12px; z-index: 100;
            color: #fff; text-decoration: none; font-size: 14px;
            background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 6px;
            backdrop-filter: blur(4px);
        }
        .back-link:hover { background: rgba(0,0,0,0.7); }

        #hud {
            position: fixed; top: 0; left: 0; right: 0;
            pointer-events: none; z-index: 50;
            display: none;
        }
        #timer {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 28px; font-weight: 700;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            transition: color 0.3s;
        }
        #timer.warning { color: #ff4444; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }
        #score-box {
            position: absolute; top: 12px; right: 60px;
            color: #fff; text-align: right;
            text-shadow: 0 2px 6px rgba(0,0,0,0.8);
        }
        #score { font-size: 24px; font-weight: 700; }
        #hint {
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.6); font-size: 14px; z-index: 50;
            transition: opacity 1s;
        }

        .overlay {
            position: fixed; inset: 0; z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            color: #fff; text-align: center;
        }
        .overlay h1 { font-size: 42px; margin-bottom: 8px; }
        .overlay .sub { font-size: 16px; opacity: 0.6; margin-bottom: 32px; }
        .overlay .instructions { font-size: 14px; opacity: 0.5; margin-bottom: 24px; }
        .overlay button {
            background: #7c3aed; color: #fff; border: none; padding: 14px 48px;
            font-size: 18px; font-weight: 600; border-radius: 8px; cursor: pointer;
            transition: background 0.2s;
        }
        .overlay button:hover { background: #6d28d9; }

        #game-over-overlay { display: none; }
        #game-over-overlay h1 { color: #f59e0b; }
        #game-over-overlay .final-score { font-size: 64px; font-weight: 800; margin: 8px 0; }
        #game-over-overlay .breakdown { font-size: 14px; opacity: 0.7; margin-bottom: 24px; line-height: 1.8; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">&#8592; All Games</a>

    <div id="hud">
        <div id="timer">2:00</div>
        <div id="score-box">
            <div id="score">0</div>
        </div>
    </div>
    <div id="hint">Drag or WASD to move</div>

    <div id="start-overlay" class="overlay">
        <h1>BLACK HOLE CITY</h1>
        <div class="sub">Consume everything before time runs out</div>
        <div class="instructions">Drag / WASD / Arrow keys to move</div>
        <button id="start-btn">START</button>
    </div>

    <div id="game-over-overlay" class="overlay">
        <h1>TIME'S UP!</h1>
        <div class="final-score" id="final-score">0</div>
        <div class="breakdown" id="breakdown"></div>
        <button id="restart-btn">PLAY AGAIN</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
    (function() {
        // roundRect polyfill for older browsers
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (typeof r === 'number') r = [r];
                const rad = r[0] || 0;
                this.moveTo(x + rad, y);
                this.lineTo(x + w - rad, y);
                this.quadraticCurveTo(x + w, y, x + w, y + rad);
                this.lineTo(x + w, y + h - rad);
                this.quadraticCurveTo(x + w, y + h, x + w - rad, y + h);
                this.lineTo(x + rad, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - rad);
                this.lineTo(x, y + rad);
                this.quadraticCurveTo(x, y, x + rad, y);
                this.closePath();
            };
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ---- Constants ----
        const WORLD_W = 3000, WORLD_H = 3000;
        const ROUND_DURATION = 120;
        const INITIAL_RADIUS = 25;
        const HOLE_BASE_SPEED = 4;

        const TIERS = [
            { types: ['person','cone','hydrant'], minSize: 5, maxSize: 8, mass: 2, count: 250, unlockRadius: 0, colors: ['#ff6b35','#ffd166','#ef476f','#06d6a0'] },
            { types: ['tree','bench','mailbox'], minSize: 10, maxSize: 15, mass: 7, count: 150, unlockRadius: 35, colors: ['#2d6a4f','#52b788','#8b5e3c','#a3b18a'] },
            { types: ['car','truck','bus'], minSize: 18, maxSize: 28, mass: 22, count: 100, unlockRadius: 60, colors: ['#e63946','#457b9d','#f1c453','#2a9d8f','#e76f51'] },
            { types: ['house','shop'], minSize: 35, maxSize: 48, mass: 60, count: 60, unlockRadius: 100, colors: ['#d4a373','#ccd5ae','#a8dadc','#fefae0'] },
            { types: ['building','skyscraper'], minSize: 55, maxSize: 75, mass: 150, count: 30, unlockRadius: 160, colors: ['#6c757d','#adb5bd','#495057','#8d99ae'] },
        ];

        // ---- Size levels ----
        // Each level requires cumulative mass to reach
        const SIZE_LEVELS = [
            { level: 1, massNeeded: 0 },
            { level: 2, massNeeded: 20 },
            { level: 3, massNeeded: 60 },
            { level: 4, massNeeded: 140 },
            { level: 5, massNeeded: 280 },
            { level: 6, massNeeded: 500 },
            { level: 7, massNeeded: 800 },
            { level: 8, massNeeded: 1200 },
            { level: 9, massNeeded: 1800 },
            { level: 10, massNeeded: 2600 },
        ];

        function getSizeLevel(mass) {
            let lvl = 1;
            for (let i = SIZE_LEVELS.length - 1; i >= 0; i--) {
                if (mass >= SIZE_LEVELS[i].massNeeded) { lvl = SIZE_LEVELS[i].level; break; }
            }
            return lvl;
        }

        function getSizeProgress(mass) {
            const lvl = getSizeLevel(mass);
            if (lvl >= SIZE_LEVELS.length) return 1;
            const current = SIZE_LEVELS[lvl - 1].massNeeded;
            const next = SIZE_LEVELS[lvl].massNeeded;
            return (mass - current) / (next - current);
        }

        // ---- State ----
        let state = 'MENU'; // MENU, PLAYING, GAMEOVER
        let hole = { x: WORLD_W/2, y: WORLD_H/2, radius: INITIAL_RADIUS, mass: 0 };
        let camera = { x: 0, y: 0 };
        let objects = [];
        let particles = [];
        let comboTexts = [];
        let score = 0;
        let combo = 0;
        let lastEatTime = 0;
        let timeLeft = ROUND_DURATION;
        let lastTimestamp = 0;
        let swirlAngle = 0;
        let shakeFrames = 0;
        let consumed = [0,0,0,0,0];
        let hintTimer = 3;
        let inputDir = { x: 0, y: 0 };
        let dpr = 1;
        let mapCanvas = null;

        // ---- DOM refs ----
        const hud = document.getElementById('hud');
        const timerEl = document.getElementById('timer');
        const scoreEl = document.getElementById('score');
        const hintEl = document.getElementById('hint');
        const startOverlay = document.getElementById('start-overlay');
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const finalScoreEl = document.getElementById('final-score');
        const breakdownEl = document.getElementById('breakdown');

        // ---- Resize ----
        function resize() {
            dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
        }
        window.addEventListener('resize', resize);
        resize();

        // ---- Map pre-render ----
        function renderMap() {
            mapCanvas = document.createElement('canvas');
            mapCanvas.width = WORLD_W;
            mapCanvas.height = WORLD_H;
            const mc = mapCanvas.getContext('2d');

            // Solid background
            mc.fillStyle = '#4a5568';
            mc.fillRect(0, 0, WORLD_W, WORLD_H);
        }

        // ---- Object generation ----
        function randomInRange(min, max) { return min + Math.random() * (max - min); }

        function generateObjects() {
            objects = [];
            const margin = 80;
            for (let ti = 0; ti < TIERS.length; ti++) {
                const tier = TIERS[ti];
                for (let i = 0; i < tier.count; i++) {
                    const size = randomInRange(tier.minSize, tier.maxSize);
                    const x = randomInRange(margin, WORLD_W - margin);
                    const y = randomInRange(margin, WORLD_H - margin);
                    const type = tier.types[Math.floor(Math.random() * tier.types.length)];
                    const color = tier.colors[Math.floor(Math.random() * tier.colors.length)];
                    objects.push({
                        x, y, size, tier: ti, mass: tier.mass,
                        type, color,
                        consumed: false, beingConsumed: false, consumeProgress: 0,
                        rotation: 0,
                    });
                }
            }
        }

        // ---- Drawing objects ----
        function drawObject(obj, ox, oy) {
            const s = obj.size * (1 - obj.consumeProgress);
            if (s < 1) return;
            ctx.save();
            ctx.translate(ox, oy);
            ctx.rotate(obj.rotation);
            ctx.globalAlpha = 1 - obj.consumeProgress * 0.5;

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.beginPath();
            ctx.ellipse(2, 2, s * 0.8, s * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();

            switch(obj.type) {
                case 'person':
                    ctx.fillStyle = obj.color;
                    ctx.beginPath(); ctx.arc(0, -s*0.3, s*0.35, 0, Math.PI*2); ctx.fill(); // head
                    ctx.fillRect(-s*0.25, -s*0.1, s*0.5, s*0.7); // body
                    break;
                case 'cone':
                    ctx.fillStyle = '#ff6b35';
                    ctx.beginPath(); ctx.moveTo(0, -s); ctx.lineTo(-s*0.5, s*0.5); ctx.lineTo(s*0.5, s*0.5); ctx.closePath(); ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(-s*0.3, -s*0.2, s*0.6, s*0.15);
                    break;
                case 'hydrant':
                    ctx.fillStyle = '#e63946';
                    ctx.fillRect(-s*0.3, -s*0.5, s*0.6, s);
                    ctx.beginPath(); ctx.arc(0, -s*0.5, s*0.35, 0, Math.PI*2); ctx.fill();
                    break;
                case 'tree':
                    ctx.fillStyle = '#5c3a1e';
                    ctx.fillRect(-s*0.12, 0, s*0.24, s*0.5); // trunk
                    ctx.fillStyle = obj.color;
                    ctx.beginPath(); ctx.arc(0, -s*0.15, s*0.55, 0, Math.PI*2); ctx.fill(); // canopy
                    break;
                case 'bench':
                    ctx.fillStyle = obj.color;
                    ctx.fillRect(-s*0.6, -s*0.15, s*1.2, s*0.3);
                    ctx.fillStyle = '#333';
                    ctx.fillRect(-s*0.5, s*0.15, s*0.12, s*0.3);
                    ctx.fillRect(s*0.38, s*0.15, s*0.12, s*0.3);
                    break;
                case 'mailbox':
                    ctx.fillStyle = '#457b9d';
                    ctx.fillRect(-s*0.25, -s*0.5, s*0.5, s*0.7);
                    ctx.beginPath(); ctx.arc(0, -s*0.5, s*0.25, Math.PI, 0); ctx.fill();
                    ctx.fillStyle = '#333';
                    ctx.fillRect(-s*0.06, s*0.2, s*0.12, s*0.4);
                    break;
                case 'car':
                case 'truck':
                    ctx.fillStyle = obj.color;
                    const cw = s * 1.4, ch = s * 0.7;
                    ctx.beginPath();
                    ctx.roundRect(-cw/2, -ch/2, cw, ch, s*0.15);
                    ctx.fill();
                    // Windows
                    ctx.fillStyle = 'rgba(200,230,255,0.7)';
                    ctx.fillRect(-cw*0.15, -ch/2 + 3, cw*0.3, ch - 6);
                    // Wheels
                    ctx.fillStyle = '#222';
                    ctx.beginPath(); ctx.arc(-cw*0.3, -ch/2, s*0.12, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cw*0.3, -ch/2, s*0.12, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(-cw*0.3, ch/2, s*0.12, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(cw*0.3, ch/2, s*0.12, 0, Math.PI*2); ctx.fill();
                    break;
                case 'bus':
                    ctx.fillStyle = obj.color;
                    ctx.fillRect(-s*0.9, -s*0.4, s*1.8, s*0.8);
                    ctx.fillStyle = 'rgba(200,230,255,0.6)';
                    for (let wi = 0; wi < 4; wi++) {
                        ctx.fillRect(-s*0.7 + wi*s*0.4, -s*0.3, s*0.25, s*0.3);
                    }
                    break;
                case 'house':
                case 'shop':
                    ctx.fillStyle = obj.color;
                    ctx.fillRect(-s*0.5, -s*0.3, s, s*0.7); // walls
                    // Roof
                    ctx.fillStyle = '#8B4513';
                    ctx.beginPath();
                    ctx.moveTo(-s*0.6, -s*0.3);
                    ctx.lineTo(0, -s*0.8);
                    ctx.lineTo(s*0.6, -s*0.3);
                    ctx.closePath();
                    ctx.fill();
                    // Door
                    ctx.fillStyle = '#5c3a1e';
                    ctx.fillRect(-s*0.1, s*0.05, s*0.2, s*0.35);
                    // Windows
                    ctx.fillStyle = 'rgba(255,255,200,0.8)';
                    ctx.fillRect(-s*0.35, -s*0.15, s*0.18, s*0.15);
                    ctx.fillRect(s*0.17, -s*0.15, s*0.18, s*0.15);
                    break;
                case 'building':
                case 'skyscraper':
                    ctx.fillStyle = obj.color;
                    const bw = s * 0.7, bh = s * 1.2;
                    ctx.fillRect(-bw/2, -bh/2, bw, bh);
                    // Window grid
                    ctx.fillStyle = 'rgba(255,255,200,0.5)';
                    const cols = 3, rows = 5;
                    const ww = bw / (cols * 2 + 1), wh = bh / (rows * 2 + 1);
                    for (let r = 0; r < rows; r++) {
                        for (let c = 0; c < cols; c++) {
                            ctx.fillRect(
                                -bw/2 + ww + c * ww * 2,
                                -bh/2 + wh + r * wh * 2,
                                ww, wh
                            );
                        }
                    }
                    break;
            }
            ctx.restore();
        }

        // ---- Hole drawing ----
        // ---- Particles ----
        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 2;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    color,
                    size: 2 + Math.random() * 3,
                });
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                // Pull toward hole
                const dx = hole.x - p.x, dy = hole.y - p.y;
                const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                p.vx += (dx/dist) * 0.3;
                p.vy += (dy/dist) * 0.3;
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function drawParticles() {
            for (const p of particles) {
                const sx = (p.x - camera.x) * dpr;
                const sy = (p.y - camera.y) * dpr;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(sx, sy, p.size * dpr, 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // ---- Combo text ----
        function spawnComboText(x, y, text) {
            comboTexts.push({ x, y, text, life: 1, vy: -1.5 });
        }

        function drawComboTexts() {
            for (let i = comboTexts.length - 1; i >= 0; i--) {
                const ct = comboTexts[i];
                ct.y += ct.vy;
                ct.life -= 0.02;
                if (ct.life <= 0) { comboTexts.splice(i, 1); continue; }
                const sx = (ct.x - camera.x) * dpr;
                const sy = (ct.y - camera.y) * dpr;
                ctx.globalAlpha = ct.life;
                ctx.fillStyle = '#ffd166';
                ctx.font = `bold ${18 * dpr}px system-ui`;
                ctx.textAlign = 'center';
                ctx.fillText(ct.text, sx, sy);
            }
            ctx.globalAlpha = 1;
        }

        // ---- Input ----
        let keys = {};
        let pointerActive = false;
        let pointerX = 0, pointerY = 0;

        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        canvas.addEventListener('mousedown', e => { pointerActive = true; pointerX = e.clientX; pointerY = e.clientY; });
        window.addEventListener('mousemove', e => { if (pointerActive) { pointerX = e.clientX; pointerY = e.clientY; } });
        window.addEventListener('mouseup', () => { pointerActive = false; });

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            pointerActive = true;
            pointerX = e.touches[0].clientX;
            pointerY = e.touches[0].clientY;
        }, { passive: false });
        window.addEventListener('touchmove', e => {
            e.preventDefault();
            if (pointerActive && e.touches.length > 0) {
                pointerX = e.touches[0].clientX;
                pointerY = e.touches[0].clientY;
            }
        }, { passive: false });
        window.addEventListener('touchend', () => { pointerActive = false; });

        function updateInput() {
            inputDir.x = 0;
            inputDir.y = 0;

            // Keyboard
            if (keys['w'] || keys['arrowup']) inputDir.y -= 1;
            if (keys['s'] || keys['arrowdown']) inputDir.y += 1;
            if (keys['a'] || keys['arrowleft']) inputDir.x -= 1;
            if (keys['d'] || keys['arrowright']) inputDir.x += 1;

            // Pointer
            if (pointerActive) {
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight / 2;
                const dx = pointerX - cx;
                const dy = pointerY - cy;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const deadZone = 15;
                if (dist > deadZone) {
                    const strength = Math.min(dist / 100, 1);
                    inputDir.x = (dx / dist) * strength;
                    inputDir.y = (dy / dist) * strength;
                }
            }

            // Normalize
            const len = Math.sqrt(inputDir.x*inputDir.x + inputDir.y*inputDir.y);
            if (len > 1) { inputDir.x /= len; inputDir.y /= len; }
        }

        // ---- Update ----
        function radiusFromMass(mass) {
            return INITIAL_RADIUS + Math.pow(mass, 0.5) * 2.5;
        }

        function updateHole(dt) {
            const speedFactor = Math.max(0.4, 1 - (hole.radius - INITIAL_RADIUS) / 400);
            const speed = HOLE_BASE_SPEED * speedFactor * (dt / 16);
            hole.x += inputDir.x * speed;
            hole.y += inputDir.y * speed;
            hole.x = Math.max(hole.radius, Math.min(WORLD_W - hole.radius, hole.x));
            hole.y = Math.max(hole.radius, Math.min(WORLD_H - hole.radius, hole.y));
            hole.radius = radiusFromMass(hole.mass);
        }

        function updateObjects(dt) {
            const now = performance.now();
            for (const obj of objects) {
                if (obj.consumed) continue;
                const dx = hole.x - obj.x;
                const dy = hole.y - obj.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const canEat = obj.size < hole.radius * 0.85;
                const inRange = dist < hole.radius + obj.size * 0.3;

                if (canEat && inRange) {
                    obj.beingConsumed = true;
                }

                if (obj.beingConsumed) {
                    if (!canEat) { obj.beingConsumed = false; obj.consumeProgress = 0; continue; }
                    obj.x += dx * 0.15;
                    obj.y += dy * 0.15;
                    obj.consumeProgress += 0.06;
                    obj.rotation += 0.15;
                    if (obj.consumeProgress >= 1 || dist < 5) {
                        obj.consumed = true;
                        hole.mass += obj.mass;
                        consumed[obj.tier]++;
                        spawnParticles(obj.x, obj.y, obj.color, 6);

                        // Scoring
                        const timeSinceLastEat = now - lastEatTime;
                        if (timeSinceLastEat < 1000) {
                            combo++;
                        } else {
                            combo = 1;
                        }
                        lastEatTime = now;
                        const points = (obj.tier + 1) * combo;
                        score += points;
                        scoreEl.textContent = score;

                        // Always show points gained floating above hole
                        spawnComboText(hole.x, hole.y - hole.radius - 20, `+${points}`);

                        // Screen shake for big objects
                        if (obj.tier >= 3) shakeFrames = 8;
                    }
                }
            }
        }

        function updateCamera() {
            const targetX = hole.x - window.innerWidth / 2;
            const targetY = hole.y - window.innerHeight / 2;
            camera.x += (targetX - camera.x) * 0.1;
            camera.y += (targetY - camera.y) * 0.1;
            camera.x = Math.max(0, Math.min(WORLD_W - window.innerWidth, camera.x));
            camera.y = Math.max(0, Math.min(WORLD_H - window.innerHeight, camera.y));
        }

        function updateTimer(dt) {
            timeLeft -= dt / 1000;
            if (timeLeft <= 0) {
                timeLeft = 0;
                endGame();
            }
            const mins = Math.floor(timeLeft / 60);
            const secs = Math.floor(timeLeft % 60);
            timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            timerEl.classList.toggle('warning', timeLeft <= 10);
        }

        // ---- Draw ----
        function draw() {
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Background - solid dark blue-gray
            ctx.fillStyle = '#4a5568';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            // Shake offset
            let shakeX = 0, shakeY = 0;
            if (shakeFrames > 0) {
                shakeX = (Math.random() - 0.5) * 6;
                shakeY = (Math.random() - 0.5) * 6;
                shakeFrames--;
            }

            const cx = -camera.x + shakeX;
            const cy = -camera.y + shakeY;

            // Map
            if (mapCanvas) {
                ctx.drawImage(mapCanvas, cx, cy, WORLD_W, WORLD_H);
            }

            // Objects (sorted by tier for draw order)
            const vx1 = camera.x - 100, vy1 = camera.y - 100;
            const vx2 = camera.x + window.innerWidth + 100;
            const vy2 = camera.y + window.innerHeight + 100;

            for (const obj of objects) {
                if (obj.consumed) continue;
                if (obj.x < vx1 || obj.x > vx2 || obj.y < vy1 || obj.y > vy2) continue;
                const ox = (obj.x + cx) * dpr;
                const oy = (obj.y + cy) * dpr;
                // Scale object drawing for dpr
                ctx.save();
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                drawObject(obj, obj.x + cx, obj.y + cy);
                ctx.restore();
            }

            // Hole
            drawHoleLocal(hole.x - camera.x + shakeX, hole.y - camera.y + shakeY, hole.radius);

            // Particles
            ctx.save();
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            drawParticlesLocal(shakeX, shakeY);
            drawComboTextsLocal(shakeX, shakeY);
            ctx.restore();
        }

        function drawHoleLocal(x, y, r) {
            const rimWidth = Math.max(6, r * 0.18);
            const outerR = r + rimWidth;

            // Shadow under rim
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.beginPath(); ctx.arc(x + 2, y + 2, outerR, 0, Math.PI * 2); ctx.fill();

            // Outer rim - thick gray ring like hole.io
            const rimGrad = ctx.createRadialGradient(x - rimWidth*0.3, y - rimWidth*0.3, r * 0.8, x, y, outerR);
            rimGrad.addColorStop(0, '#e0e0e0');
            rimGrad.addColorStop(0.5, '#b0b0b0');
            rimGrad.addColorStop(0.8, '#888');
            rimGrad.addColorStop(1, '#666');
            ctx.fillStyle = rimGrad;
            ctx.beginPath(); ctx.arc(x, y, outerR, 0, Math.PI * 2); ctx.fill();

            // Inner dark hole
            const holeGrad = ctx.createRadialGradient(x, y, 0, x, y, r);
            holeGrad.addColorStop(0, '#000');
            holeGrad.addColorStop(0.8, '#080808');
            holeGrad.addColorStop(1, '#111');
            ctx.fillStyle = holeGrad;
            ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();

            // Inner rim edge (subtle dark ring at the inner edge of the rim)
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(x, y, r + 1, 0, Math.PI * 2); ctx.stroke();

            // Progress arc - yellow arc showing progress to next size
            const progress = getSizeProgress(hole.mass);
            if (progress > 0 && progress < 1) {
                const arcR = outerR + 3;
                const startAngle = -Math.PI / 2;
                const endAngle = startAngle + progress * Math.PI * 2;
                ctx.strokeStyle = '#f5a623';
                ctx.lineWidth = Math.max(4, rimWidth * 0.5);
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.arc(x, y, arcR, startAngle, endAngle);
                ctx.stroke();
                ctx.lineCap = 'butt';
            }

            // "Size X" label below the hole
            const sizeLevel = getSizeLevel(hole.mass);
            ctx.fillStyle = '#f5a623';
            ctx.font = `bold ${Math.max(14, r * 0.35)}px system-ui`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(`Size ${sizeLevel}`, x, y + outerR + 8);
        }

        function drawParticlesLocal(sx, sy) {
            for (const p of particles) {
                const px = p.x - camera.x + sx;
                const py = p.y - camera.y + sy;
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(px, py, p.size, 0, Math.PI * 2); ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        function drawComboTextsLocal(sx, sy) {
            for (let i = comboTexts.length - 1; i >= 0; i--) {
                const ct = comboTexts[i];
                ct.y += ct.vy;
                ct.life -= 0.02;
                if (ct.life <= 0) { comboTexts.splice(i, 1); continue; }
                const px = ct.x - camera.x + sx;
                const py = ct.y - camera.y + sy;
                ctx.globalAlpha = ct.life;
                // White bold text with dark shadow like hole.io
                ctx.font = 'bold 22px system-ui';
                ctx.textAlign = 'center';
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillText(ct.text, px + 1, py + 1);
                ctx.fillStyle = '#fff'
                ctx.fillText(ct.text, px, py);
            }
            ctx.globalAlpha = 1;
        }

        // ---- Game flow ----
        function startGame() {
            state = 'PLAYING';
            hole = { x: WORLD_W/2, y: WORLD_H/2, radius: INITIAL_RADIUS, mass: 0 };
            camera = { x: hole.x - window.innerWidth/2, y: hole.y - window.innerHeight/2 };
            objects = [];
            particles = [];
            comboTexts = [];
            score = 0;
            combo = 0;
            timeLeft = ROUND_DURATION;
            consumed = [0,0,0,0,0];
            hintTimer = 3;
            shakeFrames = 0;
            scoreEl.textContent = '0';

            renderMap();
            generateObjects();

            startOverlay.style.display = 'none';
            gameOverOverlay.style.display = 'none';
            hud.style.display = 'block';
            hintEl.style.opacity = '1';
            hintEl.style.display = 'block';
        }

        function endGame() {
            state = 'GAMEOVER';
            hud.style.display = 'none';
            hintEl.style.display = 'none';
            gameOverOverlay.style.display = 'flex';
            finalScoreEl.textContent = score;

            const tierNames = ['People & Cones', 'Trees & Benches', 'Vehicles', 'Houses', 'Buildings'];
            let html = `Final Size: ${getSizeLevel(hole.mass)}<br><br>`;
            for (let i = 0; i < 5; i++) {
                if (consumed[i] > 0) {
                    html += `${tierNames[i]}: ${consumed[i]}<br>`;
                }
            }
            const totalConsumed = consumed.reduce((a,b) => a+b, 0);
            const totalObjects = objects.length;
            html += `<br>Total: ${totalConsumed} / ${totalObjects} objects`;
            breakdownEl.innerHTML = html;
        }

        // ---- Main loop ----
        function gameLoop(timestamp) {
            const dt = Math.min(timestamp - lastTimestamp, 33);
            lastTimestamp = timestamp;

            if (state === 'PLAYING') {
                updateInput();
                updateHole(dt);
                updateObjects(dt);
                updateCamera();
                updateParticles(dt);
                updateTimer(dt);
                swirlAngle += 0.03;

                // Fade hint
                if (hintTimer > 0) {
                    hintTimer -= dt / 1000;
                    if (hintTimer <= 0) {
                        hintEl.style.opacity = '0';
                    }
                }
            }

            if (state !== 'MENU') {
                draw();
            }

            requestAnimationFrame(gameLoop);
        }

        // ---- Event listeners ----
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);

        // Start loop
        lastTimestamp = performance.now();
        requestAnimationFrame(gameLoop);
    })();
    </script>

    <!-- Firebase Tracking -->
    <script type="module">
        import { initTracking } from './firebase-tracker.js';
        initTracking('hole-io');
    </script>
