<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1X91H99N2G"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-1X91H99N2G');

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deep Sea Spearfishing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0; overflow: hidden; background-color: #0c1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; user-select: none;
        }
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #0c1a2e;
        }
        canvas#gameCanvas { background-color: #000; cursor: crosshair; display: block; width: 100vw; height: 100vh; }
        .ui-panel { position: absolute; pointer-events: none; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.9); padding: 0 20px; box-sizing: border-box; }
        .top-hud { top: env(safe-area-inset-top, 20px); display: flex; justify-content: space-between; align-items: flex-start; }
        .bottom-hud { bottom: env(safe-area-inset-bottom, 40px); text-align: center; }
        #flash-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,200,255,0.6); opacity: 0; pointer-events: none; z-index: 50;
        }
        .message-box {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            background: rgba(8,20,40,0.98); padding: 2rem; border-radius: 1.5rem;
            text-align: center; color: white; display: none; border: 1px solid #1e4d6b;
            z-index: 100; box-shadow: 0 20px 60px rgba(0,0,0,1), 0 0 40px rgba(0,180,255,0.15);
            width: 90%; max-width: 400px;
        }
        #feedback-canvas {
            background: #071525; border-radius: 1rem; margin: 1rem auto;
            border: 1px solid #1e4d6b; width: 100%; height: auto;
        }
        @keyframes pulse-ammo {
            0% { transform: scale(1); } 50% { transform: scale(1.1); color: #ef4444; } 100% { transform: scale(1); }
        }
        .low-ammo { animation: pulse-ammo 0.5s infinite; }

        /* MODE SELECT */
        #mode-select {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(4,12,28,0.97); z-index: 200;
        }
        .mode-btn {
            width: 90%; max-width: 380px; padding: 1.3rem 1.4rem; border-radius: 1.2rem;
            border: 2px solid #1e3a52; background: #071525; color: white;
            cursor: pointer; text-align: left; transition: all 0.2s; margin-bottom: 1rem;
            pointer-events: all;
        }
        .mode-btn:hover { background: #0a1e35; transform: scale(1.02); }
        .mode-btn.dive-btn:hover   { border-color: #2dd4bf; }
        .mode-btn.frenzy-btn:hover { border-color: #f59e0b; }

        /* OPPONENT HUD — right column of top-hud */
        #opponent-hud {
            text-align: right;
            min-width: 110px;
        }
        #opponent-bar-wrap {
            width: 100%; height: 5px; background: rgba(255,255,255,0.1);
            border-radius: 3px; margin: 4px 0 0; overflow: hidden;
        }
        #opponent-bar {
            height: 100%; width: 0%; border-radius: 3px;
            transition: width 0.5s ease, background-color 0.4s ease;
            background: #f59e0b;
        }
        @keyframes opp-score-bump {
            0%   { transform: scale(1); }
            35%  { transform: scale(1.22); color: #fca5a5; text-shadow: 0 0 16px rgba(248,113,113,0.9); }
            100% { transform: scale(1); }
        }
        .opp-bump { animation: opp-score-bump 0.4s forwards; }

        /* COMBO POPUP */
        @keyframes combo-pop {
            0%   { transform: translate(-50%,-50%) scale(0.4); opacity: 0; }
            20%  { opacity: 1; }
            60%  { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%,-50%) scale(1.1); opacity: 0; }
        }
        #combo-display {
            position: absolute; top: 44%; left: 50%;
            transform: translate(-50%,-50%); pointer-events: none; z-index: 60;
            text-align: center; opacity: 0;
        }
        #combo-display.pop { animation: combo-pop 0.8s forwards; }

        @keyframes timer-pulse {
            0% { transform: scale(1); } 50% { transform: scale(1.2); color: #ef4444; } 100% { transform: scale(1); }
        }
        .timer-urgent { animation: timer-pulse 0.45s infinite; }
    </style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:12px;left:12px;z-index:9999;display:flex;align-items:center;gap:6px;padding:6px 10px;background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:rgba(255,255,255,0.55);font-size:12px;font-family:system-ui,sans-serif;text-decoration:none;backdrop-filter:blur(6px);transition:opacity 0.2s,background 0.2s;opacity:0.45;" onmouseover="this.style.opacity='1';this.style.background='rgba(0,0,0,0.75)'" onmouseout="this.style.opacity='0.45';this.style.background='rgba(0,0,0,0.45)'">← All Games</a>
<div id="game-container">
    <div id="flash-overlay"></div>
    <canvas id="gameCanvas"></canvas>

    <!-- MODE SELECT -->
    <div id="mode-select">
        <div style="text-align:center; margin-bottom:2rem;">
            <div style="font-size:3rem; margin-bottom:0.4rem;">🌊</div>
            <div style="font-size:1.6rem; font-weight:900; letter-spacing:0.1em; color:white;">DEEP SEA SPEARFISHING</div>
            <div style="font-size:0.72rem; color:#0e7490; letter-spacing:0.2em; text-transform:uppercase; margin-top:0.25rem;">Choose your dive</div>
        </div>
        <button class="mode-btn dive-btn" onclick="selectMode('dive')">
            <div style="display:flex; align-items:center; gap:1rem;">
                <div style="font-size:2.4rem;">🤿</div>
                <div>
                    <div style="font-size:1.05rem; font-weight:900; letter-spacing:0.05em; color:#2dd4bf;">DIVE HUNT</div>
                    <div style="font-size:0.76rem; color:#64748b; margin-top:0.2rem;">Classic mode — catch your quota each dive, earn points with precision</div>
                </div>
            </div>
        </button>
        <button class="mode-btn frenzy-btn" onclick="selectMode('frenzy')">
            <div style="display:flex; align-items:center; gap:1rem;">
                <div style="font-size:2.4rem;">⚡</div>
                <div>
                    <div style="font-size:1.05rem; font-weight:900; letter-spacing:0.05em; color:#f59e0b;">FRENZY MODE</div>
                    <div style="font-size:0.76rem; color:#64748b; margin-top:0.2rem;">15 seconds — all fish swim at once, chain combos, beat your high score!</div>
                    <div id="hs-preview" style="font-size:0.72rem; color:#f59e0b; margin-top:0.3rem; font-weight:700;"></div>
                </div>
            </div>
        </button>
        <button class="mode-btn dive-btn" onclick="window.location.href='dive3d.html'">
            <div style="display:flex; align-items:center; gap:1rem;">
                <div style="font-size:2.4rem;">🎯</div>
                <div>
                    <div style="font-size:1.05rem; font-weight:900; letter-spacing:0.05em; color:#2dd4bf;">DIVE HUNT 3D</div>
                    <div style="font-size:0.76rem; color:#64748b; margin-top:0.2rem;">First person — look around, aim with gyroscope, throw your spear</div>
                    <div style="font-size:0.65rem; color:#2dd4bf; margin-top:0.3rem; font-weight:700; letter-spacing:0.1em;">NEW</div>
                </div>
            </div>
        </button>
    </div>



    <!-- COMBO DISPLAY -->
    <div id="combo-display">
        <div id="combo-text" style="font-size:3.2rem; font-weight:900; color:#facc15; text-shadow:0 0 30px rgba(245,158,11,0.9), 0 2px 8px rgba(0,0,0,0.9);"></div>
        <div id="combo-sub"  style="font-size:0.95rem; font-weight:700; color:white; letter-spacing:0.15em; text-shadow:0 2px 6px rgba(0,0,0,0.9);"></div>
    </div>

    <!-- TOP HUD -->
    <div class="ui-panel top-hud">
        <!-- Left: player score -->
        <div>
            <div class="text-[10px] uppercase tracking-widest text-cyan-700">Score</div>
            <div class="text-4xl font-black italic text-cyan-300" id="score">0</div>
            <!-- combo shown below score in frenzy -->
            <div id="combo-hud" style="display:none; margin-top:2px;">
                <div class="text-[10px] uppercase tracking-widest text-yellow-600">Combo</div>
                <div class="text-xl font-black text-yellow-400" id="combo-counter">×1</div>
            </div>
        </div>
        <!-- Center: timer (frenzy) or dive label -->
        <div style="text-align:center;">
            <div id="frenzy-timer-wrap" style="display:none;">
                <div class="text-[10px] uppercase tracking-widest text-cyan-700">Time</div>
                <div class="text-4xl font-black text-cyan-300" id="frenzy-timer">15</div>
            </div>
            <div id="dive-label-wrap">
                <div class="text-[10px] uppercase tracking-widest text-cyan-700" id="hunt-round">Dive 1</div>
                <div class="text-xl font-bold text-teal-400" id="hunt-goal">Catch: 3</div>
            </div>
        </div>
        <!-- Right: opponent score (frenzy only) -->
        <div id="opponent-hud" style="display:none; text-align:right; min-width:110px;">
            <div style="font-size:0.6rem; letter-spacing:0.15em; color:#94a3b8; text-transform:uppercase; margin-bottom:1px;">🤖 Opponent</div>
            <div id="opponent-score" style="font-size:2.2rem; font-weight:900; color:#f87171; text-shadow:0 0 12px rgba(248,113,113,0.6); line-height:1;">0</div>
            <div id="opponent-bar-wrap"><div id="opponent-bar"></div></div>
            <div id="opponent-lead" style="font-size:0.62rem; margin-top:3px; font-weight:700; letter-spacing:0.08em;"></div>
        </div>
        <div id="opponent-hud-placeholder" style="min-width:110px;"></div>
    </div>

    <!-- BOTTOM HUD -->
    <div class="ui-panel bottom-hud">
        <div class="flex justify-center items-end gap-6 mb-2">
            <div id="ammo-container">
                <div class="text-[10px] uppercase font-bold text-cyan-600" id="ammo-label">Spears</div>

                <div class="text-xl font-bold text-cyan-400 leading-tight" id="status-text">DIVING...</div>
                <div class="text-[10px] text-cyan-700 uppercase italic" id="status-sub">Aim for the vitals</div>
            </div>
        </div>
    </div>

    <!-- SHOT ANALYSIS (dive mode) -->
    <div id="shot-analysis" class="message-box">
        <div id="analysis-animal-name" class="text-xs font-bold text-cyan-500 uppercase tracking-widest mb-1">FISH</div>
        <h3 class="text-2xl font-black text-cyan-400 uppercase">SPEAR CONFIRMED</h3>
        <canvas id="feedback-canvas" width="350" height="250"></canvas>
        <div id="analysis-result" class="text-3xl font-black mb-1">BODY HIT</div>
        <div id="analysis-score" class="text-cyan-500 text-sm mb-6 uppercase tracking-widest">+150 Points</div>
        <button onclick="closeAnalysis()" class="w-full bg-cyan-500 text-slate-900 font-black py-4 px-8 rounded-xl hover:bg-cyan-300 transition-all uppercase tracking-widest shadow-lg text-lg">
            Continue
        </button>
    </div>

    <!-- END / LEVEL SCREEN -->
    <div id="message-box" class="message-box">
        <!-- FRENZY result -->
        <div id="msg-frenzy-block" style="display:none;">
            <div id="msg-winner-icon" style="font-size:3rem; line-height:1; margin-bottom:0.3rem;"></div>
            <div id="msg-winner-label" style="font-size:1.6rem; font-weight:900; letter-spacing:0.05em; margin-bottom:1rem;"></div>
            <!-- Score comparison row -->
            <div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
                <div style="flex:1; background:rgba(0,200,255,0.08); border:1px solid rgba(0,200,255,0.2); border-radius:0.8rem; padding:0.7rem 0.5rem;">
                    <div style="font-size:0.6rem; color:#0e7490; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:2px;">You</div>
                    <div id="msg-player-score" style="font-size:1.6rem; font-weight:900; color:#22d3ee;">0</div>
                </div>
                <div style="display:flex; align-items:center; color:#475569; font-size:1rem; font-weight:700;">VS</div>
                <div style="flex:1; background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.2); border-radius:0.8rem; padding:0.7rem 0.5rem;">
                    <div style="font-size:0.6rem; color:#7f1d1d; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:2px;">Opponent</div>
                    <div id="msg-opp-score" style="font-size:1.6rem; font-weight:900; color:#f87171;">0</div>
                </div>
            </div>
            <div id="msg-highscore" style="display:none;" class="text-sm font-bold text-yellow-400 mb-4 uppercase tracking-widest"></div>
            <!-- Breakdown toggle -->
            <button onclick="toggleBreakdown()" style="background:none; border:1px solid #1e3a52; border-radius:0.6rem; color:#64748b; font-size:0.72rem; padding:0.4rem 1rem; cursor:pointer; margin-bottom:0.8rem; width:100%; letter-spacing:0.1em; text-transform:uppercase;" id="breakdown-toggle-btn">
                Show Catch Breakdown ▾
            </button>
            <div id="msg-breakdown" style="display:none; margin-bottom:0.8rem; text-align:left; background:rgba(0,30,60,0.6); border-radius:0.8rem; padding:0.7rem 0.9rem;">
                <div id="msg-breakdown-rows"></div>
            </div>
        </div>
        <!-- DIVE result -->
        <div id="msg-dive-block">
            <h2 id="msg-title" class="text-4xl font-black mb-1 text-white">DIVE SUCCESS</h2>
            <p class="text-cyan-700 mb-3 tracking-widest uppercase text-sm">Summary</p>
            <div class="text-3xl font-bold mb-4 text-teal-400" id="msg-body">Score: 0</div>
        </div>
        <button id="action-btn" onclick="actionBtn()" class="w-full bg-cyan-700 text-white font-black py-4 rounded-2xl hover:bg-cyan-600 transition-all uppercase tracking-widest shadow-xl mb-3">
            Next Dive
        </button>
        <button onclick="goModeSelect()" class="w-full bg-transparent text-cyan-800 font-bold py-2 rounded-xl hover:text-cyan-500 transition-all uppercase tracking-widest text-sm">
            Change Mode
        </button>
    </div>
</div>
<script>
    const canvas  = document.getElementById('gameCanvas');
    const ctx     = canvas.getContext('2d');
    const fCanvas = document.getElementById('feedback-canvas');
    const fCtx    = fCanvas.getContext('2d');
    const flash   = document.getElementById('flash-overlay');
    const scoreEl       = document.getElementById('score');
    const ammoEl        = document.getElementById('ammo');
    const ammoContainer = document.getElementById('ammo-container');
    const ammoLabel     = document.getElementById('ammo-label');
    const huntEl        = document.getElementById('hunt-round');
    const goalEl        = document.getElementById('hunt-goal');
    const statusEl      = document.getElementById('status-text');
    const statusSub     = document.getElementById('status-sub');
    const analysisBox   = document.getElementById('shot-analysis');
    const analysisAnimalName = document.getElementById('analysis-animal-name');
    const analysisResult     = document.getElementById('analysis-result');
    const analysisScore      = document.getElementById('analysis-score');
    const msgBox        = document.getElementById('message-box');
    const msgTitle      = document.getElementById('msg-title');
    const msgBody       = document.getElementById('msg-body');
    const msgHighscore  = document.getElementById('msg-highscore');
    const msgBreakdown  = document.getElementById('msg-breakdown');
    const msgBreakdownRows = document.getElementById('msg-breakdown-rows');
    const actionBtnEl   = document.getElementById('action-btn');
    const modeSelect    = document.getElementById('mode-select');
    const hsPreview     = document.getElementById('hs-preview');
    const comboDisplay  = document.getElementById('combo-display');
    const comboText     = document.getElementById('combo-text');
    const comboSub      = document.getElementById('combo-sub');
    const comboHud      = document.getElementById('combo-hud');
    const comboCounter  = document.getElementById('combo-counter');
    const frenzyTimerWrap = document.getElementById('frenzy-timer-wrap');
    const frenzyTimerEl   = document.getElementById('frenzy-timer');

    const CANVAS_WIDTH  = 600;
    const CANVAS_HEIGHT = 900;

    const FISH_TYPES = {
        FISH:      { name: 'Blue Fish',   emoji: '🐟', size: 30,  speed: 4.0, points: 100,  heartSize: 8,  hX: 0.3,  hY: 0.9,  rarity: 'common'    },
        CLOWNFISH: { name: 'Clownfish',   emoji: '🐠', size: 32,  speed: 3.0, points: 150,  heartSize: 9,  hX: 0.3,  hY: 0.85, rarity: 'common'    },
        CRAB:      { name: 'Crab',        emoji: '🦀', size: 38,  speed: 1.8, points: 250,  heartSize: 10, hX: 0.0,  hY: 0.75, rarity: 'common'    },
        BLOWFISH:  { name: 'Pufferfish',  emoji: '🐡', size: 42,  speed: 1.5, points: 300,  heartSize: 13, hX: 0.05, hY: 0.9,  rarity: 'uncommon'  },
        LOBSTER:   { name: 'Lobster',     emoji: '🦞', size: 44,  speed: 2.0, points: 350,  heartSize: 11, hX: 0.2,  hY: 0.8,  rarity: 'uncommon'  },
        TURTLE:    { name: 'Sea Turtle',  emoji: '🐢', size: 50,  speed: 1.1, points: 450,  heartSize: 13, hX: 0.1,  hY: 0.9,  rarity: 'uncommon'  },
        OCTOPUS:   { name: 'Octopus',     emoji: '🐙', size: 55,  speed: 1.2, points: 600,  heartSize: 16, hX: 0.0,  hY: 0.7,  rarity: 'rare'      },
        SQUID:     { name: 'Squid',       emoji: '🦑', size: 48,  speed: 4.5, points: 700,  heartSize: 12, hX: 0.1,  hY: 0.65, rarity: 'rare'      },
        SHARK:     { name: 'Shark',       emoji: '🦈', size: 75,  speed: 2.5, points: 1000, heartSize: 20, hX: 0.25, hY: 0.85, rarity: 'epic'      },
        DOLPHIN:   { name: 'Dolphin',     emoji: '🐬', size: 65,  speed: 3.8, points: 1200, heartSize: 15, hX: 0.28, hY: 0.88, rarity: 'epic'      },
        WHALE:     { name: 'Blue Whale',  emoji: '🐳', size: 100, speed: 0.9, points: 2000, heartSize: 26, hX: 0.2,  hY: 0.9,  rarity: 'legendary' },
        NARWHAL:   { name: 'Narwhal',     emoji: '🦭', size: 70,  speed: 2.2, points: 2500, heartSize: 17, hX: 0.22, hY: 0.85, rarity: 'legendary' },
    };

    const RARITY_WEIGHT = { common: 40, uncommon: 28, rare: 18, epic: 10, legendary: 4 };
    const RARITY_COLOR  = { common: '#94a3b8', uncommon: '#4ade80', rare: '#60a5fa', epic: '#c084fc', legendary: '#f59e0b' };

    const FRENZY_POOL = [];
    Object.entries(FISH_TYPES).forEach(([key, t]) => {
        const w = RARITY_WEIGHT[t.rarity];
        for (let i = 0; i < w; i++) FRENZY_POOL.push(key);
    });

    // Pre-render emoji to offscreen canvases for reliable cross-platform display
    const emojiCache = {};
    Object.entries(FISH_TYPES).forEach(([key, t]) => {
        const s = Math.ceil(t.size * 2.2);
        const pad = 4;
        const dim = s + pad * 2;
        const oc = document.createElement('canvas');
        oc.width = dim; oc.height = dim;
        const octx = oc.getContext('2d');
        octx.font = `${s}px serif`;
        octx.textAlign = 'center'; octx.textBaseline = 'middle';
        octx.fillText(t.emoji, dim / 2, dim / 2);
        emojiCache[key] = { canvas: oc, dim };
    });

    let mode = null;
    let state = {
        score: 0, ammo: 10, currentHunt: 1, harvested: 0, goal: 3,
        gameOver: false, analysisActive: false, isWaitingForAnalysis: false,
        shake: 0, zoom: 1.0, targetZoom: 1.0,
        camX: CANVAS_WIDTH/2, camY: CANVAS_HEIGHT/2,
        animals: [], particles: [], floatingTexts: [], bubbles: [], spearLines: [],
        lastTime: 0, mouseX: CANVAS_WIDTH/2, mouseY: CANVAS_HEIGHT/2,
        isAiming: false, landscape: [], currentLevelSpecies: [], waveOffset: 0,
        frenzyTimeLeft: 60, frenzyRunning: false,
        combo: 0, comboTimer: 0, catchLog: {}, frenzyScore: 0,
    };

    const FRENZY_DURATION = 30;

    let frenzyHighScore = parseInt(localStorage.getItem('frenzy_hs') || '0');
    let comboPopTimeout = null;

    // OPPONENT SIMULATION
    // Pre-generate a score curve for the opponent: random events over 15s
    // that produce a plausible but beatable final score.
    let oppState = { score: 0, events: [], nextEventIdx: 0 };
    const oppHud        = document.getElementById('opponent-hud');
    const oppHudPlaceholder = document.getElementById('opponent-hud-placeholder');
    const oppScoreEl    = document.getElementById('opponent-score');
    const oppBar        = document.getElementById('opponent-bar');
    const oppLeadEl     = document.getElementById('opponent-lead');

    function showOppHud(visible) {
        oppHud.style.display = visible ? 'block' : 'none';
        oppHudPlaceholder.style.display = visible ? 'none' : 'block';
    }

    function generateOpponentScript() {
        // Build a list of (timeElapsed, pointsGained) events
        // Total opponent score will land somewhere around frenzyHighScore ± 30%
        // so the race is always close but not guaranteed.
        const base = frenzyHighScore > 0 ? frenzyHighScore : 4000;
        const target = Math.round(base * (0.7 + Math.random() * 0.6)); // 70%–130% of best
        const events = [];
        let t = 0, accumulated = 0;
        while (accumulated < target && t < FRENZY_DURATION - 0.5) {
            t += 0.4 + Math.random() * 1.2; // gap between catches
            if (t >= FRENZY_DURATION) break;
            const remaining = target - accumulated;
            const chunk = Math.min(remaining, Math.round(100 + Math.random() * 800));
            accumulated += chunk;
            events.push({ t: Math.min(t, FRENZY_DURATION - 0.1), pts: chunk });
        }
        oppState = { score: 0, events, nextEventIdx: 0, target };
    }

    function updateOpponent(elapsed) {
        let changed = false;
        while (oppState.nextEventIdx < oppState.events.length &&
               oppState.events[oppState.nextEventIdx].t <= elapsed) {
            oppState.score += oppState.events[oppState.nextEventIdx].pts;
            oppState.nextEventIdx++;
            changed = true;
        }
        if (changed) {
            oppScoreEl.textContent = oppState.score.toLocaleString();
            oppScoreEl.classList.remove('opp-bump');
            void oppScoreEl.offsetWidth;
            oppScoreEl.classList.add('opp-bump');
        }
        // Bar shows opponent fill vs max expected; color reflects who's winning
        const maxExpected = Math.max(oppState.target, state.frenzyScore, oppState.score, 1);
        const oppRatio = Math.min(oppState.score / maxExpected, 1);
        const playerRatio = Math.min(state.frenzyScore / maxExpected, 1);
        oppBar.style.width = (oppRatio * 100) + '%';
        const oppWinning = oppState.score > state.frenzyScore;
        oppBar.style.background = oppWinning ? '#f87171' : '#4ade80';
        // Lead label — always show current diff
        const diff = state.frenzyScore - oppState.score;
        if (diff > 0) {
            oppLeadEl.innerHTML = '<span style="color:#4ade80">▲ +' + diff.toLocaleString() + '</span>';
        } else if (diff < 0) {
            oppLeadEl.innerHTML = '<span style="color:#f87171">▼ ' + Math.abs(diff).toLocaleString() + '</span>';
        } else {
            oppLeadEl.innerHTML = '<span style="color:#facc15">TIED</span>';
        }
    }

    function init() {
        canvas.width  = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;
        syncHudToCanvas();
        window.addEventListener('resize', syncHudToCanvas);
        generateLandscape();
        spawnBubbles();
        showModeSelect();
        requestAnimationFrame(gameLoop);
    }

    function syncHudToCanvas() {
        // Scale canvas to fill viewport while preserving aspect ratio
        const vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        const aspect = CANVAS_WIDTH / CANVAS_HEIGHT;
        let w, h;
        if (vw / vh < aspect) { w = vw; h = vw / aspect; }
        else { h = vh; w = vh * aspect; }
        canvas.style.cssText = `background:#000;display:block;cursor:crosshair;width:${w}px;height:${h}px;`;

        const rect = canvas.getBoundingClientRect();
        if (rect.width === 0) return;
        document.querySelectorAll('.ui-panel').forEach(el => {
            el.style.left  = rect.left + 'px';
            el.style.width = rect.width + 'px';
        });
    }

    function showModeSelect() {
        modeSelect.style.display  = 'flex';
        msgBox.style.display      = 'none';
        analysisBox.style.display = 'none';
        hsPreview.textContent = frenzyHighScore > 0 ? '🏆 Best: ' + frenzyHighScore.toLocaleString() : '';
    }

    function selectMode(m) {
        mode = m;
        modeSelect.style.display = 'none';
        if (m === 'dive') startDiveMode(1);
        else startFrenzyMode();
    }

    function goModeSelect() {
        state.frenzyRunning = false;
        state.gameOver = true;
        msgBox.style.display = 'none';
        showOppHud(false);
        showModeSelect();
    }

    function generateLandscape() {
        state.landscape = [];
        for (let i = 0; i < 5; i++) {
            state.landscape.push({ type:'rock', x:i*140+Math.random()*60, h:80+Math.random()*120, w:120+Math.random()*100, color:`hsl(210,20%,${8+Math.random()*8}%)` });
        }
        const dec = ['🪸','🌿','🪸','🌱','🪸','🌿'];
        for (let i = 0; i < 22; i++) {
            state.landscape.push({ type:'coral', emoji:dec[Math.floor(Math.random()*dec.length)], x:Math.random()*CANVAS_WIDTH, y:CANVAS_HEIGHT-30-Math.random()*200, s:28+Math.random()*44 });
        }
    }

    function spawnBubbles() { for (let i=0;i<18;i++) state.bubbles.push(makeBubble(true)); }
    function makeBubble(randomY) {
        return { x:Math.random()*CANVAS_WIDTH, y:randomY?Math.random()*CANVAS_HEIGHT:CANVAS_HEIGHT+10, vy:0.4+Math.random()*0.8, r:2+Math.random()*5, alpha:0.15+Math.random()*0.35, wobble:Math.random()*Math.PI*2, wobbleSpeed:0.02+Math.random()*0.03 };
    }

    // DIVE MODE
    function startDiveMode(num) {
        state.currentHunt=num; state.harvested=0;
        state.goal=(num===1)?3:Math.min(5,3+Math.floor(num/2));
        state.ammo=state.goal+Math.max(2,6-Math.floor(num/3));
        state.animals=[]; state.particles=[]; state.floatingTexts=[]; state.spearLines=[];
        state.gameOver=false; state.analysisActive=false; state.isWaitingForAnalysis=false;
        state.zoom=1.0; state.targetZoom=1.0; state.frenzyRunning=false;
        const allKeys=Object.keys(FISH_TYPES); let pool=[];
        while(pool.length<4){const k=allKeys[Math.floor(Math.random()*allKeys.length)];if(!pool.includes(k))pool.push(k);}
        state.currentLevelSpecies=pool;
        huntEl.textContent='Dive '+num; goalEl.textContent='Catch: '+state.goal;
        document.getElementById('dive-label-wrap').style.display='block';
        ammoLabel.textContent='Spears'; statusSub.textContent='Aim for the vitals';
        frenzyTimerWrap.style.display='none'; comboHud.style.display='none';
        showOppHud(false);
        updateUI(); msgBox.style.display='none'; analysisBox.style.display='none';
        setTimeout(spawnAnimal,1000);
    }

    function spawnAnimal() {
        if(mode!=='dive') return;
        if(state.gameOver||state.analysisActive||state.isWaitingForAnalysis||state.harvested>=state.goal) return;
        const aliveCount=state.animals.filter(a=>!a.dead).length;
        if(aliveCount>=2) return;
        const key=state.currentLevelSpecies[Math.floor(Math.random()*state.currentLevelSpecies.length)];
        spawnFish(key,false);
        // Spawn a second fish if this was the first
        if(aliveCount===0){
            const key2=state.currentLevelSpecies[Math.floor(Math.random()*state.currentLevelSpecies.length)];
            spawnFish(key2,false);
        }
        statusEl.textContent='FISH SPOTTED'; statusEl.className='text-xl font-bold text-cyan-400';
    }

    // FRENZY MODE
    function startFrenzyMode() {
        state.score=0; state.frenzyScore=0; state.frenzyTimeLeft=FRENZY_DURATION; state.frenzyRunning=true;
        state.frenzyElapsed=0;
        state.combo=0; state.comboTimer=0; state.catchLog={};
        generateOpponentScript();
        oppState.score=0; oppScoreEl.textContent='0';
        oppBar.style.width='0%'; oppLeadEl.textContent='';
        showOppHud(true);
        state.animals=[]; state.particles=[]; state.floatingTexts=[]; state.spearLines=[];
        state.gameOver=false; state.analysisActive=false; state.isWaitingForAnalysis=false;
        state.zoom=1.0; state.targetZoom=1.0; state.ammo=999;
        document.getElementById('dive-label-wrap').style.display='none';
        huntEl.textContent='FRENZY'; goalEl.textContent='';
        ammoLabel.textContent='∞ Spears'; ammoEl.textContent='∞';
        ammoContainer.className='';
        statusEl.textContent='FRENZY!'; statusEl.className='text-xl font-bold text-yellow-400';
        statusSub.textContent='Hit streaks = combo bonus!';
        frenzyTimerWrap.style.display='block'; comboHud.style.display='block';
        frenzyTimerEl.textContent=FRENZY_DURATION; frenzyTimerEl.className='text-4xl font-black text-cyan-300';
        comboCounter.textContent='×1';
        msgBox.style.display='none'; analysisBox.style.display='none';
        for(let i=0;i<6;i++) setTimeout(()=>spawnFrenzyFish(),i*180);
    }

    function spawnFrenzyFish() {
        if(!state.frenzyRunning||state.gameOver) return;
        const key=FRENZY_POOL[Math.floor(Math.random()*FRENZY_POOL.length)];
        spawnFish(key,true);
    }

    function spawnFish(key,frenzy) {
        const type=FISH_TYPES[key];
        const side=Math.random()>0.5?-1:1;
        const isBottom=key==='CRAB'||key==='LOBSTER';
        const startY=isBottom?CANVAS_HEIGHT-100-Math.random()*80:120+Math.random()*(CANVAS_HEIGHT-380);
        const speedMult=frenzy?(0.85+Math.random()*0.6):1.0;
        state.animals.push({ x:side===-1?-130:CANVAS_WIDTH+130, y:startY, vy:(Math.random()-0.5)*0.8, type, typeKey:key, dir:side===-1?1:-1, dead:false, fallY:0, alpha:1, spawnTime:performance.now(), wobble:Math.random()*Math.PI*2, speedMult, frenzy });
    }

    // Convert screen-space mouse coords to world-space (accounting for zoom offset)
    function worldMouse(){
        if(state.zoom<=1.0) return {x:state.mouseX, y:state.mouseY};
        return {
            x: state.camX+(state.mouseX-state.camX)/state.zoom,
            y: state.camY+(state.mouseY-state.camY)/state.zoom
        };
    }

    const SPEAR_FLIGHT_DURATION = 0.35; // seconds to reach target
    state.spears = [];

    // FIRE — launch a first-person spear toward the aim point
    function fire() {
        if(state.gameOver||state.analysisActive) return;
        if(mode==='dive'&&(state.isWaitingForAnalysis||state.ammo<=0)) return;
        if(mode==='frenzy'&&!state.frenzyRunning) return;
        if(mode==='dive'){state.ammo--; state.isWaitingForAnalysis=true;}
        state.shake=18;
        triggerFlash(0.22);
        const wm=worldMouse();
        // Origin: bottom of the current viewport (player holds spear below view)
        const viewBottom = state.camY + (CANVAS_HEIGHT/2) / Math.max(state.zoom, 1);
        state.spears.push({
            originX: wm.x, originY: viewBottom + 60,
            targetX: wm.x, targetY: wm.y,
            progress: 0, // 0→1
            elapsed: 0,
            done: false,
            diveShot: mode==='dive',
            bubbles: [] // wake bubbles
        });
        updateUI();
    }

    // Check spear collision against animals at the target point
    function checkSpearHit(spear){
        const sx=spear.targetX, sy=spear.targetY;
        let shotData={hit:false,tier:'miss',animal:null,bulletX:sx,bulletY:sy};
        state.animals.forEach(animal=>{
            if(animal.dead) return;
            const s=animal.type.size;
            const visCY=animal.y-s; const bodyR=s*1.1;
            const distBody=Math.hypot(sx-animal.x,sy-visCY);
            const hx=animal.x+(animal.dir*s*animal.type.hX);
            const hy=animal.y-(s*animal.type.hY);
            const dH=Math.hypot(sx-hx,sy-hy);
            let tier=null;
            if(dH<animal.type.heartSize){
                if(dH<animal.type.heartSize*0.25) tier='perfect';
                else if(dH<animal.type.heartSize*0.6) tier='great';
                else tier='heart';
            } else if(distBody<bodyR){
                tier='body';
            }
            if(tier){
                if(!shotData.hit){ shotData.hit=true; shotData.animal={...animal}; shotData.tier=tier; }
                processHit(animal,tier);
            }
        });
        return shotData;
    }

    // Resolve spear outcome (hit or miss)
    function resolveSpear(spear, shotData){
        spear.done=true;
        state.spearLines.push({x1:spear.targetX,y1:spear.targetY,life:1.0});
        if(spear.diveShot){
            setTimeout(()=>{
                if(shotData.hit) showShotAnalysis(shotData);
                else{
                    state.isWaitingForAnalysis=false;
                    statusEl.textContent='MISSED!'; statusEl.className='text-xl font-bold text-red-500';
                    if(state.animals.filter(a=>!a.dead).length===0) spawnAnimal();
                }
            },500);
        } else {
            if(!shotData.hit){ breakCombo(); showFloatingText('MISS',spear.targetX,spear.targetY-40,'#ef4444'); }
        }
    }

    // HIT PROCESSING
    function processHit(animal,tier){
        animal.dead=true;
        let mult=1,label='BODY HIT',color='#fbbf24';
        if(tier==='perfect'){mult=10;label='BULLSEYE!';color='#ef4444';}
        else if(tier==='great'){mult=5;label='VITAL HIT!';color='#f87171';}
        else if(tier==='heart'){mult=3;label='GILL SHOT';color='#fca5a5';}
        const base=animal.type.points*mult;
        if(mode==='frenzy'){
            state.harvested++;
            state.combo++; state.comboTimer=3.5;
            const cMult=getComboMult(state.combo);
            const total=Math.round(base*cMult);
            state.score+=total; state.frenzyScore+=total;
            state.catchLog[animal.typeKey]=(state.catchLog[animal.typeKey]||0)+1;
            if(state.combo>=2) showComboPop(state.combo,cMult);
            const ms=cMult%1===0?cMult.toString():cMult.toFixed(1);
            comboCounter.textContent='×'+ms;
            const rc=RARITY_COLOR[animal.type.rarity];
            showFloatingText('+'+total,animal.x,animal.y-55,rc);
            if(state.combo>=2) showFloatingText(state.combo+'× COMBO!',animal.x,animal.y-105,'#facc15');
            createExplosion(animal.x,animal.y,rc,mult*10);
            setTimeout(spawnFrenzyFish,350+Math.random()*350);
        } else {
            state.harvested++;
            state.score+=base;
            createExplosion(animal.x,animal.y,mult>1?'#00e5ff':'#ffffff',mult*12);
            showFloatingText(label,animal.x,animal.y-80,color);
        }
        updateUI();
    }

    function getComboMult(c){
        if(c<=1) return 1;
        if(c<=2) return 1.5;
        if(c<=4) return 2;
        if(c<=6) return 3;
        if(c<=9) return 4;
        if(c<=14) return 5;
        return 7;
    }

    function breakCombo(){
        if(state.combo>=3) showFloatingText('COMBO BROKEN!',state.mouseX,state.mouseY-60,'#ef4444');
        state.combo=0; state.comboTimer=0;
        comboCounter.textContent='×1';
    }

    function showComboPop(combo,mult){
        if(comboPopTimeout) clearTimeout(comboPopTimeout);
        comboDisplay.classList.remove('pop');
        void comboDisplay.offsetWidth;
        const ms=mult%1===0?mult.toString():mult.toFixed(1);
        comboText.textContent=combo+'× COMBO!';
        comboSub.textContent='×'+ms+' Points';
        comboDisplay.classList.add('pop');
        comboPopTimeout=setTimeout(()=>comboDisplay.classList.remove('pop'),800);
    }

    // DIVE SHOT ANALYSIS
    function showShotAnalysis(data){
        state.isWaitingForAnalysis=false; state.analysisActive=true;
        analysisBox.style.display='block';
        const {tier,animal,bulletX,bulletY}=data;
        if(animal) analysisAnimalName.textContent=animal.type.name;
        let label='BODY HIT',pts=animal.type.points;
        if(tier==='perfect'){label='PERFECT BULLSEYE';pts*=10;}
        else if(tier==='great'){label='VITAL HIT';pts*=5;}
        else if(tier==='heart'){label='GILL SHOT';pts*=3;}
        analysisResult.textContent=label;
        analysisResult.className=tier==='body'?'text-2xl font-black text-yellow-500':'text-2xl font-black text-cyan-400';
        analysisScore.textContent='+'+pts+' Points';
        fCtx.clearRect(0,0,fCanvas.width,fCanvas.height);
        if(animal){
            fCtx.save();
            const s=animal.type.size;
            const scale=Math.min(2.0,200/(s*2.2));
            const gY=fCanvas.height/2+(s*scale)+30;
            fCtx.translate(fCanvas.width/2,gY); fCtx.scale(scale,scale);
            renderEmoji(fCtx,animal.type,s,animal.dir,true);
            const hx=animal.dir*s*animal.type.hX; const hy=-s*animal.type.hY;
            fCtx.fillStyle='rgba(0,220,255,0.12)'; fCtx.beginPath(); fCtx.arc(hx,hy,animal.type.heartSize,0,Math.PI*2); fCtx.fill();
            fCtx.fillStyle='rgba(0,220,255,0.3)';  fCtx.beginPath(); fCtx.arc(hx,hy,animal.type.heartSize*0.6,0,Math.PI*2); fCtx.fill();
            fCtx.fillStyle='rgba(0,220,255,0.7)';  fCtx.beginPath(); fCtx.arc(hx,hy,animal.type.heartSize*0.25,0,Math.PI*2); fCtx.fill();
            fCtx.restore();
            const relX=(bulletX-animal.x)*scale+fCanvas.width/2;
            const relY=(bulletY-animal.y)*scale+gY;
            fCtx.strokeStyle='rgba(0,220,255,0.9)'; fCtx.lineWidth=3; fCtx.beginPath();
            fCtx.moveTo(relX-15,relY-15); fCtx.lineTo(relX+15,relY+15);
            fCtx.moveTo(relX+15,relY-15); fCtx.lineTo(relX-15,relY+15); fCtx.stroke();
            fCtx.fillStyle='#00e5ff'; fCtx.beginPath(); fCtx.arc(relX,relY,4,0,Math.PI*2); fCtx.fill();
        }
    }

    function closeAnalysis(){
        state.analysisActive=false; analysisBox.style.display='none'; updateUI();
        if(state.harvested>=state.goal){
            setTimeout(()=>showEndScreen('DIVE SUCCESS','Total Score: '+state.score,'Next Dive',false),300);
        } else if(state.ammo<=0&&state.animals.filter(a=>!a.dead).length===0){
            setTimeout(()=>showEndScreen('DIVE FAILED','Out of Spears','Retry',false),300);
        } else { spawnAnimal(); }
    }

    function actionBtn(){
        if(mode==='frenzy'){ state.score=0; startFrenzyMode(); }

    // RENDER
    function renderEmoji(tCtx,typeObj,size,dir,isXray){
        tCtx.save(); tCtx.scale(dir===1?-1:1,1);
        if(isXray) tCtx.globalAlpha=0.25;
        // Find cached emoji by matching the type object
        const key = Object.keys(FISH_TYPES).find(k=>FISH_TYPES[k]===typeObj);
        const cached = key && emojiCache[key];
        if(cached){
            const d=cached.dim;
            tCtx.drawImage(cached.canvas, -d/2, -size-d/2, d, d);
        } else {
            tCtx.font=`${size*2.2}px serif`; tCtx.textAlign='center'; tCtx.textBaseline='middle';
            tCtx.fillText(typeObj.emoji,0,-size);
        }
        tCtx.restore();
    }

    function triggerFlash(i){ flash.style.opacity=i; }

    function updateUI(){
        scoreEl.textContent=state.score.toLocaleString();
        if(mode!=='frenzy'){
            ammoEl.textContent=state.ammo;
            ammoContainer.className=state.ammo<=2?'low-ammo':'';
        }
    }

    // UPDATE
    function update(dt){
        if(state.analysisActive||state.gameOver) return;
        const dtSec=Math.min(dt/1000,0.1);
        state.waveOffset+=0.015;
        state.targetZoom=state.isAiming?2.5:1.0;
        state.zoom+=(state.targetZoom-state.zoom)*0.15;
        // In dive mode, camera tracks the closest living animal to cursor; in frenzy, follows mouse
        if(mode==='dive'){
            const aliveArr=state.animals.filter(a=>!a.dead);
            let alive=null;
            if(aliveArr.length===1) alive=aliveArr[0];
            else if(aliveArr.length>1){
                alive=aliveArr.reduce((best,a)=>{
                    const d=Math.hypot(a.x-state.mouseX,a.y-state.mouseY);
                    return d<best.d?{a,d}:best;
                },{a:aliveArr[0],d:Infinity}).a;
            }
            if(alive&&state.isAiming){
                // Blend camera between fish (40%) and cursor (60%) so player can pan
                const tx=alive.x*0.4+state.mouseX*0.6;
                const ty=(alive.y-alive.type.size)*0.4+state.mouseY*0.6;
                state.camX+=(tx-state.camX)*0.18;
                state.camY+=(ty-state.camY)*0.18;
            } else {
                state.camX+=(state.mouseX-state.camX)*0.12;
                state.camY+=(state.mouseY-state.camY)*0.12;
            }
        } else {
            state.camX=state.mouseX; state.camY=state.mouseY;
        }
        const speedFactor=1.3-((state.zoom-1.0)/1.5)*1.0;
        const op=parseFloat(flash.style.opacity)||0;
        if(op>0) flash.style.opacity=Math.max(0,op-0.04);
        if(state.shake>0) state.shake*=0.82;

        if(mode==='frenzy'&&state.frenzyRunning){
            state.frenzyTimeLeft=Math.max(0,state.frenzyTimeLeft-dtSec);
            state.frenzyElapsed=(state.frenzyElapsed||0)+dtSec;
            frenzyTimerEl.textContent=Math.ceil(state.frenzyTimeLeft);
            if(state.frenzyTimeLeft<=10) frenzyTimerEl.className='text-4xl font-black timer-urgent';
            if(state.combo>0){ state.comboTimer-=dtSec; if(state.comboTimer<=0) breakCombo(); }
            updateOpponent(state.frenzyElapsed);
            if(state.frenzyTimeLeft<=0){
                state.frenzyRunning=false;
                frenzyTimerEl.textContent='0';
                // let existing fish swim off naturally — no hard clear
                // stop spawning new ones (spawnFrenzyFish checks frenzyRunning)
                setTimeout(()=>{ showOppHud(false); showEndScreen("TIME'S UP!",'Score: '+state.frenzyScore.toLocaleString(),'Play Again',true); },1200);
                return;
            }
            if(state.animals.filter(a=>!a.dead).length<4) setTimeout(spawnFrenzyFish,100);
        }

        for(let i=state.spearLines.length-1;i>=0;i--){
            state.spearLines[i].life-=0.12;
            if(state.spearLines[i].life<=0) state.spearLines.splice(i,1);
        }
        // Update spear projectiles
        for(let i=state.spears.length-1;i>=0;i--){
            const sp=state.spears[i];
            if(sp.done){
                // Keep briefly for impact ripple, then remove
                sp.impactLife=(sp.impactLife||1)-0.06;
                if(sp.impactLife<=0) state.spears.splice(i,1);
                continue;
            }
            sp.elapsed+=dtSec;
            sp.progress=Math.min(sp.elapsed/SPEAR_FLIGHT_DURATION, 1);
            // Current position along path
            const ep=sp.progress*sp.progress*(3-2*sp.progress); // smoothstep
            const cx=sp.originX+(sp.targetX-sp.originX)*ep;
            const cy=sp.originY+(sp.targetY-sp.originY)*ep;
            sp.curX=cx; sp.curY=cy;
            // Spawn wake bubbles along the path
            if(Math.random()<0.6){
                sp.bubbles.push({x:cx+(Math.random()-0.5)*6, y:cy, life:1, r:1+Math.random()*3});
            }
            // Fade out old bubbles
            for(let j=sp.bubbles.length-1;j>=0;j--){
                sp.bubbles[j].life-=0.05;
                sp.bubbles[j].y-=0.8;
                sp.bubbles[j].x+=(Math.random()-0.5)*0.5;
                if(sp.bubbles[j].life<=0) sp.bubbles.splice(j,1);
            }
            if(sp.progress>=1){
                const shotData=checkSpearHit(sp);
                resolveSpear(sp,shotData);
            }
        }
        for(let i=state.bubbles.length-1;i>=0;i--){
            const b=state.bubbles[i];
            b.wobble+=b.wobbleSpeed; b.x+=Math.sin(b.wobble)*0.5; b.y-=b.vy;
            if(b.y<-10) state.bubbles[i]=makeBubble(false);
        }
        for(let i=state.animals.length-1;i>=0;i--){
            const a=state.animals[i];
            if(!a.dead){
                a.wobble=(a.wobble||0)+0.04;
                a.x+=a.type.speed*a.dir*speedFactor*(a.speedMult||1);
                a.y+=a.vy*speedFactor+Math.sin(a.wobble)*0.4;
                if(a.x<-160||a.x>CANVAS_WIDTH+160||a.y<-60||a.y>CANVAS_HEIGHT+60){
                    state.animals.splice(i,1);
                    if(mode==='dive'&&!state.gameOver) spawnAnimal();
                }
            } else {
                a.fallY+=5; a.alpha-=0.04;
                if(a.alpha<=0){
                    state.animals.splice(i,1);
                    if(mode==='dive'&&!state.analysisActive&&state.animals.length===0&&!state.gameOver) spawnAnimal();
                }
            }
        }
        state.particles.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;p.vy-=0.15;p.life-=0.025;if(p.life<=0)state.particles.splice(i,1);});
        state.floatingTexts.forEach((t,i)=>{t.y-=1.5;t.life-=0.015;if(t.life<=0)state.floatingTexts.splice(i,1);});
    }

    // DRAW
    function drawCaustics(){
        ctx.save(); const time=state.waveOffset;
        for(let i=0;i<6;i++){
            const bx=(i/6)*CANVAS_WIDTH+Math.sin(time*0.7+i)*30;
            const w=30+Math.sin(time+i*1.3)*15;
            const g=ctx.createLinearGradient(bx,0,bx,CANVAS_HEIGHT*0.75);
            g.addColorStop(0,`rgba(0,160,255,${0.06+Math.sin(time+i)*0.03})`); g.addColorStop(1,'transparent');
            ctx.fillStyle=g; ctx.beginPath();
            ctx.moveTo(bx-w/2,0); ctx.lineTo(bx+w/2,0);
            ctx.lineTo(bx+w*0.3,CANVAS_HEIGHT*0.75); ctx.lineTo(bx-w*0.3,CANVAS_HEIGHT*0.75);
            ctx.closePath(); ctx.fill();
        }
        ctx.restore();
    }

    function drawRarityRing(animal){
        if(mode!=='frenzy'||animal.type.rarity==='common') return;
        const col=RARITY_COLOR[animal.type.rarity];
        ctx.save(); ctx.globalAlpha=0.4;
        ctx.strokeStyle=col; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(animal.x,animal.y-animal.type.size,animal.type.size*1.15,0,Math.PI*2); ctx.stroke();
        ctx.restore();
    }

    function draw(){
        ctx.save();
        if(state.shake>0.5) ctx.translate((Math.random()-0.5)*state.shake,(Math.random()-0.5)*state.shake);
        const sg=ctx.createLinearGradient(0,0,0,CANVAS_HEIGHT);
        sg.addColorStop(0,'#020d1a'); sg.addColorStop(0.3,'#041e35');
        sg.addColorStop(0.7,'#062a48'); sg.addColorStop(1,'#041525');
        ctx.fillStyle=sg; ctx.fillRect(0,0,CANVAS_WIDTH,CANVAS_HEIGHT);
        drawCaustics();
        const hg=ctx.createLinearGradient(0,0,0,CANVAS_HEIGHT*0.5);
        hg.addColorStop(0,'rgba(0,80,160,0.18)'); hg.addColorStop(1,'transparent');
        ctx.fillStyle=hg; ctx.fillRect(0,0,CANVAS_WIDTH,CANVAS_HEIGHT*0.5);
        state.landscape.filter(l=>l.type==='rock').forEach(m=>{
            ctx.fillStyle=m.color; ctx.beginPath();
            ctx.moveTo(m.x-m.w/2,CANVAS_HEIGHT); ctx.lineTo(m.x,CANVAS_HEIGHT-m.h); ctx.lineTo(m.x+m.w/2,CANVAS_HEIGHT); ctx.fill();
        });
        const sg2=ctx.createLinearGradient(0,CANVAS_HEIGHT-90,0,CANVAS_HEIGHT);
        sg2.addColorStop(0,'#0a2a3a'); sg2.addColorStop(1,'#071a28');
        ctx.fillStyle=sg2; ctx.beginPath();
        ctx.moveTo(0,CANVAS_HEIGHT-60); ctx.quadraticCurveTo(CANVAS_WIDTH*0.5,CANVAS_HEIGHT-80,CANVAS_WIDTH,CANVAS_HEIGHT-60);
        ctx.lineTo(CANVAS_WIDTH,CANVAS_HEIGHT); ctx.lineTo(0,CANVAS_HEIGHT); ctx.fill();
        const surfG=ctx.createLinearGradient(0,0,0,80);
        surfG.addColorStop(0,'rgba(0,150,255,0.22)'); surfG.addColorStop(1,'transparent');
        ctx.fillStyle=surfG; ctx.fillRect(0,0,CANVAS_WIDTH,80);
        ctx.strokeStyle='rgba(100,200,255,0.15)'; ctx.lineWidth=2; ctx.beginPath();
        for(let x=0;x<=CANVAS_WIDTH;x+=6){
            const y=18+Math.sin((x*0.04)+state.waveOffset*2)*5;
            x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.stroke();
        if(state.zoom>1.0){
            ctx.translate(state.camX,state.camY); ctx.scale(state.zoom,state.zoom); ctx.translate(-state.camX,-state.camY);
        }
        state.landscape.filter(l=>l.type==='coral').forEach(t=>{ ctx.font=`${t.s}px serif`; ctx.fillText(t.emoji,t.x,t.y); });
        state.bubbles.forEach(b=>{
            ctx.save(); ctx.globalAlpha=b.alpha;
            ctx.strokeStyle='rgba(150,220,255,0.8)'; ctx.lineWidth=1;
            ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
            ctx.fillStyle='rgba(200,240,255,0.3)';
            ctx.beginPath(); ctx.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.35,0,Math.PI*2); ctx.fill();
            ctx.restore();
        });
        state.spearLines.forEach(sl=>{
            ctx.save(); ctx.globalAlpha=sl.life*0.65;
            ctx.strokeStyle='rgba(0,230,255,0.9)'; ctx.lineWidth=2;
            ctx.beginPath(); ctx.moveTo(sl.x1-18,sl.y1); ctx.lineTo(sl.x1+18,sl.y1);
            ctx.moveTo(sl.x1,sl.y1-18); ctx.lineTo(sl.x1,sl.y1+18);
            ctx.stroke(); ctx.restore();
        });
        // Draw spear projectiles
        state.spears.forEach(sp=>{
            // Impact ripple after hit
            if(sp.done){
                const il=sp.impactLife||0;
                ctx.save(); ctx.globalAlpha=il*0.6;
                ctx.strokeStyle='rgba(0,230,255,0.8)'; ctx.lineWidth=2;
                const r=30*(1-il)+10;
                ctx.beginPath(); ctx.arc(sp.targetX,sp.targetY,r,0,Math.PI*2); ctx.stroke();
                ctx.restore();
                return;
            }
            const p=sp.progress;
            const ep=p*p*(3-2*p); // smoothstep
            const cx=sp.curX||sp.originX, cy=sp.curY||sp.originY;
            // Scale: starts small (far away), grows to full size
            const scale=0.15+ep*0.85;
            const angle=Math.atan2(sp.targetY-sp.originY, sp.targetX-sp.originX);

            // Wake bubbles
            ctx.save();
            sp.bubbles.forEach(b=>{
                ctx.globalAlpha=b.life*0.5;
                ctx.strokeStyle='rgba(150,220,255,0.7)'; ctx.lineWidth=1;
                ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.stroke();
            });
            ctx.restore();

            // Motion trail — line from origin fading toward spear
            ctx.save();
            const grad=ctx.createLinearGradient(sp.originX,sp.originY,cx,cy);
            grad.addColorStop(0,'rgba(0,230,255,0)');
            grad.addColorStop(0.5,'rgba(0,230,255,0.15)');
            grad.addColorStop(1,'rgba(0,230,255,0.5)');
            ctx.strokeStyle=grad; ctx.lineWidth=2*scale;
            ctx.beginPath(); ctx.moveTo(sp.originX,sp.originY); ctx.lineTo(cx,cy); ctx.stroke();
            ctx.restore();

            // Spear body
            ctx.save();
            ctx.translate(cx,cy); ctx.rotate(angle); ctx.scale(scale,scale);
            // Shaft
            ctx.strokeStyle='#8B7355'; ctx.lineWidth=4;
            ctx.beginPath(); ctx.moveTo(-40,0); ctx.lineTo(10,0); ctx.stroke();
            // Metal tip
            ctx.fillStyle='#d0d0d0';
            ctx.beginPath(); ctx.moveTo(22,0); ctx.lineTo(8,-6); ctx.lineTo(8,6); ctx.closePath(); ctx.fill();
            ctx.strokeStyle='#888'; ctx.lineWidth=1;
            ctx.stroke();
            // Glow around spear
            ctx.globalAlpha=0.7;
            ctx.shadowColor='#00e5ff'; ctx.shadowBlur=16;
            ctx.strokeStyle='#00e5ff'; ctx.lineWidth=2;
            ctx.beginPath(); ctx.moveTo(-40,0); ctx.lineTo(22,0); ctx.stroke();
            ctx.restore();
        });
        state.animals.forEach(a=>{
            ctx.save(); ctx.translate(a.x,a.y+a.fallY); ctx.globalAlpha=a.alpha;
            drawRarityRing(a);
            renderEmoji(ctx,a.type,a.type.size,a.dir,false);
            ctx.restore();
        });
        state.particles.forEach(p=>{
            ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
        });
        ctx.restore();
        state.floatingTexts.forEach(t=>{
            ctx.globalAlpha=t.life; ctx.fillStyle=t.color;
            ctx.font='900 38px sans-serif'; ctx.textAlign='center';
            ctx.fillText(t.text,t.x,t.y);
        });
        ctx.globalAlpha=1;
        if(!state.analysisActive&&state.isAiming) drawCrosshair();
    }

    function drawCrosshair(){
        const x=state.mouseX,y=state.mouseY; ctx.save();
        if(state.isAiming){
            const g=ctx.createRadialGradient(state.camX,state.camY,90*state.zoom,state.camX,state.camY,400*state.zoom);
            g.addColorStop(0,'transparent'); g.addColorStop(1,'rgba(0,10,30,0.92)');
            ctx.fillStyle=g; ctx.fillRect(0,0,CANVAS_WIDTH,CANVAS_HEIGHT);
        } else {
            const g=ctx.createRadialGradient(x,y,20,x,y,150);
            g.addColorStop(0,'transparent'); g.addColorStop(1,'rgba(0,0,0,0.4)');
            ctx.fillStyle=g; ctx.fillRect(0,0,CANVAS_WIDTH,CANVAS_HEIGHT);
        }
        ctx.strokeStyle=state.isAiming?'#00e5ff':'rgba(0,220,255,0.7)'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(x,y,state.isAiming?70:45,0,Math.PI*2); ctx.stroke();
        const cS=state.isAiming?110:65;
        ctx.beginPath();
        ctx.moveTo(x-cS,y); ctx.lineTo(x-15,y); ctx.moveTo(x+cS,y); ctx.lineTo(x+15,y);
        ctx.moveTo(x,y-cS); ctx.lineTo(x,y-15); ctx.moveTo(x,y+cS); ctx.lineTo(x,y+15);
        ctx.stroke();
        ctx.fillStyle=state.isAiming?'#00e5ff':'rgba(0,220,255,0.9)';
        ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
        ctx.restore();
    }

    function gameLoop(timestamp){
        update(timestamp-state.lastTime);
        state.lastTime=timestamp;
        draw();
        requestAnimationFrame(gameLoop);
    }

    const TOUCH_Y_OFFSET = -80; // offset crosshair above finger on touch devices
    let isTouch = false;
    const updateMouse=(e)=>{
        const rect=canvas.getBoundingClientRect();
        const cx=e.clientX||(e.touches?e.touches[0].clientX:0);
        const cy=e.clientY||(e.touches?e.touches[0].clientY:0);
        state.mouseX=(cx-rect.left)*(CANVAS_WIDTH/rect.width);
        state.mouseY=(cy-rect.top)*(CANVAS_HEIGHT/rect.height);
        if(isTouch) state.mouseY+=TOUCH_Y_OFFSET;
    };
    canvas.addEventListener('mousemove',updateMouse);
    canvas.addEventListener('mousedown',()=>{if(!state.analysisActive&&!state.isWaitingForAnalysis) state.isAiming=true;});
    canvas.addEventListener('mouseup',()=>{if(state.isAiming) fire(); state.isAiming=false;});
    canvas.addEventListener('touchstart',(e)=>{e.preventDefault();isTouch=true;updateMouse(e);if(!state.analysisActive&&!state.isWaitingForAnalysis) state.isAiming=true;},{passive:false});
    canvas.addEventListener('touchmove',(e)=>{e.preventDefault();updateMouse(e);},{passive:false});
    canvas.addEventListener('touchend',(e)=>{e.preventDefault();if(state.isAiming) fire(); state.isAiming=false; isTouch=false;},{passive:false});

    function createExplosion(x,y,color,count){
        for(let i=0;i<count;i++) state.particles.push({x,y,vx:(Math.random()-0.5)*18,vy:(Math.random()-0.5)*18-4,life:1.0,color,size:Math.random()*5+3});
    }
    function showFloatingText(text,x,y,color){ state.floatingTexts.push({text,x,y,life:1.0,color}); }

    window.onload=()=>{
        init();
        // iOS Safari may report wrong viewport size initially
        setTimeout(syncHudToCanvas, 100);
        setTimeout(syncHudToCanvas, 500);
        if(window.visualViewport) window.visualViewport.addEventListener('resize', syncHudToCanvas);
    };
</script>

    import { initTracking } from '../firebase-tracker.js';
    initTracking('underwater-fishing');
</script>
