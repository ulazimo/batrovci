    NARWHAL:   { name:'Narwhal',    emoji:'🦭', size:70, speed:2.2, points:2500, rarity:'legendary',modelKey:'long',   scale3d:1.8, color:0x6688aa, brain:{x:0.8,y:0.6,z:0.5,r:0.17},  heart:{x:0.4,y:0.35,z:0.5,r:0.20} },
};
const RARITY_COLOR = { common:'#94a3b8', uncommon:'#4ade80', rare:'#60a5fa', epic:'#c084fc', legendary:'#f59e0b' };
const MODEL_FILES = {
    common:   './models/fish_common.glb',
    round:    './models/fish_round.glb',
    long:     './models/fish_long.glb',
    tentacle: './models/fish_tentacle.glb',
    coral:    './models/coral_reef.glb',
};
const SPEAR_FLIGHT_TIME = 0.5;
const FISH_SPAWN_RADIUS_MIN = 15;
const FISH_SPAWN_RADIUS_MAX = 30;

// ============================================================
// DOM REFS
// ============================================================
const container   = document.getElementById('game-container');
const flash       = document.getElementById('flash-overlay');
const crosshairEl = document.getElementById('crosshair');
const scoreEl     = document.getElementById('score');
const ammoEl      = document.getElementById('ammo');
const ammoContainer = document.getElementById('ammo-container');
const huntEl      = document.getElementById('hunt-round');
const goalEl      = document.getElementById('hunt-goal');
const statusEl    = document.getElementById('status-text');
const statusSub   = document.getElementById('status-sub');
const analysisBox = document.getElementById('shot-analysis');
const analysisAnimalName = document.getElementById('analysis-animal-name');
const analysisResult = document.getElementById('analysis-result');
const analysisScore  = document.getElementById('analysis-score');
const feedbackContainer = document.getElementById('feedback-3d');
let feedbackRenderer, feedbackScene, feedbackCamera, feedbackAnimId;
let feedbackMesh, feedbackSpearLine, feedbackHitRings=[];
const msgBox      = document.getElementById('message-box');
const msgTitleEl  = document.getElementById('msg-title');
const msgBodyEl   = document.getElementById('msg-body');
const actionBtnEl = document.getElementById('action-btn');
const modeSelect  = document.getElementById('mode-select');

// ============================================================
// STATE
// ============================================================
let state = {
    score:0, ammo:10, currentHunt:1, harvested:0, goal:3,
    gameOver:false, analysisActive:false, isWaitingForAnalysis:false,
    isAiming:false, shake:0, currentLevelSpecies:[],
    animals:[], spears:[], particles:[], bubblePositions:null,
    // Shot tracking state
    trackingSpear: false,  // camera follows spear after firing
    shotFeedbackTimer: 0,  // delay before zoom-out after impact
};
let clock, scene, camera, renderer;
let modelCache = {};
let isTouching = false;
let aimYaw = 0, aimPitch = 0; // absolute aim direction while aiming
const AIM_SENSITIVITY = 0.0013;
const AIM_TOUCH_SENSITIVITY = 0.0022;
const AIM_LIMIT = Math.PI / 3; // ±60 degrees — full freedom to aim around
let lastTouchX = 0, lastTouchY = 0;

// Environments
let seabed, godRays=[], bubbleSystem, causticsPlane;
let seaweedMeshes=[], waterMesh=null; // cached refs (avoid scene.traverse per frame)

// Scratch vectors (reused every frame to avoid GC pressure)
const _v1 = new THREE.Vector3();
const _v2 = new THREE.Vector3();
const _bbox = new THREE.Box3();
const _bboxSize = new THREE.Vector3();

// Shared particle geometry + material (pool instead of per-particle Mesh)
let sharedBubbleGeo, sharedBubbleMat, sharedBurstGeo, sharedBurstMats={};
let sharedSpearShaftGeo, sharedSpearShaftMat, sharedSpearTipGeo, sharedSpearTipMat, sharedSpearGlowGeo, sharedSpearGlowMat;
let sharedImpactGeo, sharedImpactHitMat, sharedImpactMissMat;
let flashOpacity = 0;

function aliveCount() {
    let n = 0;
    for (const a of state.animals) if (!a.dead) n++;
    return n;
}
function inFlightCount() {
    let n = 0;
    for (const s of state.spears) if (!s.done) n++;
    return n;
}

function initSharedGeometry() {
    sharedBubbleGeo = new THREE.SphereGeometry(0.035, 4, 4);
    sharedBubbleMat = new THREE.MeshBasicMaterial({ color:0x88ccff, transparent:true, opacity:0.6, blending:THREE.AdditiveBlending });
    sharedBurstGeo = new THREE.SphereGeometry(0.03, 4, 4);
    // Shared spear parts
    sharedSpearShaftGeo = new THREE.CylinderGeometry(0.025, 0.035, 1.8, 8);
    sharedSpearShaftMat = new THREE.MeshStandardMaterial({ color:0x8B7355, roughness:0.5 });
    sharedSpearTipGeo = new THREE.ConeGeometry(0.06, 0.3, 6);
    sharedSpearTipMat = new THREE.MeshStandardMaterial({ color:0xe0e0e0, metalness:0.9, roughness:0.1 });
    sharedSpearGlowGeo = new THREE.CylinderGeometry(0.06, 0.06, 2.0, 8);
    sharedSpearGlowMat = new THREE.MeshBasicMaterial({ color:0x00e5ff, transparent:true, opacity:0.12, blending:THREE.AdditiveBlending });
    // Shared impact ring
    sharedImpactGeo = new THREE.TorusGeometry(0.3, 0.05, 8, 16);
    sharedImpactHitMat = new THREE.MeshBasicMaterial({ color:0x00e5ff, transparent:true, opacity:0.5, blending:THREE.AdditiveBlending });
    sharedImpactMissMat = new THREE.MeshBasicMaterial({ color:0xff4444, transparent:true, opacity:0.5, blending:THREE.AdditiveBlending });
}

// Material cache per fish species
const tintedMaterialCache = {};

// Dispose helper
function disposeMesh(obj) {
    if (!obj) return;
    obj.traverse(c => {
        if (c.isMesh) {
            if (c.geometry) c.geometry.dispose();
            if (c.material) {
                if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
                else c.material.dispose();
            }
        }
    });
}

// Cleanup helper (shared between goModeSelect and startDiveMode)
function cleanupScene() {
    state.animals.forEach(a => { disposeMesh(a.mesh); scene.remove(a.mesh); });
    state.animals = [];
    state.spears.forEach(sp => {
        disposeMesh(sp.mesh); scene.remove(sp.mesh);
        if (sp.impactRing) { sp.impactRing.geometry.dispose(); sp.impactRing.material.dispose(); scene.remove(sp.impactRing); }
        sp.trailParticles.forEach(p => { p.material.dispose(); scene.remove(p); });
    });
    state.spears = [];
    state.particles.forEach(p => { scene.remove(p); });
    state.particles = [];
}

// ============================================================
// THREE.JS SETUP
// ============================================================
function initScene() {
    clock = new THREE.Clock();
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a2a40);
    scene.fog = new THREE.FogExp2(0x0a2a40, 0.012);

    camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 200);
    camera.position.set(0, 5, 0);
    camera.rotation.order = 'YXZ';

    renderer = new THREE.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.insertBefore(renderer.domElement, container.firstChild);

    // Lights
    const ambient = new THREE.AmbientLight(0x88bbdd, 0.9);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 30, 5);
    scene.add(dirLight);
    // Fill light from below to soften dark undersides
    const fillLight = new THREE.DirectionalLight(0x4488aa, 0.4);
    fillLight.position.set(0, -5, 0);
    scene.add(fillLight);
    const diveLight = new THREE.PointLight(0x44ccff, 0.6, 40);
    diveLight.position.copy(camera.position);
    scene.add(diveLight);
    state.diveLight = diveLight;

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

// ============================================================
// ENVIRONMENT
// ============================================================
function createEnvironment() {
    // Seabed
    const seaGeo = new THREE.PlaneGeometry(120, 120, 60, 60);
    const verts = seaGeo.attributes.position;
    for (let i = 0; i < verts.count; i++) {
        const x = verts.getX(i), y = verts.getY(i);
        verts.setZ(i, Math.sin(x*0.3)*0.5 + Math.cos(y*0.4)*0.4 + Math.random()*0.3);
    }
    seaGeo.computeVertexNormals();
    seabed = new THREE.Mesh(seaGeo, new THREE.MeshStandardMaterial({ color:0x1a3040, roughness:0.9 }));
    seabed.rotation.x = -Math.PI/2;
    seabed.position.y = -1;
    scene.add(seabed);

    // Rocks
    for (let i = 0; i < 12; i++) {
        const geo = new THREE.DodecahedronGeometry(1+Math.random()*2, 1);
        const rv = geo.attributes.position;
        for (let j = 0; j < rv.count; j++) {
            rv.setX(j, rv.getX(j) + (Math.random()-0.5)*0.4);
            rv.setY(j, rv.getY(j) + (Math.random()-0.5)*0.4);
            rv.setZ(j, rv.getZ(j) + (Math.random()-0.5)*0.4);
        }
        geo.computeVertexNormals();
        const rock = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
            color: new THREE.Color().setHSL(0.55, 0.15, 0.08+Math.random()*0.08), roughness:0.95
        }));
        const angle = Math.random()*Math.PI*2;
        const dist = 8+Math.random()*40;
        rock.position.set(Math.cos(angle)*dist, -0.5+Math.random()*0.5, Math.sin(angle)*dist);
        rock.rotation.set(Math.random(), Math.random(), Math.random());
        scene.add(rock);
    }

    // Coral clusters
    for (let i = 0; i < 18; i++) {
        const group = new THREE.Group();
        const hue = 0.85+Math.random()*0.3; // pinks/oranges/purples
        const mat = new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(hue%1, 0.7, 0.45), roughness:0.7 });
        // Branch coral
        for (let b = 0; b < 3+Math.floor(Math.random()*4); b++) {
            const h = 0.5+Math.random()*1.5;
            const branch = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.12, h, 6), mat);
            branch.position.set((Math.random()-0.5)*0.8, h/2, (Math.random()-0.5)*0.8);
            branch.rotation.set((Math.random()-0.5)*0.4, 0, (Math.random()-0.5)*0.4);
            group.add(branch);
        }
        // Brain coral (occasional)
        if (Math.random() > 0.5) {
            const brain = new THREE.Mesh(new THREE.SphereGeometry(0.3+Math.random()*0.5, 8, 6), mat);
            brain.position.y = 0.3;
            group.add(brain);
        }
        const angle = Math.random()*Math.PI*2;
        const dist = 5+Math.random()*35;
        group.position.set(Math.cos(angle)*dist, -0.8, Math.sin(angle)*dist);
        scene.add(group);
    }

    // Seaweed
    for (let i = 0; i < 25; i++) {
        const h = 2+Math.random()*4;
        const geo = new THREE.PlaneGeometry(0.3, h, 1, 8);
        const mat = new THREE.MeshStandardMaterial({ color:0x22664a, side:THREE.DoubleSide, transparent:true, opacity:0.7 });
        const weed = new THREE.Mesh(geo, mat);
        const angle = Math.random()*Math.PI*2;
        const dist = 4+Math.random()*30;
        weed.position.set(Math.cos(angle)*dist, h/2 - 1, Math.sin(angle)*dist);
        weed.rotation.y = Math.random()*Math.PI;
        weed.userData.baseVerts = geo.attributes.position.array.slice();
        seaweedMeshes.push(weed);
        scene.add(weed);
    }

    // Water surface
    const waterGeo = new THREE.PlaneGeometry(200, 200, 40, 40);
    const waterMat = new THREE.MeshStandardMaterial({
        color:0x1188cc, transparent:true, opacity:0.25, side:THREE.DoubleSide, roughness:0.2, metalness:0.1
    });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.rotation.x = -Math.PI/2;
    water.position.y = 25;
    water.userData.baseVerts = waterGeo.attributes.position.array.slice();
    waterMesh = water;
    scene.add(water);

    // God rays
    for (let i = 0; i < 5; i++) {
        const rayGeo = new THREE.PlaneGeometry(2+Math.random()*3, 40, 1, 1);
        const rayMat = new THREE.MeshBasicMaterial({
            color:0x88ccff, transparent:true, opacity:0.04+Math.random()*0.03,
            side:THREE.DoubleSide, blending:THREE.AdditiveBlending, depthWrite:false
        });
        const ray = new THREE.Mesh(rayGeo, rayMat);
        ray.position.set((Math.random()-0.5)*40, 12, (Math.random()-0.5)*40);
        ray.rotation.set(0.1+Math.random()*0.2, Math.random()*Math.PI, 0);
        ray.userData.baseOpacity = rayMat.opacity;
        ray.userData.phase = Math.random()*Math.PI*2;
        godRays.push(ray);
        scene.add(ray);
    }

    // Caustics on seabed
    const caustCanvas = document.createElement('canvas');
    caustCanvas.width = 256; caustCanvas.height = 256;
    const caustTex = new THREE.CanvasTexture(caustCanvas);
    caustTex.wrapS = caustTex.wrapT = THREE.RepeatWrapping;
    const caustMat = new THREE.MeshBasicMaterial({
        map:caustTex, transparent:true, opacity:0.15, blending:THREE.AdditiveBlending, depthWrite:false
    });
    causticsPlane = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), caustMat);
    causticsPlane.rotation.x = -Math.PI/2;
    causticsPlane.position.y = -0.9;
    causticsPlane.userData.canvas = caustCanvas;
    causticsPlane.userData.ctx = caustCanvas.getContext('2d');
    scene.add(causticsPlane);

    // Bubble particles
    const bubbleCount = 150;
    const bubbleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(bubbleCount * 3);
    for (let i = 0; i < bubbleCount; i++) {
        positions[i*3]   = (Math.random()-0.5)*60;
        positions[i*3+1] = Math.random()*25;
        positions[i*3+2] = (Math.random()-0.5)*60;
    }
    bubbleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const bubbleMat = new THREE.PointsMaterial({ color:0xaaddff, size:0.15, transparent:true, opacity:0.4, depthWrite:false });
    bubbleSystem = new THREE.Points(bubbleGeo, bubbleMat);
    state.bubblePositions = positions;
    scene.add(bubbleSystem);

    // Load coral reef model
    loadCorals();
}

function loadCorals() {
    const loader = new GLTFLoader();
    loader.load(MODEL_FILES.coral, (gltf) => {
        for (let i = 0; i < 4; i++) {
            const coral = gltf.scene.clone();
            const s = 1.5 + Math.random()*2;
            coral.scale.set(s, s, s);
            const angle = Math.random()*Math.PI*2;
            const dist = 10+Math.random()*30;
            coral.position.set(Math.cos(angle)*dist, -1.2, Math.sin(angle)*dist);
            coral.rotation.y = Math.random()*Math.PI*2;
            scene.add(coral);
        }
    }, undefined, (e) => console.warn('Coral reef model not found', e));
}

// ============================================================
// ANIMATE ENVIRONMENT
// ============================================================
function animateEnvironment(time, dt) {
    // Seaweed sway (cached refs, no scene.traverse)
    for (const obj of seaweedMeshes) {
        const base = obj.userData.baseVerts;
        const pos = obj.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const by = base[i*3+1];
            const sway = Math.sin(time*1.5 + obj.position.x*0.5 + by*0.8) * by * 0.06;
            pos.setX(i, base[i*3] + sway);
        }
        pos.needsUpdate = true;
    }
    // Water surface
    if (waterMesh) {
        const base = waterMesh.userData.baseVerts;
        const pos = waterMesh.geometry.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const bx = base[i*3], by = base[i*3+1];
            pos.setZ(i, Math.sin(time*0.8 + bx*0.1)*0.5 + Math.cos(time*0.6 + by*0.12)*0.3);
        }
        pos.needsUpdate = true;
    }

    // God rays pulse
    for (let i = 0; i < godRays.length; i++) {
        const r = godRays[i];
        r.material.opacity = r.userData.baseOpacity * (0.6 + 0.4*Math.sin(time*0.5 + r.userData.phase));
    }

    // Caustics (update every 3rd frame)
    state._caustFrame = (state._caustFrame || 0) + 1;
    if (causticsPlane && state._caustFrame % 3 === 0) {
        const cCtx = causticsPlane.userData.ctx;
        const w = 256;
        cCtx.clearRect(0, 0, w, w);
        cCtx.fillStyle = 'rgba(100,200,255,0.15)';
        for (let i = 0; i < 12; i++) {
            const x = w/2 + Math.sin(time*0.7 + i*1.8)*w*0.35;
            const y = w/2 + Math.cos(time*0.5 + i*2.1)*w*0.35;
            const r = 20+Math.sin(time+i)*15;
            cCtx.beginPath(); cCtx.arc(x, y, r, 0, Math.PI*2); cCtx.fill();
        }
        causticsPlane.material.map.needsUpdate = true;
    }

    // Bubbles rise
    const bp = state.bubblePositions;
    for (let i = 0; i < bp.length/3; i++) {
        bp[i*3+1] += (0.3+Math.random()*0.2)*dt;
        bp[i*3]   += Math.sin(time+i)*0.01;
        if (bp[i*3+1] > 25) { bp[i*3+1] = -1; bp[i*3] = (Math.random()-0.5)*60; bp[i*3+2] = (Math.random()-0.5)*60; }
    }
    bubbleSystem.geometry.attributes.position.needsUpdate = true;

    // Dive light follows camera
    if (state.diveLight) state.diveLight.position.copy(camera.position);
}

// ============================================================
// MODEL LOADING
// ============================================================
function loadModels() {
    return new Promise((resolve) => {
        const loader = new GLTFLoader();
        const keys = ['common','round','long','tentacle'];
        let loaded = 0;
        keys.forEach(key => {
            loader.load(MODEL_FILES[key], (gltf) => {
                const model = gltf.scene;
                // Normalize size to ~1 unit
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const s = 1.0 / maxDim;
                model.scale.set(s, s, s);
                modelCache[key] = model;
                loaded++;
                if (loaded >= keys.length) resolve();
            }, undefined, (err) => {
                console.warn('GLB load failed for', key, err);
                // Fallback: primitive fish
                const group = new THREE.Group();
                const body = new THREE.Mesh(
                    new THREE.SphereGeometry(0.4, 8, 6),
                    new THREE.MeshStandardMaterial({ color:0x4488ff })
                );
                body.scale.set(1.5, 1, 1);
                group.add(body);
                const tail = new THREE.Mesh(
                    new THREE.ConeGeometry(0.3, 0.5, 4),
                    new THREE.MeshStandardMaterial({ color:0x3366cc })
                );
                tail.rotation.z = Math.PI/2;
                tail.position.x = -0.7;
                group.add(tail);
                modelCache[key] = group;
                loaded++;
                if (loaded >= keys.length) resolve();
            });
        });
    });
}

function createFishMesh(typeKey) {
    const type = FISH_TYPES[typeKey];
    const template = modelCache[type.modelKey];
    if (!template) return new THREE.Group();
    const mesh = template.clone();
    const s = type.scale3d;
    mesh.scale.set(s, s, s);
    // Use original materials — only tint if model has no textures
    if (!tintedMaterialCache[typeKey]) {
        tintedMaterialCache[typeKey] = [];
        template.traverse(child => {
            if (child.isMesh && child.material) {
                const m = child.material.clone();
                // Only tint untextured materials; preserve textured ones
                if (!m.map) {
                    m.color.lerp(new THREE.Color(type.color), 0.4);
                }
                tintedMaterialCache[typeKey].push(m);
            }
        });
    }
    const cached = tintedMaterialCache[typeKey];
    let idx = 0;
    mesh.traverse(child => {
        if (child.isMesh && child.material && idx < cached.length) {
            child.material = cached[idx++];
        }
    });
    // Cache mesh children for fast opacity updates on death
    const meshChildren = [];
    mesh.traverse(c => { if (c.isMesh) meshChildren.push(c); });
    mesh.userData.meshChildren = meshChildren;
    return mesh;
}

// ============================================================
// CAMERA CONTROLS
// ============================================================
function initControls() {
    // Raycaster for click-to-fish detection
    const clickRaycaster = new THREE.Raycaster();
    const clickMouse = new THREE.Vector2();

    // Find the fish closest to where the user clicked/tapped
    function findClickedFish(screenX, screenY) {
        clickMouse.x = (screenX / window.innerWidth) * 2 - 1;
        clickMouse.y = -(screenY / window.innerHeight) * 2 + 1;
        clickRaycaster.setFromCamera(clickMouse, camera);

        let closest = null, closestDist = Infinity;
        for (const a of state.animals) {
            if (a.dead) continue;
            const fishPos = a.mesh.position;
            _v2.copy(fishPos).sub(clickRaycaster.ray.origin);
            const proj = _v2.dot(clickRaycaster.ray.direction);
            if (proj < 0) continue;
            _v1.copy(clickRaycaster.ray.direction).multiplyScalar(proj).add(clickRaycaster.ray.origin);
            const d = _v1.distanceTo(fishPos);
            if (d < a.bodyRadius * 5 && d < closestDist) {
                closestDist = d; closest = a;
            }
        }
        // Fallback: nearest alive fish by distance
        if (!closest) {
            for (const a of state.animals) {
                if (a.dead) continue;
                const d = a.mesh.position.distanceTo(camera.position);
                if (d < closestDist) { closestDist = d; closest = a; }
            }
        }
        return closest;
    }

    function startAim(screenX, screenY) {
        if (state.gameOver || state.analysisActive || state.isWaitingForAnalysis) return;
        state.isAiming = true;
        crosshairEl.style.transition = 'none';
        crosshairEl.style.opacity = '1';
        crosshairEl.style.display = 'block';

        // Snap aim toward the fish closest to where user clicked
        const targetFish = findClickedFish(screenX, screenY);
        if (targetFish) {
            _v2.copy(targetFish.mesh.position).sub(camera.position);
            aimYaw = Math.atan2(-_v2.x, -_v2.z);
            aimPitch = Math.atan2(_v2.y, Math.sqrt(_v2.x*_v2.x + _v2.z*_v2.z));
        } else {
            aimYaw = camYaw; aimPitch = camPitch;
        }
    }

    // Mouse
    renderer.domElement.addEventListener('mousedown', (e) => startAim(e.clientX, e.clientY));
    document.addEventListener('mousemove', (e) => {
        if (!state.isAiming) return;
        aimYaw -= e.movementX * AIM_SENSITIVITY;
        aimPitch -= e.movementY * AIM_SENSITIVITY;
        aimYaw = Math.max(-AIM_LIMIT, Math.min(AIM_LIMIT, aimYaw));
        aimPitch = Math.max(-AIM_LIMIT, Math.min(AIM_LIMIT, aimPitch));
    });
    renderer.domElement.addEventListener('mouseup', () => {
        if (state.isAiming) fire();
        if (!state.trackingSpear) state.isAiming = false;
    });

    // Touch
    renderer.domElement.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isTouching = true;
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
        startAim(e.touches[0].clientX, e.touches[0].clientY);
    }, {passive:false});
    renderer.domElement.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!state.isAiming) return;
        const dx = e.touches[0].clientX - lastTouchX;
        const dy = e.touches[0].clientY - lastTouchY;
        aimYaw -= dx * AIM_TOUCH_SENSITIVITY;
        aimPitch -= dy * AIM_TOUCH_SENSITIVITY;
        aimYaw = Math.max(-AIM_LIMIT, Math.min(AIM_LIMIT, aimYaw));
        aimPitch = Math.max(-AIM_LIMIT, Math.min(AIM_LIMIT, aimPitch));
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
    }, {passive:false});
    renderer.domElement.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (state.isAiming) fire();
        isTouching = false;
        if (!state.trackingSpear) state.isAiming = false;
    }, {passive:false});
}

// Camera target yaw/pitch for smooth tracking
let camYaw = 0, camPitch = 0;

function updateCamera(dt) {
    // Stay zoomed while tracking spear or showing feedback
    const shouldZoom = state.isAiming || state.trackingSpear;
    const targetFov = shouldZoom ? 40 : 65;
    camera.fov += (targetFov - camera.fov) * 0.12;
    camera.updateProjectionMatrix();

    if (state.trackingSpear) {
        // Camera stays frozen at aim position — no movement
        // Just count down feedback timer
        state.shotFeedbackTimer += dt;
        if (state.shotFeedbackTimer > 1.2) {
            state.trackingSpear = false;
            state.isAiming = false;
            crosshairEl.style.display = 'none';
        }
    } else if (state.isAiming) {
        camYaw += (aimYaw - camYaw) * 0.15;
        camPitch += (aimPitch - camPitch) * 0.15;
    } else {
        camYaw += (0 - camYaw) * 0.06;
        camPitch += (0 - camPitch) * 0.06;
    }
    camera.rotation.set(camPitch, camYaw, 0, 'YXZ');

    // Screen shake
    if (state.shake > 0.01) {
        camera.rotation.x += (Math.random()-0.5) * state.shake * 0.01;
        camera.rotation.y += (Math.random()-0.5) * state.shake * 0.01;
        state.shake *= 0.82;
    }
}

// ============================================================
// FISH SYSTEM
// ============================================================
function spawnAnimal() {
    if (state.gameOver || state.analysisActive || state.isWaitingForAnalysis || state.harvested >= state.goal) return;
    const alive = aliveCount();
    if (alive >= 2) return;

    const toSpawn = alive === 0 ? 2 : 1;
    for (let s = 0; s < toSpawn; s++) {
        const key = state.currentLevelSpecies[Math.floor(Math.random()*state.currentLevelSpecies.length)];
        const type = FISH_TYPES[key];
        const mesh = createFishMesh(key);

        // Spawn fish that swims LEFT↔RIGHT across the view (rarely toward player)
        const swimDist = FISH_SPAWN_RADIUS_MIN + Math.random()*(FISH_SPAWN_RADIUS_MAX - FISH_SPAWN_RADIUS_MIN);
        const spawnY = 2 + Math.random()*10;
        const side = Math.random() > 0.5 ? 1 : -1; // left or right
        const swimDir = new THREE.Vector3();

        if (Math.random() < 0.2) {
            // 20% chance: swim toward player (from far ahead, within view)
            const spawnPos = new THREE.Vector3(
                (Math.random()-0.5)*8,
                spawnY,
                -(10 + Math.random()*12)
            );
            mesh.position.copy(spawnPos);
            swimDir.set((Math.random()-0.5)*0.3, (Math.random()-0.5)*0.1, 1).normalize();
        } else {
            // 80%: swim across the view — spawn just at the edge of visible area
            const zDist = 6 + Math.random()*10; // visible distance in front
            const spawnPos = new THREE.Vector3(
                side * (8 + Math.random()*4), // just off the edge of view
                spawnY,
                -(zDist)
            );
            mesh.position.copy(spawnPos);
            swimDir.set(-side, (Math.random()-0.5)*0.1, (Math.random()-0.5)*0.15).normalize();
        }

        // Face swimming direction
        _v1.copy(mesh.position).add(swimDir);
        mesh.lookAt(_v1);

        scene.add(mesh);

        // Compute organ positions from bounding box (scratch objects)
        _bbox.setFromObject(mesh);
        const bMin = _bbox.min, bSize = _bbox.getSize(_bboxSize);
        // Brain/heart positions in local mesh space (fraction of bbox)
        const brainLocal = new THREE.Vector3(
            bMin.x + bSize.x * type.brain.x,
            bMin.y + bSize.y * type.brain.y,
            bMin.z + bSize.z * type.brain.z
        );
        const heartLocal = new THREE.Vector3(
            bMin.x + bSize.x * type.heart.x,
            bMin.y + bSize.y * type.heart.y,
            bMin.z + bSize.z * type.heart.z
        );
        const brainRadius = Math.max(bSize.x, bSize.y, bSize.z) * type.brain.r;
        const heartRadius = Math.max(bSize.x, bSize.y, bSize.z) * type.heart.r;

        // Visual organ meshes (slightly visible inside fish)
        const brainMesh = new THREE.Mesh(
            new THREE.SphereGeometry(brainRadius, 8, 8),
            new THREE.MeshBasicMaterial({ color:0xff88cc, transparent:true, opacity:0.35, depthTest:false })
        );
        brainMesh.position.copy(brainLocal);
        mesh.add(brainMesh);
        const heartMesh = new THREE.Mesh(
            new THREE.SphereGeometry(heartRadius, 8, 8),
            new THREE.MeshBasicMaterial({ color:0xff2222, transparent:true, opacity:0.35, depthTest:false })
        );
        heartMesh.position.copy(heartLocal);
        mesh.add(heartMesh);

        state.animals.push({
            mesh, type, typeKey: key, dead: false,
            swimDir, speed: type.speed * 0.9,
            baseSpeed: type.speed * 0.9,
            wobblePhase: Math.random()*Math.PI*2,
            swimFreq: 1.5 + Math.random()*1.5,
            swimAmp: 0.08 + Math.random()*0.06,
            vertFreq: 0.4 + Math.random()*0.3,
            vertAmp: 0.3 + Math.random()*0.4,
            speedPulseFreq: 0.8 + Math.random()*0.6,
            speedPulseAmp: 0.2 + Math.random()*0.15,
            rollAmp: 0.06 + Math.random()*0.04,
            bodyRadius: type.scale3d * 1.0,
            // Organ data for hit detection
            brainLocal, heartLocal, brainRadius, heartRadius,
            brainMesh, heartMesh,
            fadeAlpha: 1,
            spawnTime: clock.getElapsedTime(),
            baseYaw: Math.atan2(swimDir.x, swimDir.z),
        });
    }
    statusEl.textContent = 'FISH SPOTTED';
    statusEl.className = 'text-xl font-bold text-cyan-400';
    statusEl.style.color = '';
}

function updateFish(dt) {
    const time = clock.getElapsedTime();
    for (let i = state.animals.length-1; i >= 0; i--) {
        const a = state.animals[i];
        if (!a.dead) {
            a.wobblePhase += dt * a.swimFreq * Math.PI * 2;
            const t = a.wobblePhase;

            // Speed pulsing: burst then glide
            const speedMult = 1 + Math.sin(t * a.speedPulseFreq) * a.speedPulseAmp;
            a.speed = a.baseSpeed * speedMult;

            // S-curve path: yaw oscillates around base heading
            const yawOsc = Math.sin(t * 0.5) * a.swimAmp;
            const currentYaw = a.baseYaw + yawOsc;
            // Update swim direction based on oscillating yaw
            a.swimDir.x = Math.sin(currentYaw);
            a.swimDir.z = Math.cos(currentYaw);
            a.swimDir.normalize();

            // Move forward
            _v1.copy(a.swimDir).multiplyScalar(a.speed * dt);
            a.mesh.position.add(_v1);

            // Vertical wave: gentle up-down
            a.mesh.position.y += Math.sin(t * a.vertFreq) * a.vertAmp * dt;

            // Face swimming direction with body undulation
            // lookAt the swim direction + undulation yaw
            _v2.copy(a.mesh.position).add(a.swimDir);
            a.mesh.lookAt(_v2);
            a.mesh.rotation.y += Math.sin(t) * a.swimAmp * 0.5;
            // Pitch: nose dips slightly with vertical motion
            a.mesh.rotation.x = Math.sin(t * a.vertFreq) * 0.04;
            // Roll: bank into turns
            const yawRate = Math.cos(t * 0.5) * a.swimAmp;
            a.mesh.rotation.z = -yawRate * a.rollAmp * 8;

            // Remove if swam off screen (far on X) or too far away or timed out
            const absX = Math.abs(a.mesh.position.x);
            const dist = a.mesh.position.distanceTo(camera.position);
            if (absX > 35 || dist > FISH_SPAWN_RADIUS_MAX * 2.5 || time - a.spawnTime > 25) {
                scene.remove(a.mesh);
                state.animals.splice(i, 1);
                if (!state.gameOver) setTimeout(spawnAnimal, 500);
            }
        } else {
            // Death: sink and fade
            a.mesh.position.y -= dt * 3;
            a.fadeAlpha -= dt * 0.8;
            // Clone materials on first death frame so we don't mutate shared tintedMaterialCache
            const children = a.mesh.userData.meshChildren || [];
            if (!a.materialsCloned) {
                for (const c of children) { if (c.material) c.material = c.material.clone(); }
                a.materialsCloned = true;
            }
            const op = Math.max(0, a.fadeAlpha);
            for (const c of children) { c.material.transparent = true; c.material.opacity = op; }
            if (a.fadeAlpha <= 0) {
                scene.remove(a.mesh);
                state.animals.splice(i, 1);
                if (!state.analysisActive && aliveCount() === 0 && !state.gameOver) {
                    spawnAnimal();
                }
            }
        }
    }
}

// ============================================================
// SPEAR SYSTEM
// ============================================================
function createSpearMesh() {
    const group = new THREE.Group();
    const shaft = new THREE.Mesh(sharedSpearShaftGeo, sharedSpearShaftMat);
    shaft.rotation.x = Math.PI/2;
    group.add(shaft);
    const tip = new THREE.Mesh(sharedSpearTipGeo, sharedSpearTipMat);
    tip.rotation.x = -Math.PI/2;
    tip.position.z = -1.05;
    group.add(tip);
    const glow = new THREE.Mesh(sharedSpearGlowGeo, sharedSpearGlowMat);
    glow.rotation.x = Math.PI/2;
    group.add(glow);
    const spearLight = new THREE.PointLight(0x00e5ff, 1.5, 8);
    spearLight.position.z = -1.0;
    group.add(spearLight);
    return group;
}

function fire() {
    if (state.gameOver || state.analysisActive) return;
    if (state.isWaitingForAnalysis || state.ammo <= 0) return;
    state.ammo--;
    state.isWaitingForAnalysis = true;
    state.trackingSpear = true;
    state.shotFeedbackTimer = 0;
    state.shake = 12;
    triggerFlash(0.15);
    // Fade out crosshair smoothly
    crosshairEl.style.transition = 'opacity 0.3s';
    crosshairEl.style.opacity = '0';
    updateUI();

    const spearMesh = createSpearMesh();
    spearMesh.position.copy(camera.position);
    _v1.set(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
    _v2.copy(camera.position).add(_v1);
    spearMesh.lookAt(_v2);
    spearMesh.scale.set(0.15, 0.15, 0.15);
    scene.add(spearMesh);

    state.spears.push({
        mesh: spearMesh,
        origin: camera.position.clone(),
        dir: _v1.clone(),
        elapsed: 0,
        done: false,
        resolved: false,
        trailParticles: [],
    });
}

function updateSpears(dt) {
    const time = clock.getElapsedTime();
    for (let i = state.spears.length-1; i >= 0; i--) {
        const sp = state.spears[i];
        if (sp.done) {
            sp.impactLife = (sp.impactLife || 1) - dt * 2;
            // Fade impact ring
            if (sp.impactRing) {
                sp.impactRing.scale.setScalar(1 + (1-sp.impactLife)*2);
                sp.impactRing.material.opacity = sp.impactLife * 0.5;
            }
            if (sp.impactLife <= 0) {
                scene.remove(sp.mesh);
                if (sp.impactRing) { sp.impactRing.material.dispose(); scene.remove(sp.impactRing); }
                sp.trailParticles.forEach(p => { p.material.dispose(); scene.remove(p); });
                state.spears.splice(i, 1);
            }
            continue;
        }
        sp.elapsed += dt;
        const progress = Math.min(sp.elapsed / SPEAR_FLIGHT_TIME, 1);
        const ep = progress * progress * (3 - 2*progress); // smoothstep

        // Position along ray (scratch vectors)
        const dist = ep * FISH_SPAWN_RADIUS_MAX * 1.2;
        _v1.copy(sp.dir).multiplyScalar(dist);
        sp.mesh.position.copy(sp.origin).add(_v1);

        // Scale up (perspective effect)
        const scale = 0.15 + ep * 0.85;
        sp.mesh.scale.set(scale, scale, scale);

        // Trail bubbles — denser, brighter
        const trailCount = Math.random() < 0.7 ? 2 : 1;
        for (let t = 0; t < trailCount; t++) {
            const bubble = new THREE.Mesh(sharedBubbleGeo, sharedBubbleMat.clone());
            bubble.material.opacity = 0.6;
            const spread = 0.15 * scale;
            _v1.set((Math.random()-0.5)*spread, (Math.random()-0.5)*spread, (Math.random()-0.5)*spread);
            bubble.position.copy(sp.mesh.position).add(_v1);
            bubble.scale.setScalar(0.5 + scale * 1.5);
            scene.add(bubble);
            sp.trailParticles.push(bubble);
        }
        // Fade old trail (reverse loop to safely splice)
        for (let j = sp.trailParticles.length-1; j >= 0; j--) {
            const p = sp.trailParticles[j];
            p.material.opacity -= dt * 2;
            p.position.y += dt * 0.3;
            if (p.material.opacity <= 0) { p.material.dispose(); scene.remove(p); sp.trailParticles.splice(j, 1); }
        }

        if (progress >= 1) {
            const shotData = checkSpearHit(sp);
            resolveSpear(sp, shotData);
        }
    }
}

// ============================================================
// HIT DETECTION
// ============================================================
// Reusable objects for hit detection (avoid per-call allocations)
const _hitRay = new THREE.Ray();
const _hitSphere = new THREE.Sphere();
const _hitPoint = new THREE.Vector3();
const _hitHeart = new THREE.Vector3();

function checkSpearHit(spear) {
    _hitRay.origin.copy(spear.origin);
    _hitRay.direction.copy(spear.dir).normalize();
    let shotData = { hit:false, organ:'none', tier:'body', animal:null, nearestOrganDist:Infinity };

    for (const animal of state.animals) {
        if (animal.dead) continue;
        _hitSphere.center.copy(animal.mesh.position);
        _hitSphere.radius = animal.bodyRadius;
        if (!_hitRay.intersectSphere(_hitSphere, _hitPoint)) continue;

        const impactWorld = _hitPoint.clone();
        let organ = 'none';

        // Brain world position
        const brainWorld = _v2.copy(animal.brainLocal).applyMatrix4(animal.mesh.matrixWorld).clone();
        // Heart world position
        const heartWorld = _hitHeart.copy(animal.heartLocal).applyMatrix4(animal.mesh.matrixWorld).clone();

        // Check ray-sphere intersection for organs
        _hitSphere.center.copy(brainWorld);
        _hitSphere.radius = animal.brainRadius;
        if (_hitRay.intersectsSphere(_hitSphere)) organ = 'brain';

        if (organ === 'none') {
            _hitSphere.center.copy(heartWorld);
            _hitSphere.radius = animal.heartRadius;
            if (_hitRay.intersectsSphere(_hitSphere)) organ = 'heart';
        }

        // Compute closest distance from ray to each organ center (for scoring body hits)
        const brainClosest = new THREE.Vector3();
        _hitRay.closestPointToPoint(brainWorld, brainClosest);
        const brainDist = brainClosest.distanceTo(brainWorld);

        const heartClosest = new THREE.Vector3();
        _hitRay.closestPointToPoint(heartWorld, heartClosest);
        const heartDist = heartClosest.distanceTo(heartWorld);

        const nearestOrganDist = Math.min(brainDist, heartDist);
        const nearestOrgan = brainDist < heartDist ? 'brain' : 'heart';

        let tier = 'body';
        if (organ === 'brain') tier = 'brain';
        else if (organ === 'heart') tier = 'heart';

        shotData = { hit:true, organ, tier, animal, impactPoint:impactWorld, nearestOrganDist, nearestOrgan, bodyRadius:animal.bodyRadius };
        break;
    }
    return shotData;
}

function resolveSpear(spear, shotData) {
    spear.done = true;
    spear.impactLife = 1;

    // Impact ring (shared geometry, cloned material for per-ring opacity)
    const impactPos = shotData.hit ? shotData.impactPoint : spear.mesh.position.clone();
    const baseMat = shotData.hit ? sharedImpactHitMat : sharedImpactMissMat;
    const ring = new THREE.Mesh(sharedImpactGeo, baseMat.clone());
    ring.position.copy(impactPos);
    ring.lookAt(camera.position);
    scene.add(ring);
    spear.impactRing = ring;

    // Particle burst — more particles and bigger for hits
    const burstColor = shotData.hit ? 0x00e5ff : 0xff6644;
    if (!sharedBurstMats[burstColor]) {
        sharedBurstMats[burstColor] = new THREE.MeshBasicMaterial({ color:burstColor, transparent:true, opacity:0.7, blending:THREE.AdditiveBlending });
    }
    const burstCount = shotData.hit ? 30 : 10;
    const burstSpeed = shotData.hit ? 6 : 3;
    for (let j = 0; j < burstCount; j++) {
        const p = new THREE.Mesh(sharedBurstGeo, sharedBurstMats[burstColor].clone());
        p.position.copy(impactPos);
        p.userData.vel = { x:(Math.random()-0.5)*burstSpeed, y:(Math.random()-0.5)*burstSpeed, z:(Math.random()-0.5)*burstSpeed };
        p.userData.life = shotData.hit ? 1.5 : 0.8;
        p.userData.sharedGeo = true;
        if (shotData.hit) p.scale.setScalar(1.5 + Math.random());
        state.particles.push(p);
        scene.add(p);
    }
    // Add a bright flash sphere at impact point for hits
    if (shotData.hit) {
        const flashSphere = new THREE.Mesh(
            new THREE.SphereGeometry(0.5, 8, 8),
            new THREE.MeshBasicMaterial({ color:0xffffff, transparent:true, opacity:0.8, blending:THREE.AdditiveBlending })
        );
        flashSphere.position.copy(impactPos);
        flashSphere.userData.vel = {x:0, y:0, z:0};
        flashSphere.userData.life = 0.6;
        state.particles.push(flashSphere);
        scene.add(flashSphere);
    }

    if (shotData.hit) {
        // All body hits kill the fish — scoring varies by proximity to organs
        const isOrgan = shotData.organ === 'brain' || shotData.organ === 'heart';
        state.shake = isOrgan ? 25 : 12;
        triggerFlash(isOrgan ? 0.35 : 0.15);
        processHit(shotData.animal, shotData);
        const labels = { brain:'BRAIN SHOT!', heart:'HEART SHOT!', body:'BODY HIT' };
        const colors = { brain:'#ff88cc', heart:'#ef4444', body:'#fbbf24' };
        statusEl.textContent = labels[shotData.tier];
        statusEl.className = 'text-xl font-bold';
        statusEl.style.color = colors[shotData.tier];
        setTimeout(() => showShotAnalysis(shotData), 1200);
    } else {
        // Complete miss
        state.shake = 5;
        triggerFlash(0.08);
        state.isWaitingForAnalysis = false;
        statusEl.textContent = 'MISSED!';
        statusEl.className = 'text-xl font-bold text-red-500';
        statusEl.style.color = '';
        if (aliveCount() === 0) setTimeout(spawnAnimal, 800);
        checkOutOfAmmo();
    }
}

function processHit(animal, shotData) {
    animal.dead = true;
    state.harvested++;
    let mult = 1;
    if (shotData.organ === 'brain') {
        mult = 5; // direct brain hit
    } else if (shotData.organ === 'heart') {
        mult = 3; // direct heart hit
    } else {
        // Body hit — multiplier scales with proximity to nearest organ
        // Close to organ = up to 2x, far from organ = 1x
        const proximity = 1 - Math.min(shotData.nearestOrganDist / shotData.bodyRadius, 1);
        mult = 1 + proximity; // 1x to 2x
    }
    const pts = Math.round(animal.type.points * mult);
    shotData.finalPoints = pts;
    shotData.multiplier = mult;
    state.score += pts;
    updateUI();
}

function checkOutOfAmmo() {
    if (state.ammo <= 0 && aliveCount() === 0 && inFlightCount() === 0 && !state.gameOver) {
        setTimeout(() => showEndScreen('DIVE FAILED', 'Out of Spears', 'Retry'), 500);
    }
}

// ============================================================
// PARTICLES
// ============================================================
function updateParticles(dt) {
    for (let i = state.particles.length-1; i >= 0; i--) {
        const p = state.particles[i];
        const v = p.userData.vel;
        p.position.x += v.x * dt;
        p.position.y += v.y * dt;
        p.position.z += v.z * dt;
        v.y -= dt * 2; // gravity
        p.userData.life -= dt * 2;
        p.material.opacity = p.userData.life * 0.7;
        if (p.userData.life <= 0) {
            if (p.geometry && !p.userData.sharedGeo) p.geometry.dispose();
            p.material.dispose();
            scene.remove(p);
            state.particles.splice(i, 1);
        }
    }
}

// ============================================================
// EFFECTS
// ============================================================
function triggerFlash(intensity) { flashOpacity = intensity; flash.style.opacity = intensity; }

function updateFlash(dt) {
    if (flashOpacity > 0) {
        flashOpacity = Math.max(0, flashOpacity - dt * 4);
        flash.style.opacity = flashOpacity;
    }
}

// ============================================================
// HUD & UI
// ============================================================
function updateUI() {
    scoreEl.textContent = state.score.toLocaleString();
    ammoEl.textContent = state.ammo;
    ammoContainer.className = state.ammo <= 2 ? 'low-ammo' : '';
}

function showShotAnalysis(data) {
    state.isWaitingForAnalysis = false;
    state.analysisActive = true;
    analysisBox.style.display = 'block';
    crosshairEl.style.display = 'none';

    const { tier, animal, impactPoint } = data;
    if (animal) analysisAnimalName.textContent = animal.type.name;
    const pts = data.finalPoints || animal.type.points;
    const mult = data.multiplier || 1;
    let label = 'BODY HIT';
    if (tier === 'brain') label = 'BRAIN SHOT!';
    else if (tier === 'heart') label = 'HEART SHOT!';
    if (tier === 'body' && data.nearestOrgan) {
        label = 'BODY HIT — near ' + data.nearestOrgan;
    }
    analysisResult.textContent = label;
    analysisResult.className = tier === 'brain' ? 'text-2xl font-black text-pink-400' : tier === 'heart' ? 'text-2xl font-black text-red-400' : 'text-2xl font-black text-yellow-500';
    analysisScore.textContent = '+' + pts + ' Points (×' + mult.toFixed(1) + ')';

    // Setup 3D feedback scene
    setupFeedback3D(animal, tier, impactPoint);
}

function setupFeedback3D(animal, tier, impactPoint) {
    cleanupFeedback3D();

    const w = feedbackContainer.clientWidth;
    const h = 250;

    feedbackRenderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
    feedbackRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    feedbackRenderer.setSize(w, h);
    feedbackRenderer.outputColorSpace = THREE.SRGBColorSpace;
    feedbackContainer.appendChild(feedbackRenderer.domElement);

    feedbackScene = new THREE.Scene();
    feedbackCamera = new THREE.PerspectiveCamera(35, w/h, 0.1, 50);

    // Lights
    feedbackScene.add(new THREE.AmbientLight(0x88bbdd, 1.2));
    const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dLight.position.set(3, 4, 5);
    feedbackScene.add(dLight);
    const backLight = new THREE.DirectionalLight(0x4488aa, 0.4);
    backLight.position.set(-3, 0, -3);
    feedbackScene.add(backLight);

    const template = modelCache[animal.type.modelKey];
    if (!template) return;

    // Parent group — everything rotates together
    feedbackMesh = new THREE.Group();
    feedbackScene.add(feedbackMesh);

    // Clone fish model — fully opaque
    const fishClone = template.clone();
    const s = animal.type.scale3d;
    fishClone.scale.set(s, s, s);
    const cached = tintedMaterialCache[animal.typeKey];
    if (cached) {
        let idx = 0;
        fishClone.traverse(c => {
            if (c.isMesh && c.material && idx < cached.length) {
                c.material = cached[idx++].clone();
            }
        });
    }
    feedbackMesh.add(fishClone);

    // Measure model
    const bbox = new THREE.Box3().setFromObject(feedbackMesh);
    const center = bbox.getCenter(new THREE.Vector3());
    const size = bbox.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);

    // Camera — front-side view
    feedbackCamera.position.set(center.x, center.y, center.z + maxDim * 1.6);
    feedbackCamera.lookAt(center);

    // --- BRAIN organ (pink) ---
    const bMin = bbox.min;
    const brainPos = new THREE.Vector3(
        bMin.x + size.x * animal.type.brain.x,
        bMin.y + size.y * animal.type.brain.y,
        bMin.z + size.z * animal.type.brain.z
    );
    const brainR = maxDim * animal.type.brain.r;
    const brainVis = new THREE.Mesh(
        new THREE.SphereGeometry(brainR, 12, 12),
        new THREE.MeshBasicMaterial({ color:0xff88cc, transparent:true, opacity:0.4, depthTest:false })
    );
    brainVis.position.copy(brainPos);
    feedbackMesh.add(brainVis);
    // Brain label ring
    const brainRing = new THREE.Mesh(
        new THREE.TorusGeometry(brainR*1.2, brainR*0.08, 8, 24),
        new THREE.MeshBasicMaterial({ color:0xff88cc, transparent:true, opacity:0.5, depthTest:false })
    );
    brainRing.position.copy(brainPos);
    feedbackMesh.add(brainRing);

    // --- HEART organ (red) ---
    const heartPos = new THREE.Vector3(
        bMin.x + size.x * animal.type.heart.x,
        bMin.y + size.y * animal.type.heart.y,
        bMin.z + size.z * animal.type.heart.z
    );
    const heartR = maxDim * animal.type.heart.r;
    const heartVis = new THREE.Mesh(
        new THREE.SphereGeometry(heartR, 12, 12),
        new THREE.MeshBasicMaterial({ color:0xff2222, transparent:true, opacity:0.4, depthTest:false })
    );
    heartVis.position.copy(heartPos);
    feedbackMesh.add(heartVis);
    const heartRing = new THREE.Mesh(
        new THREE.TorusGeometry(heartR*1.2, heartR*0.08, 8, 24),
        new THREE.MeshBasicMaterial({ color:0xff2222, transparent:true, opacity:0.5, depthTest:false })
    );
    heartRing.position.copy(heartPos);
    feedbackMesh.add(heartRing);

    // --- HIT POINT: at the organ that was hit, or random body position ---
    const hitPoint = center.clone();
    if (tier === 'brain') hitPoint.copy(brainPos);
    else if (tier === 'heart') hitPoint.copy(heartPos);
    else {
        // Body shot — random spot away from organs
        const ang = Math.random()*Math.PI*2;
        hitPoint.x += Math.cos(ang) * maxDim * 0.25;
        hitPoint.y += Math.sin(ang) * maxDim * 0.15;
    }

    // --- TRAJECTORY LINE: red line from left to right through hit point ---
    const trajDir = new THREE.Vector3(1, 0.05, -0.15).normalize(); // mostly horizontal, slight angle
    const entryPt = hitPoint.clone().add(trajDir.clone().multiplyScalar(-maxDim * 1.2));
    const exitPt  = hitPoint.clone().add(trajDir.clone().multiplyScalar(maxDim * 1.2));
    const trajLen = entryPt.distanceTo(exitPt);
    const trajMid = new THREE.Vector3().lerpVectors(entryPt, exitPt, 0.5);
    const trajQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0), trajDir);

    // Outer glow
    const trajGlow = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.04, trajLen, 8),
        new THREE.MeshBasicMaterial({ color:0xff3333, transparent:true, opacity:0.3, depthTest:false })
    );
    trajGlow.position.copy(trajMid);
    trajGlow.quaternion.copy(trajQuat);
    feedbackMesh.add(trajGlow);

    // Core line
    const trajCore = new THREE.Mesh(
        new THREE.CylinderGeometry(0.015, 0.015, trajLen, 6),
        new THREE.MeshBasicMaterial({ color:0xff1111, depthTest:false })
    );
    trajCore.position.copy(trajMid);
    trajCore.quaternion.copy(trajQuat);
    feedbackMesh.add(trajCore);
    feedbackSpearLine = trajCore;

    // Dashed effect — small spheres along trajectory
    for (let i = 0; i <= 20; i++) {
        const t = i / 20;
        const dp = new THREE.Mesh(
            new THREE.SphereGeometry(0.02, 4, 4),
            new THREE.MeshBasicMaterial({ color:0xff4444, depthTest:false })
        );
        dp.position.lerpVectors(entryPt, exitPt, t);
        feedbackMesh.add(dp);
    }

    // --- ENTRY & EXIT markers (red circles like reference) ---
    const entryMarker = new THREE.Mesh(
        new THREE.TorusGeometry(0.06, 0.015, 8, 16),
        new THREE.MeshBasicMaterial({ color:0xff2222, depthTest:false })
    );
    entryMarker.position.copy(entryPt);
    entryMarker.lookAt(exitPt);
    feedbackMesh.add(entryMarker);

    const exitMarker = new THREE.Mesh(
        new THREE.TorusGeometry(0.06, 0.015, 8, 16),
        new THREE.MeshBasicMaterial({ color:0xff2222, depthTest:false })
    );
    exitMarker.position.copy(exitPt);
    exitMarker.lookAt(entryPt);
    feedbackMesh.add(exitMarker);

    // --- IMPACT POINT: glowing red sphere at hit ---
    const impactGlow = new THREE.Mesh(
        new THREE.SphereGeometry(maxDim * 0.04, 10, 10),
        new THREE.MeshBasicMaterial({ color:0xff0000, depthTest:false })
    );
    impactGlow.position.copy(hitPoint);
    feedbackMesh.add(impactGlow);

    // Impact halo
    const halo = new THREE.Mesh(
        new THREE.SphereGeometry(maxDim * 0.08, 10, 10),
        new THREE.MeshBasicMaterial({ color:0xff3333, transparent:true, opacity:0.3, depthTest:false })
    );
    halo.position.copy(hitPoint);
    feedbackMesh.add(halo);

    // Animate: slow rotation
    let feedbackTime = 0, feedbackLast = performance.now();
    function animateFeedback() {
        feedbackAnimId = requestAnimationFrame(animateFeedback);
        const now = performance.now();
        const dt = Math.min((now - feedbackLast) / 1000, 0.1);
        feedbackLast = now;
        feedbackTime += dt;
        if (feedbackMesh) feedbackMesh.rotation.y += dt * 0.5;
        // Pulse organs
        if (brainVis) {
            brainVis.material.opacity = 0.3 + Math.sin(feedbackTime * 3) * 0.15;
            brainRing.material.opacity = 0.4 + Math.sin(feedbackTime * 2.5) * 0.2;
        }
        if (heartVis) {
            heartVis.material.opacity = 0.3 + Math.sin(feedbackTime * 4) * 0.15;
            heartRing.material.opacity = 0.4 + Math.sin(feedbackTime * 3) * 0.2;
        }
        // Pulse impact glow
        if (impactGlow) {
            impactGlow.material.opacity = 0.6 + Math.sin(feedbackTime * 5) * 0.4;
            impactGlow.scale.setScalar(0.85 + Math.sin(feedbackTime * 4) * 0.2);
        }
        if (halo) {
            halo.material.opacity = 0.15 + Math.sin(feedbackTime * 3) * 0.1;
            halo.scale.setScalar(1.0 + Math.sin(feedbackTime * 2.5) * 0.15);
        }
        if (feedbackRenderer && feedbackScene && feedbackCamera) {
            feedbackRenderer.render(feedbackScene, feedbackCamera);
        }
    }
    animateFeedback();
}

function cleanupFeedback3D() {
    if (feedbackAnimId) cancelAnimationFrame(feedbackAnimId);
    feedbackAnimId = null;
    if (feedbackMesh) disposeMesh(feedbackMesh);
    if (feedbackRenderer) {
        feedbackRenderer.dispose();
        if (feedbackRenderer.domElement.parentNode) {
            feedbackRenderer.domElement.parentNode.removeChild(feedbackRenderer.domElement);
        }
        feedbackRenderer = null;
    }
    feedbackScene = null; feedbackCamera = null;
    feedbackMesh = null; feedbackSpearLine = null; feedbackHitRings = [];
}

window.closeAnalysis = function() {
    state.analysisActive = false;
    analysisBox.style.display = 'none';
    crosshairEl.style.display = 'none';
    cleanupFeedback3D();
    updateUI();
    if (state.harvested >= state.goal) {
        setTimeout(() => showEndScreen('DIVE SUCCESS', 'Total Score: '+state.score, 'Next Dive'), 300);
    } else {
        checkOutOfAmmo();
        if (!state.gameOver) spawnAnimal();
    }
};

function showEndScreen(title, body, btnText) {
    state.gameOver = true;
    state.lastDiveFailed = title.includes('FAILED');
    crosshairEl.style.display = 'none';
    msgTitleEl.textContent = title;
    msgTitleEl.className = state.lastDiveFailed ? 'text-4xl font-black mb-1 text-red-500' : 'text-4xl font-black mb-1 text-teal-400';
    msgBodyEl.textContent = body;
    actionBtnEl.textContent = btnText;
    msgBox.style.display = 'block';
}

window.actionBtn = function() {
    msgBox.style.display = 'none';
    crosshairEl.style.display = 'none';
    if (state.lastDiveFailed) {
        state.score = 0;
        startDiveMode(1);
    } else {
        startDiveMode(state.currentHunt + 1);
    }
};

window.goModeSelect = function() {
    msgBox.style.display = 'none';
    modeSelect.style.display = 'flex';
    cleanupScene();
    state.gameOver = true;
    camYaw = 0; camPitch = 0;
};

// ============================================================
// GAME FLOW
// ============================================================
function startDiveMode(num) {
    state.currentHunt = num;
    state.harvested = 0;
    state.goal = (num === 1) ? 3 : Math.min(5, 3 + Math.floor(num/2));
    state.ammo = state.goal * 2 + Math.max(2, 4 - Math.floor(num/4));
    state.gameOver = false;
    state.analysisActive = false;
    state.isWaitingForAnalysis = false;
    state.isAiming = false;

    cleanupScene();

    // Pick species for this dive
    const allKeys = Object.keys(FISH_TYPES);
    let pool = [];
    while (pool.length < 4) {
        const k = allKeys[Math.floor(Math.random()*allKeys.length)];
        if (!pool.includes(k)) pool.push(k);
    }
    state.currentLevelSpecies = pool;

    huntEl.textContent = 'Dive ' + num;
    goalEl.textContent = 'Catch: ' + state.goal;
    statusEl.textContent = 'DIVING...';
    statusEl.className = 'text-xl font-bold text-cyan-400';
    statusEl.style.color = '';
    statusSub.textContent = 'Aim for the vitals';
    crosshairEl.style.display = 'none';
    updateUI();
    msgBox.style.display = 'none';
    analysisBox.style.display = 'none';

    setTimeout(spawnAnimal, 1000);
}

// ============================================================
// MAIN LOOP
// ============================================================
function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.1);
    const time = clock.getElapsedTime();

    // Slow-mo when zoomed in (aiming or tracking spear)
    const slowMo = (state.isAiming || state.trackingSpear) ? 0.8 : 1.0;
    const gameDt = dt * slowMo;

    if (!state.gameOver && !state.analysisActive) {
        updateCamera(dt); // camera at full speed
        updateFish(gameDt);
        updateSpears(gameDt);
    }
    updateParticles(dt);
    updateFlash(dt);
    animateEnvironment(time, dt);

    renderer.render(scene, camera);
}

// ============================================================
// INIT
// ============================================================
window.startGame = async function() {
    modeSelect.style.display = 'none';
    startDiveMode(1);
};

async function init() {
    initScene();
    initSharedGeometry();
    createEnvironment();
    await loadModels();
    initControls();
    animate();
}

init();
</script>
