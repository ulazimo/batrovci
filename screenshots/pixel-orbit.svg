<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <rect width="600" height="360" fill="#2c3e50"/>

  <!-- Game area bg -->
  <rect x="100" y="20" width="400" height="320" rx="8" fill="#f0f3f5"/>

  <!-- Pixel grid (destructible blocks) -->
  <g>
    <!-- Row 1 - full -->
    <rect x="108" y="28" width="36" height="36" rx="2" fill="#e74c3c"/><text x="126" y="52" font-size="18" text-anchor="middle">🐷</text>
    <rect x="148" y="28" width="36" height="36" rx="2" fill="#e67e22"/><text x="166" y="52" font-size="18" text-anchor="middle">🐷</text>
    <rect x="188" y="28" width="36" height="36" rx="2" fill="#f1c40f"/><text x="206" y="52" font-size="18" text-anchor="middle">🐷</text>
    <rect x="228" y="28" width="36" height="36" rx="2" fill="#2ecc71"/><text x="246" y="52" font-size="18" text-anchor="middle">🐷</text>
    <rect x="268" y="28" width="36" height="36" rx="2" fill="#3498db"/><text x="286" y="52" font-size="18" text-anchor="middle">🐷</text>
    <rect x="308" y="28" width="36" height="36" rx="2" fill="#9b59b6"/><text x="326" y="52" font-size="18" text-anchor="middle">🐷</text>
    <rect x="348" y="28" width="36" height="36" rx="2" fill="#e74c3c"/><text x="366" y="52" font-size="18" text-anchor="middle">🐷</text>
    <rect x="388" y="28" width="36" height="36" rx="2" fill="#e67e22"/><text x="406" y="52" font-size="18" text-anchor="middle">🐷</text>
    <rect x="428" y="28" width="36" height="36" rx="2" fill="#f1c40f"/><text x="446" y="52" font-size="18" text-anchor="middle">🐷</text>
    <!-- Row 2 - gaps -->
    <rect x="108" y="68" width="36" height="36" rx="2" fill="#3498db"/><text x="126" y="92" font-size="18" text-anchor="middle">🐷</text>
    <rect x="188" y="68" width="36" height="36" rx="2" fill="#9b59b6"/><text x="206" y="92" font-size="18" text-anchor="middle">🐷</text>
    <rect x="268" y="68" width="36" height="36" rx="2" fill="#e74c3c"/><text x="286" y="92" font-size="18" text-anchor="middle">🐷</text>
    <rect x="348" y="68" width="36" height="36" rx="2" fill="#2ecc71"/><text x="366" y="92" font-size="18" text-anchor="middle">🐷</text>
    <rect x="428" y="68" width="36" height="36" rx="2" fill="#3498db"/><text x="446" y="92" font-size="18" text-anchor="middle">🐷</text>
    <!-- Row 3 - sparse -->
    <rect x="148" y="108" width="36" height="36" rx="2" fill="#f1c40f"/><text x="166" y="132" font-size="18" text-anchor="middle">🐷</text>
    <rect x="308" y="108" width="36" height="36" rx="2" fill="#e67e22"/><text x="326" y="132" font-size="18" text-anchor="middle">🐷</text>
    <rect x="388" y="108" width="36" height="36" rx="2" fill="#e74c3c"/><text x="406" y="132" font-size="18" text-anchor="middle">🐷</text>
  </g>

  <!-- Explosion effect -->
  <g transform="translate(228, 68)">
    <circle cx="18" cy="18" r="30" fill="#f1c40f" opacity="0.35"/>
    <circle cx="18" cy="18" r="20" fill="#f97316" opacity="0.5"/>
    <text x="18" y="26" font-size="22" text-anchor="middle">💥</text>
  </g>

  <!-- Ammo pig flying -->
  <g transform="translate(200, 260)">
    <text x="0" y="0" font-size="28">🐷</text>
    <!-- trajectory arc -->
    <path d="M14,-10 Q80,-80 160,-40" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
  </g>

  <!-- Score popup -->
  <g transform="translate(220, 150)">
    <rect x="0" y="0" width="80" height="30" rx="6" fill="rgba(0,0,0,0.6)"/>
    <text x="40" y="20" font-family="'Fredoka One',sans-serif" font-size="18" font-weight="bold" fill="#fbbf24" text-anchor="middle">+150!</text>
  </g>

  <!-- HUD top -->
  <rect x="100" y="20" width="400" height="0" fill="none"/>
  <rect x="0" y="0" width="600" height="22" fill="rgba(44,62,80,0.9)"/>
  <text x="16" y="15" font-family="monospace" font-size="10" fill="#94a3b8">LEVEL 4</text>
  <text x="300" y="15" font-family="monospace" font-size="12" font-weight="bold" fill="white" text-anchor="middle">SCORE: 2,850</text>
  <text x="584" y="15" font-family="monospace" font-size="10" fill="#fbbf24" text-anchor="end">LIVES: 🐷🐷🐷</text>

  <!-- HUD bottom -->
  <rect x="0" y="336" width="600" height="24" fill="rgba(44,62,80,0.9)"/>
  <text x="300" y="352" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">Tap to aim • Release to fire</text>
</svg>
