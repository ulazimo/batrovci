<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <rect width="600" height="360" fill="#020617"/>

  <!-- Dark atmospheric bg -->
  <radialGradient id="glow" cx="50%" cy="50%" r="60%" xmlns="http://www.w3.org/2000/svg">
    <stop offset="0%" stop-color="#7f1d1d" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
  </radialGradient>
  <rect width="600" height="360" fill="url(#glow)"/>

  <!-- Oracle symbol (center) -->
  <circle cx="300" cy="160" r="80" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.4"/>
  <circle cx="300" cy="160" r="55" fill="rgba(127,29,29,0.3)" stroke="#ef4444" stroke-width="2"/>
  <!-- Big symbol: ★ -->
  <text x="300" y="185" font-size="60" text-anchor="middle" fill="#ef4444" opacity="0.9">★</text>
  <!-- Pulsing ring -->
  <circle cx="300" cy="160" r="70" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="8,6" opacity="0.5"/>

  <!-- Oracle color label -->
  <rect x="240" y="240" width="120" height="32" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="300" y="252" font-family="monospace" font-size="9" fill="#fca5a5" text-anchor="middle" letter-spacing="2">MATCH THIS</text>
  <text x="300" y="267" font-family="monospace" font-size="13" font-weight="bold" fill="white" text-anchor="middle">RED  ★</text>

  <!-- Player panels -->
  <!-- P1 -->
  <rect x="20" y="60" width="110" height="110" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="3"/>
  <text x="75" y="82" font-family="monospace" font-size="9" fill="#f87171" text-anchor="middle" letter-spacing="2">PLAYER 1</text>
  <text x="75" y="140" font-size="48" text-anchor="middle">★</text>
  <rect x="28" y="148" width="94" height="16" rx="4" fill="#ef4444"/>
  <text x="75" y="160" font-family="monospace" font-size="9" font-weight="bold" fill="white" text-anchor="middle">RED ✓</text>

  <!-- P2 -->
  <rect x="20" y="190" width="110" height="110" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="75" y="212" font-family="monospace" font-size="9" fill="#93c5fd" text-anchor="middle" letter-spacing="2">PLAYER 2</text>
  <text x="75" y="268" font-size="48" text-anchor="middle">●</text>
  <rect x="28" y="278" width="94" height="16" rx="4" fill="#374151"/>
  <text x="75" y="290" font-family="monospace" font-size="9" fill="#6b7280" text-anchor="middle">BLUE ✗</text>

  <!-- P3 -->
  <rect x="470" y="60" width="110" height="110" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="525" y="82" font-family="monospace" font-size="9" fill="#fcd34d" text-anchor="middle" letter-spacing="2">PLAYER 3</text>
  <text x="525" y="140" font-size="48" text-anchor="middle">★</text>
  <rect x="478" y="148" width="94" height="16" rx="4" fill="#374151"/>
  <text x="525" y="160" font-family="monospace" font-size="9" fill="#6b7280" text-anchor="middle">YELLOW ✗</text>

  <!-- P4 -->
  <rect x="470" y="190" width="110" height="110" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="525" y="212" font-family="monospace" font-size="9" fill="#86efac" text-anchor="middle" letter-spacing="2">PLAYER 4</text>
  <text x="525" y="268" font-size="48" text-anchor="middle">★</text>
  <rect x="478" y="278" width="94" height="16" rx="4" fill="#22c55e"/>
  <text x="525" y="290" font-family="monospace" font-size="9" font-weight="bold" fill="white" text-anchor="middle">GREEN ✓</text>

  <!-- Timer bar -->
  <rect x="150" y="310" width="300" height="14" rx="7" fill="#1e293b" stroke="#374151" stroke-width="1"/>
  <rect x="150" y="310" width="180" height="14" rx="7" fill="#ef4444"/>
  <text x="300" y="322" font-family="monospace" font-size="9" fill="white" text-anchor="middle" font-weight="bold">3.2s</text>

  <!-- HUD bottom -->
  <rect x="0" y="336" width="600" height="24" fill="rgba(0,0,0,0.75)"/>
  <text x="16" y="352" font-family="monospace" font-size="10" fill="#94a3b8">ROUND 4 / 8  •  2 PLAYERS ALIVE</text>
  <text x="584" y="352" font-family="monospace" font-size="10" fill="#ef4444" text-anchor="end">ELIMINATION MODE</text>
</svg>
