<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <!-- Background -->
  <rect width="600" height="360" fill="#1a1a2e"/>

  <!-- Header bar -->
  <rect x="100" y="20" width="400" height="44" rx="4" fill="#16213e"/>
  <rect x="100" y="64" width="400" height="1" fill="#0f3460"/>

  <!-- Score labels -->
  <text x="200" y="38" text-anchor="middle" fill="#888" font-size="9" font-family="system-ui" letter-spacing="1">SCORE</text>
  <text x="200" y="56" text-anchor="middle" fill="#f0c040" font-size="18" font-family="system-ui" font-weight="700">350</text>
  <text x="300" y="38" text-anchor="middle" fill="#888" font-size="9" font-family="system-ui" letter-spacing="1">TURNS</text>
  <text x="300" y="56" text-anchor="middle" fill="#4fc3f7" font-size="18" font-family="system-ui" font-weight="700">9</text>
  <text x="400" y="38" text-anchor="middle" fill="#888" font-size="9" font-family="system-ui" letter-spacing="1">TARGET</text>
  <text x="400" y="56" text-anchor="middle" fill="#aaa" font-size="18" font-family="system-ui" font-weight="700">1000</text>

  <!-- Chain indicator -->
  <rect x="100" y="65" width="400" height="30" fill="#16213e"/>
  <circle cx="250" cy="80" r="6" fill="#e74c3c"/>
  <circle cx="265" cy="80" r="6" fill="#e74c3c"/>
  <circle cx="280" cy="80" r="6" fill="#e74c3c"/>
  <text x="305" y="85" fill="#ccc" font-size="12" font-family="system-ui" font-weight="600">(3)</text>
  <text x="320" y="85" fill="#ccc" font-size="12" font-family="system-ui">Chain:</text>

  <!-- 6x6 Card Grid -->
  <g transform="translate(105, 100)">
    <!-- Define colors for a sample board state -->
    <!-- Row 0 -->
    <rect x="0"   y="0"  width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="31"  y="24" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>

    <rect x="66"  y="0"  width="62" height="38" rx="3" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
    <rect x="67"  y="1"  width="60" height="36" rx="2" fill="url(#red-grad)"/>

    <rect x="132" y="0"  width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="163" y="24" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>

    <rect x="198" y="0"  width="62" height="38" rx="3" fill="none" stroke="#2ecc71" stroke-width="1.5"/>
    <rect x="199" y="1"  width="60" height="36" rx="2" fill="url(#green-grad)"/>

    <rect x="264" y="0"  width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="295" y="24" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>

    <rect x="330" y="0"  width="62" height="38" rx="3" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
    <rect x="331" y="1"  width="60" height="36" rx="2" fill="url(#red-grad)"/>

    <!-- Row 1 -->
    <rect x="0"   y="42" width="62" height="38" rx="3" fill="none" stroke="#3498db" stroke-width="1.5"/>
    <rect x="1"   y="43" width="60" height="36" rx="2" fill="url(#blue-grad)"/>

    <rect x="66"  y="42" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="97"  y="66" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>

    <rect x="132" y="42" width="62" height="38" rx="3" fill="none" stroke="#f1c40f" stroke-width="1.5"/>
    <rect x="133" y="43" width="60" height="36" rx="2" fill="url(#yellow-grad)"/>

    <!-- Special card (cross) -->
    <rect x="198" y="42" width="62" height="38" rx="3" fill="none" stroke="#9b59b6" stroke-width="1.5"/>
    <rect x="199" y="43" width="60" height="36" rx="2" fill="url(#special-grad)"/>
    <text x="229" y="67" text-anchor="middle" fill="white" font-size="16">✦</text>

    <rect x="264" y="42" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="295" y="66" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>

    <rect x="330" y="42" width="62" height="38" rx="3" fill="none" stroke="#3498db" stroke-width="1.5"/>
    <rect x="331" y="43" width="60" height="36" rx="2" fill="url(#blue-grad)"/>

    <!-- Row 2 -->
    <rect x="0"   y="84" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="31"  y="108" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>

    <rect x="66"  y="84" width="62" height="38" rx="3" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
    <rect x="67"  y="85" width="60" height="36" rx="2" fill="url(#red-grad)"/>

    <rect x="132" y="84" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="163" y="108" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>

    <rect x="198" y="84" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="229" y="108" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>

    <rect x="264" y="84" width="62" height="38" rx="3" fill="none" stroke="#f1c40f" stroke-width="1.5"/>
    <rect x="265" y="85" width="60" height="36" rx="2" fill="url(#yellow-grad)"/>

    <rect x="330" y="84" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="361" y="108" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>

    <!-- Rows 3-5 (mostly face-down) -->
    <rect x="0"   y="126" width="62" height="38" rx="3" fill="none" stroke="#2ecc71" stroke-width="1.5"/>
    <rect x="1"   y="127" width="60" height="36" rx="2" fill="url(#green-grad)"/>
    <rect x="66"  y="126" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="97"  y="150" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>
    <rect x="132" y="126" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="163" y="150" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>
    <rect x="198" y="126" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="229" y="150" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>
    <rect x="264" y="126" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="295" y="150" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>
    <rect x="330" y="126" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="361" y="150" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>

    <rect x="0"   y="168" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="31"  y="192" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>
    <rect x="66"  y="168" width="62" height="38" rx="3" fill="none" stroke="#3498db" stroke-width="1.5"/>
    <rect x="67"  y="169" width="60" height="36" rx="2" fill="url(#blue-grad)"/>
    <rect x="132" y="168" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="163" y="192" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>
    <rect x="198" y="168" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="229" y="192" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>
    <rect x="264" y="168" width="62" height="38" rx="3" fill="none" stroke="#e74c3c" stroke-width="1.5"/>
    <rect x="265" y="169" width="60" height="36" rx="2" fill="url(#red-grad)"/>
    <rect x="330" y="168" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="361" y="192" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>

    <rect x="0"   y="210" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="31"  y="234" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>
    <rect x="66"  y="210" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="97"  y="234" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>
    <rect x="132" y="210" width="62" height="38" rx="3" fill="none" stroke="#9b59b6" stroke-width="1.5"/>
    <rect x="133" y="211" width="60" height="36" rx="2" fill="url(#special-grad)"/>
    <text x="163" y="235" text-anchor="middle" fill="white" font-size="16">✸</text>
    <rect x="198" y="210" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="229" y="234" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>
    <rect x="264" y="210" width="62" height="38" rx="3" fill="#2a2a4a" stroke="#4a4a7a" stroke-width="1.5"/>
    <text x="295" y="234" text-anchor="middle" fill="#6a6a9a" font-size="14" font-weight="700">?</text>
    <rect x="330" y="210" width="62" height="38" rx="3" fill="none" stroke="#2ecc71" stroke-width="1.5"/>
    <rect x="331" y="211" width="60" height="36" rx="2" fill="url(#green-grad)"/>
  </g>

  <!-- Booster bar -->
  <rect x="100" y="318" width="400" height="34" fill="#16213e"/>
  <text x="130" y="339" text-anchor="middle" fill="#fff" font-size="16">👁</text>
  <text x="175" y="339" text-anchor="middle" fill="#fff" font-size="16">🎲</text>
  <text x="220" y="339" text-anchor="middle" fill="#fff" font-size="16">✚</text>
  <text x="265" y="339" text-anchor="middle" fill="#fff" font-size="16">↔</text>
  <text x="310" y="339" text-anchor="middle" fill="#fff" font-size="16">🔗</text>
  <text x="355" y="339" text-anchor="middle" fill="#fff" font-size="16">🎨</text>
  <text x="400" y="339" text-anchor="middle" fill="#fff" font-size="16">🛡</text>
  <text x="445" y="339" text-anchor="middle" fill="#fff" font-size="16">🃏</text>

  <defs>
    <radialGradient id="red-grad" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </radialGradient>
    <radialGradient id="green-grad" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#6bff6b"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </radialGradient>
    <radialGradient id="blue-grad" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#6b9bff"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </radialGradient>
    <radialGradient id="yellow-grad" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#ffe66b"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </radialGradient>
    <radialGradient id="special-grad" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#e0b0ff"/>
      <stop offset="100%" stop-color="#8a2be2"/>
    </radialGradient>
  </defs>
</svg>
