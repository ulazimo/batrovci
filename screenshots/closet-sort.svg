  <!-- Match flash on 3 bags -->
  <rect x="48" y="18" width="59" height="44" rx="7" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.9"/>
  <rect x="188" y="18" width="59" height="44" rx="7" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.9"/>
  <rect x="328" y="18" width="59" height="44" rx="7" fill="none" stroke="#fbbf24" stroke-width="2.5" opacity="0.9"/>
  <text x="205" y="15" font-family="monospace" font-size="11" font-weight="bold" fill="#fbbf24" text-anchor="middle">MATCH!</text>

  <!-- Shelf 2 -->
  <rect x="30" y="175" width="540" height="12" rx="3" fill="#334155"/>
  <rect x="50" y="135" width="55" height="40" rx="6" fill="#ec4899"/>
  <text x="77" y="162" font-size="22" text-anchor="middle">👠</text>
  <rect x="120" y="135" width="55" height="40" rx="6" fill="#22c55e"/>
  <text x="147" y="162" font-size="22" text-anchor="middle">🧣</text>
  <rect x="190" y="135" width="55" height="40" rx="6" fill="#a855f7"/>
  <text x="217" y="162" font-size="22" text-anchor="middle">💎</text>
  <rect x="260" y="135" width="55" height="40" rx="6" fill="#ec4899"/>
  <text x="287" y="162" font-size="22" text-anchor="middle">👠</text>
  <rect x="330" y="135" width="55" height="40" rx="6" fill="#3b82f6"/>
  <text x="357" y="162" font-size="22" text-anchor="middle">🕶️</text>
  <rect x="400" y="135" width="55" height="40" rx="6" fill="#22c55e"/>
  <text x="427" y="162" font-size="22" text-anchor="middle">🧣</text>

  <!-- Shelf 3 -->
  <rect x="30" y="290" width="540" height="12" rx="3" fill="#334155"/>
  <rect x="50" y="250" width="55" height="40" rx="6" fill="#3b82f6"/>
  <text x="77" y="277" font-size="22" text-anchor="middle">🕶️</text>
  <rect x="120" y="250" width="55" height="40" rx="6" fill="#a855f7"/>
