      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg)"/>

  <!-- Shelf 1 -->
  <rect x="30" y="60" width="540" height="12" rx="3" fill="#334155"/>
  <!-- Items on shelf 1 -->
  <rect x="50" y="20" width="55" height="40" rx="6" fill="#f59e0b"/>
  <text x="77" y="47" font-size="22" text-anchor="middle">👜</text>
  <rect x="120" y="20" width="55" height="40" rx="6" fill="#ec4899"/>
  <text x="147" y="47" font-size="22" text-anchor="middle">👠</text>
  <rect x="190" y="20" width="55" height="40" rx="6" fill="#f59e0b"/>
  <text x="217" y="47" font-size="22" text-anchor="middle">👜</text>
  <rect x="260" y="20" width="55" height="40" rx="6" fill="#a855f7"/>
  <text x="287" y="47" font-size="22" text-anchor="middle">💎</text>
  <rect x="330" y="20" width="55" height="40" rx="6" fill="#f59e0b"/>
