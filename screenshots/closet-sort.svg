  <rect x="190" y="250" width="55" height="40" rx="6" fill="#22c55e"/>
  <text x="217" y="277" font-size="22" text-anchor="middle">🧣</text>

  <!-- Dragged item -->
  <g transform="translate(430, 230)" opacity="0.95">
    <rect x="0" y="0" width="55" height="40" rx="6" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
    <text x="27" y="27" font-size="22" text-anchor="middle">🕶️</text>
    <!-- shadow below -->
    <ellipse cx="27" cy="48" rx="22" ry="5" fill="rgba(0,0,0,0.4)"/>
