  <!-- HUD -->
  <rect x="0" y="318" width="600" height="42" fill="rgba(0,0,0,0.7)"/>
  <text x="16" y="334" font-family="monospace" font-size="9" fill="#94a3b8" letter-spacing="2">SCORE</text>
  <text x="16" y="352" font-family="monospace" font-size="18" font-weight="bold" fill="white">1,280</text>
