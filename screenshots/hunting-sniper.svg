<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c3f6e"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="url(#bg)"/>

  <!-- Forest background trees -->
  <g opacity="0.4" fill="#14532d">
    <polygon points="60,280 90,180 120,280"/>
    <polygon points="100,280 135,160 170,280"/>
    <polygon points="430,280 465,170 500,280"/>
    <polygon points="470,280 510,155 550,280"/>
    <polygon points="520,280 555,175 590,280"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="280" width="600" height="80" fill="#14532d" opacity="0.6"/>

  <!-- Deer target (center) -->
  <g transform="translate(240, 120)">
    <!-- Body -->
    <ellipse cx="60" cy="70" rx="55" ry="35" fill="#92400e"/>
    <!-- Head -->
    <ellipse cx="105" cy="45" rx="22" ry="18" fill="#92400e"/>
    <!-- Neck -->
    <rect x="88" y="45" width="20" height="25" fill="#92400e"/>
    <!-- Legs -->
    <rect x="20" y="95" width="10" height="40" fill="#78350f" rx="3"/>
    <rect x="40" y="95" width="10" height="40" fill="#78350f" rx="3"/>
    <rect x="75" y="95" width="10" height="40" fill="#78350f" rx="3"/>
    <rect x="95" y="95" width="10" height="40" fill="#78350f" rx="3"/>
    <!-- Antlers -->
    <line x1="100" y1="30" x2="90" y2="5" stroke="#78350f" stroke-width="4" stroke-linecap="round"/>
    <line x1="90" y1="5" x2="78" y2="-5" stroke="#78350f" stroke-width="3" stroke-linecap="round"/>
    <line x1="90" y1="5" x2="85" y2="-8" stroke="#78350f" stroke-width="3" stroke-linecap="round"/>
    <line x1="112" y1="30" x2="122" y2="5" stroke="#78350f" stroke-width="4" stroke-linecap="round"/>
    <line x1="122" y1="5" x2="134" y2="-5" stroke="#78350f" stroke-width="3" stroke-linecap="round"/>
    <line x1="122" y1="5" x2="127" y2="-8" stroke="#78350f" stroke-width="3" stroke-linecap="round"/>
    <!-- Eye -->
    <circle cx="112" cy="40" r="4" fill="#1f2937"/>
    <circle cx="113" cy="39" r="1.5" fill="white"/>
    <!-- Vital zone -->
    <circle cx="55" cy="62" r="16" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.8"/>
    <text x="55" y="66" font-size="10" fill="#ef4444" text-anchor="middle" opacity="0.9">♥</text>
  </g>

  <!-- Sniper scope overlay -->
  <circle cx="300" cy="180" r="110" fill="none" stroke="rgba(0,0,0,0.7)" stroke-width="60"/>
  <circle cx="300" cy="180" r="80" fill="none" stroke="#1f2937" stroke-width="1.5"/>
  <line x1="220" y1="180" x2="380" y2="180" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
  <line x1="300" y1="100" x2="300" y2="260" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
  <circle cx="300" cy="180" r="4" fill="#ef4444" opacity="0.9"/>
  <!-- Range marks -->
  <line x1="260" y1="180" x2="260" y2="172" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
  <line x1="340" y1="180" x2="340" y2="172" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
  <line x1="300" y1="140" x2="308" y2="140" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
  <line x1="300" y1="220" x2="308" y2="220" stroke="#ef4444" stroke-width="1" opacity="0.6"/>

  <!-- HUD top -->
  <rect x="0" y="0" width="600" height="36" fill="rgba(0,0,0,0.65)"/>
  <text x="16" y="14" font-family="monospace" font-size="9" fill="#94a3b8" letter-spacing="2">SCORE</text>
  <text x="16" y="30" font-family="monospace" font-size="18" font-weight="bold" fill="white">3,200</text>
  <text x="300" y="14" font-family="monospace" font-size="9" fill="#94a3b8" letter-spacing="2" text-anchor="middle">ZONE 3</text>
  <text x="300" y="30" font-family="monospace" font-size="14" fill="#fbbf24" text-anchor="middle">Dawn Forest</text>
  <text x="584" y="14" font-family="monospace" font-size="9" fill="#94a3b8" letter-spacing="2" text-anchor="end">AMMO</text>
  <text x="584" y="30" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="end">● ● ● ○ ○</text>

  <!-- HUD bottom -->
  <rect x="0" y="324" width="600" height="36" fill="rgba(0,0,0,0.65)"/>
  <text x="300" y="338" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle" letter-spacing="2">WIND</text>
  <text x="300" y="354" font-family="monospace" font-size="13" fill="white" text-anchor="middle">← 8 km/h  •  DIST: 240m</text>
</svg>
