<svg xmlns="http://www.w3.org/2000/svg" width="640" height="320" viewBox="0 0 640 320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16301f"/>
      <stop offset="1" stop-color="#0f2417"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="640" height="320" fill="url(#bg)"/>
  <g fill="#1c3424">
    <circle cx="70" cy="60" r="4"/><circle cx="180" cy="40" r="4"/><circle cx="300" cy="70" r="4"/>
    <circle cx="500" cy="50" r="4"/><circle cx="600" cy="120" r="4"/><circle cx="90" cy="260" r="4"/>
    <circle cx="250" cy="280" r="4"/><circle cx="430" cy="270" r="4"/><circle cx="560" cy="250" r="4"/>
  </g>

  <!-- track: curb, asphalt, dashed centre line -->
  <path id="track" d="M 60 250 C 200 250, 240 90, 360 110 S 540 220, 600 70"
        fill="none" stroke="#c9ccd4" stroke-width="78" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 60 250 C 200 250, 240 90, 360 110 S 540 220, 600 70"
        fill="none" stroke="#33363f" stroke-width="68" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 60 250 C 200 250, 240 90, 360 110 S 540 220, 600 70"
        fill="none" stroke="#f0c020" stroke-width="3" stroke-dasharray="16 18"/>

  <!-- predicted racing line -->
  <path d="M 95 240 C 210 235, 250 120, 360 135 S 520 210, 585 95"
        fill="none" stroke="#00e0ff" stroke-width="3.5" stroke-dasharray="8 10" filter="url(#glow)" opacity="0.95"/>

  <!-- oil slick hazard -->
  <circle cx="455" cy="180" r="22" fill="#0c0c10"/>
  <circle cx="448" cy="173" r="9" fill="#7878ff" opacity="0.25"/>

  <!-- finish -->
  <g transform="translate(600,70)">
    <circle r="24" fill="#101216"/>
    <circle r="18" fill="#00e0ff" opacity="0.18"/>
    <text y="6" font-family="Arial" font-size="20" text-anchor="middle">🏁</text>
  </g>

  <!-- car -->
  <g transform="translate(120,243) rotate(-18)" filter="url(#glow)">
    <rect x="-13" y="-7" width="26" height="14" rx="4" fill="#d23b3b"/>
    <rect x="-3" y="-5" width="9" height="10" rx="2" fill="#ffffff" opacity="0.25"/>
    <rect x="7" y="-6" width="3" height="12" rx="1" fill="#fff"/>
  </g>

  <text x="24" y="40" font-family="Orbitron, Arial" font-size="26" font-weight="700"
        fill="#ffffff" opacity="0.92" letter-spacing="2">RACING LINE</text>
</svg>
