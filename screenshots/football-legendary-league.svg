<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360">
  <defs>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
  </defs>
  <rect width="600" height="360" fill="#0f172a"/>

  <!-- Pitch -->
  <rect x="30" y="20" width="540" height="320" rx="8" fill="url(#pitch)"/>
  <!-- Pitch stripes -->
  <g opacity="0.15" fill="#16a34a">
    <rect x="30" y="20" width="60" height="320"/>
    <rect x="150" y="20" width="60" height="320"/>
    <rect x="270" y="20" width="60" height="320"/>
    <rect x="390" y="20" width="60" height="320"/>
    <rect x="510" y="20" width="60" height="320"/>
  </g>
  <!-- Pitch markings -->
  <rect x="30" y="20" width="540" height="320" rx="8" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="300" y1="20" x2="300" y2="340" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <circle cx="300" cy="180" r="40" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <circle cx="300" cy="180" r="4" fill="white" opacity="0.6"/>
  <!-- Goal areas -->
  <rect x="30" y="130" width="60" height="100" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <rect x="510" y="130" width="60" height="100" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- Match-3 grid overlay (bottom half) -->
  <rect x="80" y="200" width="440" height="120" rx="8" fill="rgba(0,0,0,0.55)"/>
  <!-- Tiles -->
  <g>
    <!-- Row 1 -->
    <rect x="92"  y="210" width="48" height="48" rx="6" fill="#ef4444"/><text x="116" y="242" font-size="22" text-anchor="middle">⚽</text>
    <rect x="148" y="210" width="48" height="48" rx="6" fill="#3b82f6"/><text x="172" y="242" font-size="22" text-anchor="middle">🥅</text>
    <rect x="204" y="210" width="48" height="48" rx="6" fill="#ef4444"/><text x="228" y="242" font-size="22" text-anchor="middle">⚽</text>
    <rect x="260" y="210" width="48" height="48" rx="6" fill="#facc15"/><text x="284" y="242" font-size="22" text-anchor="middle">⚡</text>
    <rect x="316" y="210" width="48" height="48" rx="6" fill="#ef4444"/><text x="340" y="242" font-size="22" text-anchor="middle">⚽</text>
    <rect x="372" y="210" width="48" height="48" rx="6" fill="#22c55e"/><text x="396" y="242" font-size="22" text-anchor="middle">🛡️</text>
    <rect x="428" y="210" width="48" height="48" rx="6" fill="#3b82f6"/><text x="452" y="242" font-size="22" text-anchor="middle">🥅</text>
    <!-- Match glow on 3 balls -->
    <rect x="90"  y="208" width="52" height="52" rx="7" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
    <rect x="202" y="208" width="52" height="52" rx="7" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
    <rect x="314" y="208" width="52" height="52" rx="7" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
    <!-- Row 2 -->
    <rect x="92"  y="264" width="48" height="48" rx="6" fill="#22c55e"/><text x="116" y="296" font-size="22" text-anchor="middle">🛡️</text>
    <rect x="148" y="264" width="48" height="48" rx="6" fill="#facc15"/><text x="172" y="296" font-size="22" text-anchor="middle">⚡</text>
    <rect x="204" y="264" width="48" height="48" rx="6" fill="#3b82f6"/><text x="228" y="296" font-size="22" text-anchor="middle">🥅</text>
    <rect x="260" y="264" width="48" height="48" rx="6" fill="#22c55e"/><text x="284" y="296" font-size="22" text-anchor="middle">🛡️</text>
    <rect x="316" y="264" width="48" height="48" rx="6" fill="#facc15"/><text x="340" y="296" font-size="22" text-anchor="middle">⚡</text>
    <rect x="372" y="264" width="48" height="48" rx="6" fill="#ef4444"/><text x="396" y="296" font-size="22" text-anchor="middle">⚽</text>
    <rect x="428" y="264" width="48" height="48" rx="6" fill="#22c55e"/><text x="452" y="296" font-size="22" text-anchor="middle">🛡️</text>
  </g>

  <!-- Score popup -->
  <g transform="translate(230, 140)">
    <rect x="0" y="0" width="140" height="44" rx="8" fill="rgba(0,0,0,0.7)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="70" y="16" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle" letter-spacing="2">ATTACK BOOST</text>
    <text x="70" y="36" font-family="monospace" font-size="18" font-weight="bold" fill="white" text-anchor="middle">+45 ATK</text>
  </g>

  <!-- HUD top -->
  <rect x="0" y="0" width="600" height="22" fill="rgba(0,0,0,0.7)"/>
  <text x="16" y="15" font-family="monospace" font-size="10" fill="#4ade80" font-weight="bold">LFC  2</text>
  <text x="300" y="15" font-family="monospace" font-size="10" fill="#94a3b8" text-anchor="middle">65'</text>
  <text x="584" y="15" font-family="monospace" font-size="10" fill="#f87171" font-weight="bold" text-anchor="end">1  MCI</text>
</svg>
