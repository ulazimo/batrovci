<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Model Demo — Physics Drop</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; overflow: hidden; font-family: system-ui, sans-serif; }
canvas { display: block; }
#label {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    color: #fff; font-size: 20px; font-weight: 700; text-align: center;
    background: rgba(0,0,0,0.5); padding: 10px 24px; border-radius: 12px;
    backdrop-filter: blur(8px); z-index: 10;
}
#label small { display: block; font-size: 13px; font-weight: 400; color: #aaa; margin-top: 4px; }
#loading {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #fff; font-size: 18px; z-index: 20;
}
</style>

<!-- Three.js r128 (same as mind match 3d) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- Cannon.js (same as mind match 3d) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
<!-- GLTFLoader for .glb files -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<!-- OrbitControls -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="label">Physics Drop Demo <small>Drag to rotate, scroll to zoom</small></div>
<div id="loading">Loading models...</div>

<script>
let scene, camera, renderer, controls, world;
let objects = []; // { mesh, body }

const FLOOR_Y = 0;

function init() {
    // ── Scene ──
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2c3e50);
    scene.fog = new THREE.Fog(0x2c3e50, 20, 60);

    // ── Camera (same angle as mind match 3d) ──
    camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 14, 18);
    camera.lookAt(0, 0, 0);

    // ── Lights ──
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const dir = new THREE.DirectionalLight(0xffffff, 0.8);
    dir.position.set(5, 20, 5);
    dir.castShadow = true;
    dir.shadow.mapSize.set(1024, 1024);
    dir.shadow.camera.near = 0.5;
    dir.shadow.camera.far = 50;
    scene.add(dir);

    const rim = new THREE.PointLight(0x00aaff, 0.5);
    rim.position.set(-10, 10, -10);
    scene.add(rim);

    // ── Floor ──
    const floorGeo = new THREE.PlaneGeometry(30, 30);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.9 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = FLOOR_Y;
    floor.receiveShadow = true;
    scene.add(floor);

    const grid = new THREE.GridHelper(20, 20, 0x34495e, 0x34495e);
    grid.position.y = FLOOR_Y + 0.01;
    scene.add(grid);

    // ── Renderer ──
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    // ── Orbit controls ──
    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 2, 0);

    // ── Cannon.js physics (same settings as mind match 3d) ──
    world = new CANNON.World();
    world.gravity.set(0, -18, 0);
    world.broadphase = new CANNON.NaiveBroadphase();
    world.solver.iterations = 7;

    const physicsMaterial = new CANNON.Material('ground');
    const contact = new CANNON.ContactMaterial(physicsMaterial, physicsMaterial, {
        friction: 0.5,
        restitution: 0.3
    });
    world.addContactMaterial(contact);

    // Physics floor
    const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
    groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
    world.addBody(groundBody);

    // Walls to keep objects contained
    const wallShape = new CANNON.Box(new CANNON.Vec3(10, 20, 1));
    [
        { pos: [0, 5, -6] , rot: null },
        { pos: [0, 5, 6]  , rot: null },
        { pos: [-5, 5, 0] , rot: [0, 1, 0, Math.PI / 2] },
        { pos: [5, 5, 0]  , rot: [0, 1, 0, Math.PI / 2] }
    ].forEach(w => {
        const b = new CANNON.Body({ mass: 0 });
        b.addShape(wallShape);
        b.position.set(...w.pos);
        if (w.rot) b.quaternion.setFromAxisAngle(new CANNON.Vec3(w.rot[0], w.rot[1], w.rot[2]), w.rot[3]);
        world.addBody(b);
    });

    // ── Load GLBs and drop them ──
    const loader = new THREE.GLTFLoader();
    const modelFiles = [
        { file: './models/soccer_ball-2026-03-27-135439.glb', count: 4 },
        { file: './models/pizza_slice-2026-03-27-135756.glb', count: 4 }
    ];
    let totalToLoad = modelFiles.length;
    let loaded = 0;

    modelFiles.forEach(({ file, count }) => {
        loader.load(
            file,
            (gltf) => {
                loaded++;
                if (loaded >= totalToLoad) {
                    document.getElementById('loading').style.display = 'none';
                }

                // Figure out model size for proper scaling
                const template = gltf.scene;
                const box = new THREE.Box3().setFromObject(template);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 2 / maxDim;
                const center = box.getCenter(new THREE.Vector3());

                // Spawn multiple copies with staggered drop
                for (let i = 0; i < count; i++) {
                    const m = template.clone();
                    m.scale.setScalar(scale);

                    // Random start position high up
                    const x = (Math.random() - 0.5) * 6;
                    const y = 10 + Math.random() * 15;
                    const z = (Math.random() - 0.5) * 6;

                    m.position.set(x, y, z);

                    m.traverse(child => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            // Clone materials so each instance is independent
                            child.material = child.material.clone();
                        }
                    });

                    scene.add(m);

                    // Physics body — approximate as box using scaled bounding box
                    const scaledSize = size.clone().multiplyScalar(scale);
                    const halfExtents = new CANNON.Vec3(
                        scaledSize.x / 2,
                        scaledSize.y / 2,
                        scaledSize.z / 2
                    );
                    const bodyShape = new CANNON.Box(halfExtents);
                    const body = new CANNON.Body({
                        mass: 5,
                        shape: bodyShape,
                        linearDamping: 0.4,
                        angularDamping: 0.4
                    });
                    body.position.set(x, y, z);
                    // Random rotation
                    body.quaternion.setFromEuler(
                        Math.random() * Math.PI * 2,
                        Math.random() * Math.PI * 2,
                        Math.random() * Math.PI * 2
                    );
                    body.angularVelocity.set(
                        (Math.random() - 0.5) * 3,
                        (Math.random() - 0.5) * 3,
                        (Math.random() - 0.5) * 3
                    );
                    world.addBody(body);

                    // Store center offset for correct mesh sync
                    objects.push({ mesh: m, body, centerOffset: center.clone().multiplyScalar(scale) });
                }
            },
            null,
            (err) => {
                console.error('Error loading GLB:', file, err);
                document.getElementById('loading').textContent = 'Error loading model!';
            }
        );
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
}

function animate() {
    requestAnimationFrame(animate);

    // Step physics
    world.step(1 / 60);

    // Sync Three.js meshes with Cannon.js bodies
    objects.forEach(({ mesh, body, centerOffset }) => {
        mesh.position.copy(body.position);
        mesh.position.sub(centerOffset);
        mesh.quaternion.copy(body.quaternion);
    });

    controls.update();
    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
